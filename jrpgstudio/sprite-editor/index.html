<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio — Sprite Editor</title>
    <style>
      main.studio-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        min-height: 0;
      }
      #side-col {
        display: contents;
      }
      #top-row {
        order: 0;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        padding-left: 48px; /* clear the fixed hamburger button */
      }
      #transport {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      #canvas-area {
        order: 1;
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      #pixel-canvas {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        touch-action: none;
        image-rendering: pixelated;
        cursor: crosshair;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      #ref-grid img {
        width: 64px;
        image-rendering: pixelated;
        border: 1px solid var(--border);
        margin: 2px;
        background: #555;
      }
      #preview-area {
        order: 2;
      }
      #preview .pane {
        display: inline-block;
        text-align: center;
        margin: 0 6px;
      }
      #preview canvas {
        display: block;
        image-rendering: pixelated;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: #8caa8c;
        max-width: 100%;
        height: auto;
      }
      #preview .pane span {
        font-size: 11px;
        color: var(--muted);
      }
      @media (orientation: landscape) {
        main.studio-main {
          flex-direction: row;
        }
        /* left column: dropdowns top, preview grid bottom */
        #side-col {
          display: flex;
          flex-direction: column;
          width: min(40%, 340px);
          min-width: 240px;
        }
        #top-row {
          flex-direction: column;
          align-items: stretch;
        }
        #preview-area {
          margin-top: auto;
        }
        #preview-area #preview {
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 4px;
        }
        /* right: the editor canvas */
        #canvas-area {
          flex: 1;
          min-height: 0;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CU24xIRr.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BPh0Ro2i.css">
  </head>
  <body>
    <div id="drawer-root"></div>
    <main class="studio-main" id="layout">
      <div id="side-col">
        <div id="top-row">
          <span id="part-slot"></span>
          <span id="tool-slot"></span>
          <span id="transport"></span>
        </div>
        <section id="preview-area">
          <div id="preview"></div>
          <div id="preview-note" class="muted"></div>
        </section>
      </div>
      <section id="canvas-area">
        <canvas id="pixel-canvas"></canvas>
        <div id="ref-grid" class="scroll-y"></div>
      </section>
    </main>
    <div id="build-stamp">Thu Jul  2 17:02:17 EDT 2026</div>
  </body>
</html>
