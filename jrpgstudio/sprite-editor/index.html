<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio — Sprite Editor</title>
    <style>
      main.studio-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        min-height: 0;
      }
      #side-col {
        display: contents;
      }
      #top-row {
        order: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-left: 48px; /* clear the fixed hamburger button */
      }
      /* Row 1: the two dropdowns side by side, label text hidden (scoped —
         the drawer's selects keep their labels). */
      #selects-row {
        display: flex;
        gap: 8px;
      }
      #selects-row > span {
        flex: 1;
        min-width: 0;
      }
      #selects-row .select-row label {
        display: none;
      }
      /* Row 2: filename (shrinks with ellipsis) + duplicate + save. */
      #transport {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      #transport .status {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #canvas-area {
        order: 1;
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      #pixel-canvas {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        touch-action: none;
        image-rendering: pixelated;
        cursor: crosshair;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      #ref-grid img {
        width: 64px;
        image-rendering: pixelated;
        border: 1px solid var(--border);
        margin: 2px;
        background: #555;
      }
      #preview-area {
        order: 2;
      }
      #preview .pane {
        display: inline-block;
        text-align: center;
        margin: 0 6px;
      }
      #preview canvas {
        display: block;
        image-rendering: pixelated;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: #8caa8c;
        max-width: 100%;
        height: auto;
      }
      @media (orientation: landscape) {
        main.studio-main {
          flex-direction: row;
        }
        /* left column: dropdowns top, preview grid bottom */
        #side-col {
          display: flex;
          flex-direction: column;
          width: min(40%, 340px);
          min-width: 240px;
        }
        #preview-area {
          margin-top: auto;
        }
        #preview-area #preview {
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 4px;
        }
        /* right: the editor canvas */
        #canvas-area {
          flex: 1;
          min-height: 0;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Cx_mnWrt.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BSU1s74H.css">
  </head>
  <body>
    <div id="drawer-root"></div>
    <main class="studio-main" id="layout">
      <div id="side-col">
        <div id="top-row">
          <div id="selects-row">
            <span id="part-slot"></span>
            <span id="tool-slot"></span>
          </div>
          <div id="transport"></div>
        </div>
        <section id="preview-area">
          <div id="preview"></div>
        </section>
      </div>
      <section id="canvas-area">
        <canvas id="pixel-canvas"></canvas>
        <div id="ref-grid" class="scroll-y"></div>
      </section>
    </main>
    <div id="build-stamp">Sat Jul  4 00:54:05 EDT 2026</div>
  </body>
</html>
