<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio — Sprite Editor</title>
    <style>
      main.studio-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        min-height: 0;
      }
      #side-col {
        display: contents;
      }
      #top-row {
        order: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-left: 48px; /* clear the fixed hamburger button */
      }
      /* Row 1: the two dropdowns side by side, label text hidden (scoped —
         the drawer's selects keep their labels). */
      #selects-row {
        display: flex;
        gap: 8px;
      }
      #selects-row > span {
        flex: 1;
        min-width: 0;
      }
      #selects-row .select-row label {
        display: none;
      }
      /* Row 2: filename (shrinks with ellipsis) + duplicate + save. */
      #transport {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      #transport .status {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      /* Save-button feedback. The visible label and a hidden "saved!" ghost are
         stacked in the same grid cell, so the button is always sized for the
         wider word and never resizes when the label flips to "saved!". */
      #transport .save-btn {
        position: relative;
        display: inline-grid;
      }
      #transport .save-btn > span {
        grid-area: 1 / 1;
        text-align: center;
      }
      #transport .save-btn .save-ghost {
        visibility: hidden;
      }
      /* Pressed: darken like a real button being held down. */
      #transport .save-btn:active:not(:disabled) {
        filter: brightness(0.8);
      }
      /* Saving: hide the solid border and march a dotted marquee around the
         edge (four edge gradients scrolling in a continuous loop). */
      #transport .save-btn.is-saving {
        border-color: transparent;
      }
      #transport .save-btn.is-saving::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 4px;
        pointer-events: none;
        background-image:
          linear-gradient(90deg, var(--accent) 50%, transparent 50%),
          linear-gradient(90deg, var(--accent) 50%, transparent 50%),
          linear-gradient(0deg, var(--accent) 50%, transparent 50%),
          linear-gradient(0deg, var(--accent) 50%, transparent 50%);
        background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
        background-size: 6px 1px, 6px 1px, 1px 6px, 1px 6px;
        background-position: 0 0, 0 100%, 0 0, 100% 0;
        animation: save-marching-ants 0.5s infinite linear;
      }
      @keyframes save-marching-ants {
        to {
          background-position: 6px 0, -6px 100%, 0 -6px, 100% 6px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #transport .save-btn.is-saving::after {
          animation: none;
        }
      }
      #canvas-area {
        order: 1;
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      #pixel-canvas {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        touch-action: none;
        image-rendering: pixelated;
        cursor: crosshair;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      #ref-grid img {
        width: 64px;
        image-rendering: pixelated;
        border: 1px solid var(--border);
        margin: 2px;
        background: #555;
      }
      #preview-area {
        order: 2;
      }
      #preview .pane {
        display: inline-block;
        text-align: center;
        margin: 0 6px;
      }
      #preview canvas {
        display: block;
        image-rendering: pixelated;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: #8caa8c;
        max-width: 100%;
        height: auto;
      }
      @media (orientation: landscape) {
        main.studio-main {
          flex-direction: row;
        }
        /* left column: dropdowns top, preview grid bottom */
        #side-col {
          display: flex;
          flex-direction: column;
          width: min(40%, 340px);
          min-width: 240px;
        }
        #preview-area {
          margin-top: auto;
        }
        #preview-area #preview {
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 4px;
        }
        /* right: the editor canvas */
        #canvas-area {
          flex: 1;
          min-height: 0;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Cryf5K28.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BPh0Ro2i.css">
  </head>
  <body>
    <div id="drawer-root"></div>
    <main class="studio-main" id="layout">
      <div id="side-col">
        <div id="top-row">
          <div id="selects-row">
            <span id="part-slot"></span>
            <span id="tool-slot"></span>
          </div>
          <div id="transport"></div>
        </div>
        <section id="preview-area">
          <div id="preview"></div>
        </section>
      </div>
      <section id="canvas-area">
        <canvas id="pixel-canvas"></canvas>
        <div id="ref-grid" class="scroll-y"></div>
      </section>
    </main>
    <div id="build-stamp">Thu Jul  2 23:12:26 EDT 2026</div>
  </body>
</html>
