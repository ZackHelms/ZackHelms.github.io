<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio — Sound Editor</title>
    <style>
      main.studio-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        min-height: 0;
      }
      #top-row {
        padding-left: 48px; /* clear the fixed hamburger button */
      }
      #transport {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      #editor {
        flex: 1;
        min-height: 0;
      }
      #editor .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0;
      }
      #editor .row label {
        min-width: 90px;
        color: var(--muted);
      }
      #editor input[type='range'] {
        flex: 1;
      }
      #editor .osc {
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 10px;
        margin: 8px 0;
      }
      @media (orientation: landscape) {
        main.studio-main {
          flex-direction: row;
        }
        #top-row {
          width: min(40%, 300px);
          min-width: 240px;
        }
        #editor {
          flex: 1;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BqkyyeKT.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DrVYjEjo.css">
  </head>
  <body>
    <div id="drawer-root"></div>
    <main class="studio-main" id="layout">
      <div id="top-row">
        <div id="transport"></div>
      </div>
      <div id="editor" class="scroll-y"></div>
    </main>
    <div id="build-stamp">Sun Jul  5 15:09:19 EDT 2026</div>
  </body>
</html>
