<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio — Sound Editor</title>
    <style>
      main.studio-main {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 16px;
        align-items: start;
      }
      #asset-list .entry {
        display: block;
        width: 100%;
        text-align: left;
        margin: 4px 0;
      }
      #asset-list .entry.selected {
        border-color: var(--accent);
        color: var(--accent);
      }
      #editor .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0;
      }
      #editor .row label {
        min-width: 110px;
        color: var(--muted);
      }
      #editor input[type='range'] {
        flex: 1;
      }
      #editor .osc {
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 10px;
        margin: 8px 0;
      }
      #transport {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BocD8V9_.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Ch_P6dwh.css">
  </head>
  <body>
    <header class="studio-bar">
      <h1><a href="../" style="color: inherit; text-decoration: none">JRPG Studio</a> · Sound Editor</h1>
      <span id="game-slot"></span>
      <span class="spacer"></span>
      <span id="auth-slot"></span>
    </header>
    <main class="studio-main">
      <section class="panel" id="list-panel">
        <div id="kind-tabs"></div>
        <div id="asset-list"></div>
        <div id="list-actions"></div>
      </section>
      <section class="panel" id="editor-panel">
        <div id="editor"></div>
        <div id="transport"></div>
      </section>
    </main>
    <div id="build-stamp">Wed Jul  1 22:00:11 EDT 2026</div>
  </body>
