<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio — Music Editor</title>
    <style>
      main.studio-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        min-height: 0;
      }
      #side-col {
        display: contents;
      }
      #top-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        padding-left: 48px; /* clear the fixed hamburger button */
      }
      #transport {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      #score-fields-content .row,
      #track-controls .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
      }
      #score-fields-content .row label {
        min-width: 90px;
        color: var(--muted);
      }
      #score-fields summary {
        cursor: pointer;
        color: var(--muted);
      }
      #grid-scroll {
        flex: 1;
        min-height: 0;
        overflow: auto; /* the note grid is intrinsically larger than the screen — pans both axes */
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      #grid-scroll canvas {
        display: block;
        image-rendering: pixelated;
        cursor: crosshair;
      }
      @media (orientation: landscape) {
        main.studio-main {
          flex-direction: row;
        }
        /* left column: transport/track select top, score settings below */
        #side-col {
          display: flex;
          flex-direction: column;
          width: min(40%, 340px);
          min-width: 240px;
        }
        #top-row {
          flex-direction: column;
          align-items: stretch;
        }
        /* right: the note grid */
        #grid-scroll {
          flex: 1;
          min-height: 0;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DmUG93Xf.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DrVYjEjo.css">
  </head>
  <body>
    <div id="drawer-root"></div>
    <main class="studio-main" id="layout">
      <div id="side-col">
        <div id="top-row">
          <span id="track-slot"></span>
          <span id="transport"></span>
        </div>
        <div id="track-controls"></div>
        <details id="score-fields">
          <summary>score settings</summary>
          <div id="score-fields-content"></div>
        </details>
      </div>
      <div id="grid-scroll"></div>
    </main>
    <div id="build-stamp">Sun Jul  5 17:28:09 EDT 2026</div>
  </body>
</html>
