<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio — Music Editor</title>
    <style>
      main.studio-main {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 16px;
        align-items: start;
      }
      #score-list .entry {
        display: block;
        width: 100%;
        text-align: left;
        margin: 4px 0;
      }
      #score-list .entry.selected {
        border-color: var(--accent);
        color: var(--accent);
      }
      #score-fields .row,
      #tracks .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
      }
      #score-fields .row label {
        min-width: 90px;
        color: var(--muted);
      }
      #tracks .track {
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 10px;
        margin: 6px 0;
      }
      #tracks .track.editing {
        border-color: var(--accent);
      }
      #grid-scroll {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 4px;
        margin-top: 10px;
      }
      #grid-scroll canvas {
        display: block;
        image-rendering: pixelated;
        cursor: crosshair;
      }
      #transport {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CWALHIiz.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Ch_P6dwh.css">
  </head>
  <body>
    <header class="studio-bar">
      <h1><a href="../" style="color: inherit; text-decoration: none">JRPG Studio</a> · Music Editor</h1>
      <span id="game-slot"></span>
      <span class="spacer"></span>
      <span id="auth-slot"></span>
    </header>
    <main class="studio-main">
      <section class="panel" id="list-panel">
        <div id="score-list"></div>
        <div id="list-actions"></div>
      </section>
      <section class="panel" id="editor-panel">
        <div id="score-fields"></div>
        <div id="tracks"></div>
        <div id="grid-scroll"></div>
        <div id="transport"></div>
      </section>
    </main>
    <div id="build-stamp">Thu Jul  2 00:33:57 EDT 2026</div>
  </body>
</html>
