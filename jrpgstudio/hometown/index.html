<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>JRPG Studio — Hometown</title>
    <!-- Retro pixel title font is self-hosted: @font-face lives in src/fonts.css
         (imported from main.ts so Vite fingerprints the .woff2). Zero runtime CDN
         dependency; the canvas title falls back to monospace until it loads. -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        display: grid;
        place-items: center;
      }
      /* Suppress iOS Safari's long-press magnifying-glass loupe over the game
         surface (it can pop when pressing the on-screen D-pad certain ways).
         touch-action stays "manipulation", not "none" — the touch D-pad
         (packages/engine/runtime/src/controls/touchControls.ts) relies on
         pointerdown/pointermove reaching the page. */
      body,
      #game canvas {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
      }
      #game canvas {
        image-rendering: pixelated;
      }
      /* Publish stamp: empty in dev; publish.sh injects the build date here so
         it's clear which version is live. Lower-right corner, gray. Clickable
         in published builds — opens the changelog modal (a no-op in dev, where
         the stamp is empty and there is no ./changelog.json to fetch). */
      #build-stamp {
        position: fixed;
        right: 4px;
        bottom: 3px;
        color: #808080;
        font: 11px/1 ui-monospace, monospace;
        pointer-events: auto;
        cursor: pointer;
        user-select: none;
      }
      /* Full-screen changelog modal (polish-01 #15): dark scrim + opaque panel,
         top-right ✕, Esc to close, scrollable body. Framework-free. */
      #changelog-modal[hidden] {
        display: none;
      }
      #changelog-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #changelog-scrim {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
      }
      #changelog-panel {
        position: relative;
        width: min(680px, calc(100vw - 32px));
        max-height: calc(100vh - 48px);
        display: flex;
        flex-direction: column;
        background: #1a1a22;
        color: #e8e8f0;
        border: 1px solid #34344a;
        border-radius: 8px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
        font: 14px/1.5 ui-monospace, monospace;
      }
      #changelog-panel h2 {
        margin: 0;
        padding: 16px 20px;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-bottom: 1px solid #34344a;
      }
      #changelog-close {
        position: absolute;
        top: 10px;
        right: 12px;
        background: transparent;
        color: #8a8aa0;
        border: none;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 4px 8px;
      }
      #changelog-close:hover,
      #changelog-close:focus-visible {
        color: #e8e8f0;
        outline: none;
      }
      #changelog-body {
        overflow-y: auto;
        padding: 8px 20px 20px;
      }
      #changelog-body .cl-group {
        margin: 16px 0 0;
      }
      #changelog-body .cl-date {
        font-size: 12px;
        color: #7fd4a0;
        letter-spacing: 0.04em;
        margin: 0 0 6px;
      }
      #changelog-body ul {
        margin: 0;
        padding-left: 18px;
      }
      #changelog-body li {
        margin: 3px 0;
        color: #c8c8d8;
      }
      #changelog-body .cl-empty {
        color: #8a8aa0;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-OIBtVpCt.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-B4uJQZTa.css">
  </head>
  <body>
    <div id="game"></div>
    <div id="build-stamp">Tue Jul  7 06:54:08 EDT 2026</div>
    <div id="changelog-modal" hidden>
      <div id="changelog-scrim"></div>
      <div id="changelog-panel" role="dialog" aria-modal="true" aria-label="Changelog">
        <button id="changelog-close" type="button" aria-label="Close changelog">✕</button>
        <h2>Changelog</h2>
        <div id="changelog-body"></div>
      </div>
    </div>
    <!-- Changelog modal wiring (polish-01 #15). Published-only: the build-stamp
         is empty in dev and there is no ./changelog.json, so the click is a safe
         no-op. Same inline snippet lives in apps/landing/index.html. -->
    <script>
      (() => {
        const stamp = document.getElementById('build-stamp');
        const modal = document.getElementById('changelog-modal');
        if (!stamp || !modal) return;
        const body = document.getElementById('changelog-body');
        const closeBtn = document.getElementById('changelog-close');
        const scrim = document.getElementById('changelog-scrim');
        const esc = (s) =>
          String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
        const onKey = (e) => {
          if (e.key === 'Escape') closeModal();
        };
        const closeModal = () => {
          modal.hidden = true;
          document.removeEventListener('keydown', onKey);
        };
        const openModal = () => {
          modal.hidden = false;
          document.addEventListener('keydown', onKey);
          if (closeBtn) closeBtn.focus();
        };
        const render = (data) => {
          const groups = data && Array.isArray(data.groups) ? data.groups : [];
          if (!groups.length) {
            body.innerHTML = '<p class="cl-empty">No changes recorded yet.</p>';
            return;
          }
          body.innerHTML = groups
            .map((g) => {
              const entries = Array.isArray(g.entries) ? g.entries : [];
              const items = entries.map((e) => '<li>' + esc(e) + '</li>').join('');
              return (
                '<div class="cl-group"><p class="cl-date">' +
                esc(g.datetime || '') +
                '</p><ul>' +
                items +
                '</ul></div>'
              );
            })
            .join('');
        };
        stamp.addEventListener('click', () => {
          // Dev builds leave the stamp empty — no stamp, no modal.
          if (!stamp.textContent?.trim()) return;
          fetch('./changelog.json', { cache: 'no-store' })
            .then((r) => {
              if (!r.ok) throw new Error('no changelog');
              return r.json();
            })
            .then((data) => {
              render(data);
              openModal();
            })
            .catch(() => {
              /* 404 / parse error (dev): safe no-op */
            });
        });
        if (closeBtn) closeBtn.addEventListener('click', closeModal);
        if (scrim) scrim.addEventListener('click', closeModal);
      })();
    </script>
  </body>
</html>
