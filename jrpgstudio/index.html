<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JRPG Studio</title>
    <style>
      :root {
        --bg: #14141c;
        --panel: #1e1e2a;
        --border: #34344a;
        --text: #e8e8f0;
        --muted: #8a8aa0;
        --accent: #7fd4a0;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.6 ui-monospace, 'Cascadia Mono', 'Source Code Pro', monospace;
      }
      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      h1 {
        font-size: 26px;
        letter-spacing: 0.06em;
        margin: 0 0 4px;
      }
      p.tagline {
        color: var(--muted);
        margin: 0 0 32px;
      }
      h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        padding-bottom: 6px;
        margin: 28px 0 12px;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li {
        margin: 8px 0;
      }
      a.entry,
      span.entry {
        display: block;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 16px;
        text-decoration: none;
        color: var(--text);
      }
      a.entry:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      span.entry {
        color: var(--muted);
      }
      span.entry .soon {
        float: right;
        font-size: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1px 8px;
      }
      /* Publish stamp: empty in dev; publish.sh injects the build date here so
         it's clear which version is live. Lower-right corner, gray (ADR-0007). */
      #build-stamp {
        position: fixed;
        right: 4px;
        bottom: 3px;
        color: #808080;
        font: 11px/1 ui-monospace, monospace;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JRPG Studio</h1>
      <p class="tagline">Classic 16-bit JRPGs, and the tools that build them.</p>

      <h2>Games</h2>
      <ul>
        <li><a class="entry" href="./hometown/">Home Town</a></li>
      </ul>

      <h2>Tools</h2>
      <ul>
        <li><a class="entry" href="./sound-editor/">Sound Editor</a></li>
        <li><a class="entry" href="./music-editor/">Music Editor</a></li>
        <li><a class="entry" href="./sprite-editor/">Sprite Editor</a></li>
      </ul>
    </main>
    <div id="build-stamp">Sat Jul  4 05:38:03 EDT 2026</div>
  </body>
</html>
