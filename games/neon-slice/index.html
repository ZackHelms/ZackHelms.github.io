<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Neon Slice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06060e; --panel:#0b0b16; --border:#1a1a30;
  --green:#39ff14; --gold:#ffc300; --blue:#4488ff; --red:#ff2244;
  --white:#dde3ff; --dim:#8899bb; --purple:#b44fff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; background:var(--bg); overflow:hidden;
  font-family:'Share Tech Mono', monospace; color:var(--white);
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  overscroll-behavior:none;
}
#app { display:flex; flex-direction:column; height:100dvh; }
#hud {
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) 14px 6px;
  gap:6px; font-size:0.72rem;
}
.hud-label { font-size:0.52rem; letter-spacing:2px; color:var(--dim); }
.hud-val { font-size:0.95rem; line-height:1.15; }
#h-score .hud-val { color:var(--green); }
#h-combo .hud-val { color:var(--purple); }
#h-best .hud-val { color:var(--gold); }
#h-best { text-align:right; }
#h-lives .hud-val { letter-spacing:3px; }
.hh { color:var(--red); text-shadow:0 0 8px rgba(255,34,68,0.65); }
.hh.off { color:#2a0d16; text-shadow:none; }
#game { flex:1; display:block; width:100%; touch-action:none; }
.overlay {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(6,6,14,0.88); text-align:center; padding:24px;
  touch-action:none;
}
.overlay.hidden { display:none; }
.ov-title {
  font-family:'Black Ops One', sans-serif; font-size:1.9rem; letter-spacing:4px;
  color:var(--green); text-shadow:0 0 24px rgba(57,255,20,0.7); margin-bottom:14px;
}
.ov-sub { font-size:0.75rem; color:var(--dim); letter-spacing:1px; line-height:2; margin-bottom:26px; }
.ov-score {
  font-family:'Black Ops One', sans-serif; font-size:1.5rem; letter-spacing:3px;
  color:var(--gold); text-shadow:0 0 18px rgba(255,195,0,0.6); margin-bottom:8px;
}
.ov-tap {
  font-size:0.85rem; color:var(--white); letter-spacing:3px;
  border:1px solid var(--border); background:var(--panel);
  padding:12px 26px; border-radius:8px;
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
#banner {
  position:fixed; left:0; right:0; top:26%; z-index:40; text-align:center;
  pointer-events:none; opacity:0; transition:opacity 0.25s;
}
#banner.show { opacity:1; }
#banner .b-big {
  font-family:'Black Ops One', sans-serif; font-size:1.4rem; letter-spacing:4px;
  color:var(--gold); text-shadow:0 0 22px rgba(255,195,0,0.8);
}
</style>
</head>
<body>
<div id="build-badge" style="position:fixed;top:2px;right:6px;z-index:2147483647;font-family:'Courier New',monospace;font-size:9px;color:#888;opacity:0.55;pointer-events:none;letter-spacing:0.5px;user-select:none;">build 2026-07-24 07:01 UTC</div>
<div id="app">
  <div id="hud">
    <div id="h-score"><div class="hud-label">SCORE</div><div class="hud-val" id="v-score">0</div></div>
    <div id="h-combo"><div class="hud-label">COMBO</div><div class="hud-val" id="v-combo">&ndash;</div></div>
    <div id="h-lives"><div class="hud-label">LIVES</div><div class="hud-val" id="v-lives"></div></div>
    <div id="h-best"><div class="hud-label">BEST</div><div class="hud-val" id="v-best">0</div></div>
  </div>
  <canvas id="game"></canvas>
</div>

<div id="banner"><div class="b-big" id="b-big"></div></div>

<div class="overlay" id="ov-start">
  <div class="ov-title">NEON SLICE</div>
  <div class="ov-sub">
    SWIPE TO SLICE THE GEMS<br>
    CHAIN COMBOS IN ONE SWIPE<br>
    DON'T SLICE THE BOMBS<br>
    DON'T DROP THE GEMS
  </div>
  <div class="ov-tap">TAP TO SLICE</div>
</div>

<div class="overlay hidden" id="ov-dead">
  <div class="ov-title" style="color:var(--red); text-shadow:0 0 24px rgba(255,34,68,0.7);" id="d-title">GAME OVER</div>
  <div class="ov-score" id="d-score">0</div>
  <div class="ov-sub" id="d-sub"></div>
  <div class="ov-tap">TAP TO SLICE AGAIN</div>
</div>

<script>
'use strict';
// ---------- constants
const UW = 100, UH = 200;               // portrait unit space
const G = 130;                          // gravity, u/s^2
const GEM_R = 5, GOLD_R = 6;
const GEM_COLS  = ['#4488ff', '#b44fff', '#39ff14', '#dde3ff'];   // orb, diamond, hex, tri
const GEM_FILLS = ['rgba(68,136,255,0.20)', 'rgba(180,79,255,0.20)',
                   'rgba(57,255,20,0.16)', 'rgba(221,227,255,0.16)'];
const GOLD_COL = '#ffc300', GOLD_FILL = 'rgba(255,195,0,0.22)';
const BOMB_COL = '#ff2244';
const BLADE_MIN_SPEED = 90;             // u/s — a resting finger must not slice
const TRAIL_LIFE = 0.16, TRAIL_MAX = 40;
const COMBO_WINDOW = 0.3;               // s between slices to keep the chain
const SLOWMO_AT = 4, SLOWMO_SCALE = 0.35, SLOWMO_TIME = 0.4;
const VOLLEY_GAP0 = 2.6, VOLLEY_GAP_MIN = 1.25, VOLLEY_GAP_RAMP = 0.012;
const FRENZY_AFTER = 20, FRENZY_CHANCE = 0.1, FRENZY_COOLDOWN = 12;
const BOMB_GRACE = 8;                   // no bombs in the first seconds
const BOMB_CHANCE0 = 0.03, BOMB_CHANCE_RAMP = 0.0016, BOMB_CHANCE_MAX = 1 / 6;
const GOLD_CHANCE = 1 / 12;
const BASE_PTS = 10, MINUTE_BONUS = 2, GOLD_MULT = 5;
const LIVES0 = 3;
const FREEZE_TIME = 0.4, FLASH_TIME = 0.5;
const TAU = Math.PI * 2;

// ---------- state
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let dpr = 1, cw = 0, ch = 0, scale = 1, ox = 0, oy = 0, crect = null;

let state = 'title';                    // title | play | over
let simTime = 0, playT = 0, deathT = 0;
let gems = [];                          // {x,y,vx,vy,r,rot,vr,type,bomb,gold}
let pending = [];                       // {t,g} volley items on stagger delay
let pieces = [];                        // sliced gem halves
let particles = [];
let popups = [];
let trail = [];                         // blade samples {x,y,t} (unit space, real s)
let blade = false;
let lastSX = 0, lastSY = 0, lastST = 0;
let volleyTimer = 0.8, lastFrenzyT = -99;
let scoreV = 0, comboN = 0, comboT = 0;
let lives = LIVES0;
let gemsSliced = 0, maxCombo = 0;
let slowmoT = 0, freezeT = 0, flashT = 0, shake = 0;
let best = 0;
try { best = +(localStorage.getItem('neonSlice.best') || 0); } catch (e) {}

const $ = id => document.getElementById(id);

// ---------- audio
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq, dur, type, gain, slideTo) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(gain || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sndSlice  = n => beep(300 + Math.min(n, 8) * 70, 0.07, 'sawtooth', 0.06, 1300);
const sndGold   = () => { beep(880, 0.08, 'sine', 0.12); setTimeout(() => beep(1318, 0.12, 'sine', 0.11), 70); };
const sndBomb   = () => { beep(90, 0.5, 'sawtooth', 0.22, 30); setTimeout(() => beep(60, 0.4, 'square', 0.14, 25), 60); };
const sndMiss   = () => beep(280, 0.25, 'square', 0.08, 110);
const sndCombo  = n => { beep(520, 0.07, 'sine', 0.12); setTimeout(() => beep(660, 0.07, 'sine', 0.12), 60); setTimeout(() => beep(880 + n * 40, 0.12, 'sine', 0.12), 120); };
const sndFrenzy = () => { beep(440, 0.09, 'square', 0.08); setTimeout(() => beep(587, 0.09, 'square', 0.08), 90); setTimeout(() => beep(880, 0.16, 'square', 0.08), 180); };
const sndOver   = () => { beep(240, 0.4, 'sawtooth', 0.16, 40); setTimeout(() => beep(150, 0.5, 'square', 0.1, 30), 90); };

// ---------- layout
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  cw = canvas.clientWidth; ch = canvas.clientHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const pad = 6;
  scale = Math.min((cw - pad * 2) / UW, (ch - pad * 2) / UH);
  ox = (cw - UW * scale) / 2;
  oy = (ch - UH * scale) / 2;
  crect = canvas.getBoundingClientRect();
}
const px = x => ox + x * scale;
const py = y => oy + y * scale;

// ---------- flow
function reset() {
  simTime = 0; playT = 0; deathT = 0;
  gems.length = 0; pending.length = 0; pieces.length = 0;
  particles.length = 0; popups.length = 0; trail.length = 0;
  blade = false;
  volleyTimer = 0.8; lastFrenzyT = -99;
  scoreV = 0; comboN = 0; comboT = 0;
  lives = LIVES0; gemsSliced = 0; maxCombo = 0;
  slowmoT = 0; freezeT = 0; flashT = 0; shake = 0;
  state = 'play';
  updateHud();
}
function updateHud() {
  $('v-score').textContent = scoreV;
  $('v-combo').textContent = comboN > 0 ? 'x' + comboN : '–';
  let h = '';
  for (let i = 0; i < LIVES0; i++) h += '<span class="hh' + (i < lives ? '' : ' off') + '">♥</span>';
  $('v-lives').innerHTML = h;
  $('v-best').textContent = best;
}
function showBanner(t, ms, col) {
  const el = $('b-big');
  el.textContent = t;
  el.style.color = col || '#ffc300';
  el.style.textShadow = '0 0 22px ' + (col || 'rgba(255,195,0,0.8)');
  $('banner').classList.add('show');
  clearTimeout(showBanner.t);
  showBanner.t = setTimeout(() => $('banner').classList.remove('show'), ms || 900);
}
function loseLife() {
  lives = Math.max(0, lives - 1);
  updateHud();
  if (lives <= 0 && state === 'play') gameOver();
}
function gameOver() {
  state = 'over'; deathT = 0; blade = false;
  comboN = 0; comboT = 0;
  sndOver();
  const isBest = scoreV > best;
  if (isBest) {
    best = scoreV;
    try { localStorage.setItem('neonSlice.best', best); } catch (e) {}
  }
  setTimeout(() => {
    $('d-score').textContent = scoreV + (isBest ? '  ★ NEW BEST' : '');
    $('d-sub').innerHTML = 'GEMS SLICED ' + gemsSliced +
      '<br>BEST COMBO ' + (maxCombo > 1 ? 'x' + maxCombo : '–') +
      '<br>BEST ' + best;
    $('ov-dead').classList.remove('hidden');
    updateHud();
  }, 700);
}

// ---------- gems + volleys
function makeGem(o) {
  o = o || {};
  return {
    x: o.x !== undefined ? o.x : UW / 2,
    y: o.y !== undefined ? o.y : UH + GEM_R,
    vx: o.vx !== undefined ? o.vx : 0,
    vy: o.vy !== undefined ? o.vy : 0,
    r: o.r !== undefined ? o.r : (o.gold ? GOLD_R : GEM_R),
    type: o.type !== undefined ? o.type : (Math.random() * 4) | 0,
    bomb: !!o.bomb, gold: !!o.gold,
    rot: Math.random() * TAU,
    vr: (Math.random() - 0.5) * 3.4,
  };
}
function launchItem(bomb, gold) {
  const x0 = 15 + Math.random() * (UW - 30);
  const rise = UH * (0.62 + Math.random() * 0.3);       // apex ends up 8–38% from top
  const vy = -Math.sqrt(2 * G * rise);
  const vx = (UW / 2 - x0) * 0.28 + (Math.random() - 0.5) * 24;
  return makeGem({ x: x0, y: UH + GEM_R + 2, vx, vy, bomb, gold });
}
function bombChance() {
  if (playT < BOMB_GRACE) return 0;
  return Math.min(BOMB_CHANCE_MAX, BOMB_CHANCE0 + playT * BOMB_CHANCE_RAMP);
}
function launchVolley() {
  let frenzy = false;
  if (playT > FRENZY_AFTER && playT - lastFrenzyT > FRENZY_COOLDOWN && Math.random() < FRENZY_CHANCE) {
    frenzy = true; lastFrenzyT = playT;
  }
  let n;
  if (frenzy) {
    n = 6 + ((Math.random() * 3) | 0);                  // 6–8
  } else {
    const hi = Math.min(4, 2 + ((playT / 40) | 0));
    const lo = playT > 50 ? 2 : 1;
    n = lo + ((Math.random() * (hi - lo + 1)) | 0);
  }
  // fairness: never more bombs than slice-able gems in a volley
  const bombCap = frenzy ? 1 : (n >> 1);
  const bc = bombChance();
  let bombs = 0;
  for (let i = 0; i < n; i++) {
    const bomb = bombs < bombCap && Math.random() < bc;
    if (bomb) bombs++;
    const gold = !bomb && Math.random() < GOLD_CHANCE;
    pending.push({ t: i * (frenzy ? 0.11 : 0.16) + Math.random() * 0.08, g: launchItem(bomb, gold) });
  }
  if (frenzy) { showBanner('FRENZY!', 1100, '#b44fff'); sndFrenzy(); }
}

// ---------- slicing
function segCircleHit(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2 - x1, dy = y2 - y1;
  const L2 = dx * dx + dy * dy;
  let t = L2 > 0 ? ((cx - x1) * dx + (cy - y1) * dy) / L2 : 0;
  if (t < 0) t = 0; else if (t > 1) t = 1;
  const qx = x1 + dx * t - cx, qy = y1 + dy * t - cy;
  return qx * qx + qy * qy <= r * r;
}
function sliceSegment(x1, y1, x2, y2) {
  if (state !== 'play' || freezeT > 0) return;
  const ang = Math.atan2(y2 - y1, x2 - x1);
  for (let i = gems.length - 1; i >= 0; i--) {
    const g = gems[i];
    if (!segCircleHit(x1, y1, x2, y2, g.x, g.y, g.r)) continue;
    gems[i] = gems[gems.length - 1]; gems.pop();
    if (g.bomb) { bombHit(g); break; }                  // bomb ends the swipe
    sliceGem(g, ang);
    if (state !== 'play') break;
  }
}
function sliceGem(g, ang) {
  gemsSliced++;
  const base = (BASE_PTS + MINUTE_BONUS * ((playT / 60) | 0)) * (g.gold ? GOLD_MULT : 1);
  scoreV += base;
  comboN++;
  if (comboN > maxCombo) maxCombo = comboN;
  comboT = COMBO_WINDOW;
  if (comboN >= SLOWMO_AT) slowmoT = SLOWMO_TIME;
  const col = g.gold ? GOLD_COL : GEM_COLS[g.type];
  spawnPieces(g, ang);
  burst(g.x, g.y, col, g.gold ? 26 : 12);
  addPopup(g.x, g.y - g.r - 2, '+' + base, col, g.gold ? 6 : 4.5);
  if (g.gold) sndGold(); else sndSlice(comboN);
  updateHud();
}
function bombHit(g) {
  sndBomb();
  burst(g.x, g.y, '#ff2244', 20);
  burst(g.x, g.y, '#dde3ff', 14);
  addPopup(g.x, g.y - g.r - 2, 'BOOM', '#ff2244', 6);
  flashT = FLASH_TIME;
  freezeT = FREEZE_TIME;
  shake = 0.7;
  comboN = 0; comboT = 0;
  loseLife();
}
function missGem(g) {
  addPopup(Math.max(8, Math.min(UW - 8, g.x)), UH - 10, 'MISS', '#ff2244', 5);
  shake = Math.max(shake, 0.3);
  sndMiss();
  loseLife();
}
function finalizeCombo() {
  if (comboN >= 2) {
    const bonus = comboN * comboN * 10;
    scoreV += bonus;
    showBanner('COMBO x' + comboN + ' +' + bonus, 900);
    sndCombo(comboN);
  }
  comboN = 0; comboT = 0;
  updateHud();
}

// ---------- fx
function spawnPieces(g, ang) {
  const nx = Math.cos(ang + Math.PI / 2), ny = Math.sin(ang + Math.PI / 2);
  for (let h = 0; h < 2; h++) {
    const s = h ? 1 : -1;
    pieces.push({
      x: g.x + nx * s * 0.8, y: g.y + ny * s * 0.8,
      vx: g.vx * 0.5 + nx * s * (22 + Math.random() * 14) + Math.cos(ang) * (Math.random() - 0.5) * 10,
      vy: g.vy * 0.5 + ny * s * (22 + Math.random() * 14) - 8,
      rot: ang, vr: s * (2.5 + Math.random() * 4),
      r: g.r, type: g.type, gold: g.gold, half: h, life: 1.1,
    });
  }
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * TAU, sp = 20 + Math.random() * 55;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 10, life: 0.3 + Math.random() * 0.35, c: color });
  }
}
function addPopup(x, y, txt, col, size) {
  popups.push({ x: Math.max(8, Math.min(UW - 8, x)), y, txt, col, size: size || 4.5, t: 0, life: 0.9 });
}
function updateFx(d) {
  for (let i = pieces.length - 1; i >= 0; i--) {
    const p = pieces[i];
    p.vy += G * 1.05 * d;
    p.x += p.vx * d; p.y += p.vy * d; p.rot += p.vr * d;
    p.life -= d;
    if (p.life <= 0 || p.y > UH + 14) { pieces[i] = pieces[pieces.length - 1]; pieces.pop(); }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += G * 0.4 * d;
    p.x += p.vx * d; p.y += p.vy * d;
    p.life -= d;
    if (p.life <= 0) { particles[i] = particles[particles.length - 1]; particles.pop(); }
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.t += d; p.life -= d;
    if (p.life <= 0) { popups[i] = popups[popups.length - 1]; popups.pop(); }
  }
}

// ---------- step
function step(dt) {
  playT += dt;

  // volley pacing
  volleyTimer -= dt;
  if (volleyTimer <= 0) {
    launchVolley();
    volleyTimer = Math.max(VOLLEY_GAP_MIN, VOLLEY_GAP0 - playT * VOLLEY_GAP_RAMP);
  }
  for (let i = pending.length - 1; i >= 0; i--) {
    pending[i].t -= dt;
    if (pending[i].t <= 0) {
      gems.push(pending[i].g);
      pending[i] = pending[pending.length - 1]; pending.pop();
    }
  }

  // gem physics
  for (let i = gems.length - 1; i >= 0; i--) {
    const g = gems[i];
    g.vy += G * dt;
    g.x += g.vx * dt; g.y += g.vy * dt;
    g.rot += g.vr * dt;
    if (g.x < g.r && g.vx < 0) g.vx = -g.vx;            // keep gems reachable
    else if (g.x > UW - g.r && g.vx > 0) g.vx = -g.vx;
    if (g.vy > 0 && g.y - g.r > UH + 6) {
      gems[i] = gems[gems.length - 1]; gems.pop();
      if (!g.bomb) {                                    // bombs fall harmlessly
        missGem(g);
        if (state !== 'play') return;
      }
    }
  }

  // combo window
  if (comboT > 0) {
    comboT -= dt;
    if (comboT <= 0) finalizeCombo();
  }
}

// ---------- input (blade)
let lastTap = 0;
function pointerPos(e) {
  const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  return [t.clientX, t.clientY];
}
function toUnit(e) {
  const [cxp, cyp] = pointerPos(e);
  return [(cxp - crect.left - ox) / scale, (cyp - crect.top - oy) / scale];
}
function bladeDown(e) {
  e.preventDefault(); audio();
  if (state !== 'play') return;
  crect = canvas.getBoundingClientRect();
  const [x, y] = toUnit(e);
  blade = true;
  lastSX = x; lastSY = y; lastST = performance.now() / 1000;
  trail.push({ x, y, t: lastST });
  if (trail.length > TRAIL_MAX) trail.shift();
}
function bladeMove(e) {
  e.preventDefault();
  if (!blade) return;
  const [x, y] = toUnit(e);
  const t = performance.now() / 1000;
  const dt = Math.max(0.004, t - lastST);
  const dist = Math.hypot(x - lastSX, y - lastSY);
  if (dist < 0.15) return;                              // ignore micro-jitter
  trail.push({ x, y, t });
  if (trail.length > TRAIL_MAX) trail.shift();
  if (dist / dt >= BLADE_MIN_SPEED) sliceSegment(lastSX, lastSY, x, y);
  lastSX = x; lastSY = y; lastST = t;
}
function bladeUp(e) {
  e.preventDefault();
  blade = false;
  if (comboT > 0) finalizeCombo();                      // swipe ended: bank the combo
}
canvas.addEventListener('touchstart', bladeDown, { passive: false });
canvas.addEventListener('touchmove', bladeMove, { passive: false });
canvas.addEventListener('touchend', bladeUp, { passive: false });
canvas.addEventListener('touchcancel', bladeUp, { passive: false });
canvas.addEventListener('mousedown', bladeDown);
window.addEventListener('mousemove', e => { if (blade) bladeMove(e); });
window.addEventListener('mouseup', e => { if (blade) bladeUp(e); });

function uiTap(e) {
  e.preventDefault();
  const now = performance.now();
  if (now - lastTap < 400) return;                      // iOS: touchend + click for one tap
  lastTap = now;
  audio();
  if (state === 'title') { $('ov-start').classList.add('hidden'); reset(); }
  else if (state === 'over' && deathT > 0.7) { $('ov-dead').classList.add('hidden'); reset(); }
}
$('ov-start').addEventListener('touchend', uiTap, { passive: false });
$('ov-start').addEventListener('click', uiTap);
$('ov-dead').addEventListener('touchend', uiTap, { passive: false });
$('ov-dead').addEventListener('click', uiTap);

// ---------- render
function drawGemPath(type, R) {
  ctx.beginPath();
  if (type === 0) {                                     // orb
    ctx.arc(0, 0, R * 0.92, 0, TAU);
  } else if (type === 1) {                              // diamond
    ctx.moveTo(0, -R * 1.2);
    ctx.lineTo(R * 0.78, 0);
    ctx.lineTo(0, R * 1.2);
    ctx.lineTo(-R * 0.78, 0);
    ctx.closePath();
  } else if (type === 2) {                              // hexagon
    for (let k = 0; k < 6; k++) {
      const a = -Math.PI / 2 + k * TAU / 6;
      if (k === 0) ctx.moveTo(Math.cos(a) * R, Math.sin(a) * R);
      else ctx.lineTo(Math.cos(a) * R, Math.sin(a) * R);
    }
    ctx.closePath();
  } else {                                              // triangle
    for (let k = 0; k < 3; k++) {
      const a = -Math.PI / 2 + k * TAU / 3;
      if (k === 0) ctx.moveTo(Math.cos(a) * R * 1.12, Math.sin(a) * R * 1.12);
      else ctx.lineTo(Math.cos(a) * R * 1.12, Math.sin(a) * R * 1.12);
    }
    ctx.closePath();
  }
}
function drawGem(g) {
  const R = g.r * scale;
  ctx.save();
  ctx.translate(px(g.x), py(g.y));
  if (g.bomb) {
    const pulse = 0.7 + 0.3 * Math.sin(simTime * 9 + g.vr * 10);
    ctx.rotate(g.rot * 0.4);
    ctx.shadowColor = BOMB_COL; ctx.shadowBlur = 18 * pulse;
    ctx.fillStyle = 'rgba(255,34,68,0.30)';
    ctx.beginPath(); ctx.arc(0, 0, R, 0, TAU); ctx.fill();
    ctx.strokeStyle = BOMB_COL; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#dde3ff'; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(-R * 0.42, -R * 0.42); ctx.lineTo(R * 0.42, R * 0.42);
    ctx.moveTo(R * 0.42, -R * 0.42); ctx.lineTo(-R * 0.42, R * 0.42);
    ctx.stroke();
    ctx.globalAlpha = 0.45 * pulse;
    ctx.strokeStyle = BOMB_COL; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, R * 1.35, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 1;
    // fuse spark
    const fr = R * (0.12 + 0.07 * Math.sin(simTime * 26));
    ctx.fillStyle = '#ffc300'; ctx.shadowColor = '#ffc300'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(0, -R * 1.15, Math.max(1, fr), 0, TAU); ctx.fill();
    ctx.shadowBlur = 0;
  } else {
    ctx.rotate(g.rot);
    const col = g.gold ? GOLD_COL : GEM_COLS[g.type];
    ctx.shadowColor = col; ctx.shadowBlur = g.gold ? 18 : 10;
    ctx.fillStyle = g.gold ? GOLD_FILL : GEM_FILLS[g.type];
    drawGemPath(g.type, R);
    ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.3; ctx.lineWidth = 1;           // inner facet echo
    drawGemPath(g.type, R * 0.55);
    ctx.stroke();
    ctx.globalAlpha = 1;
    if (g.gold) {                                       // rotating sparkle
      ctx.rotate(simTime * 1.5);
      ctx.strokeStyle = '#ffe27a'; ctx.lineWidth = 1; ctx.globalAlpha = 0.7;
      ctx.beginPath();
      for (let k = 0; k < 4; k++) {
        const a = k * Math.PI / 2;
        ctx.moveTo(Math.cos(a) * R * 0.35, Math.sin(a) * R * 0.35);
        ctx.lineTo(Math.cos(a) * R * 1.35, Math.sin(a) * R * 1.35);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}
function drawPiece(p) {
  const R = p.r * scale, gap = R * 0.08;
  const a = Math.min(1, p.life * 1.6);
  ctx.save();
  ctx.translate(px(p.x), py(p.y));
  ctx.rotate(p.rot);
  ctx.globalAlpha = a;
  ctx.beginPath();
  if (p.half) ctx.rect(-R * 2, gap, R * 4, R * 2 - gap);
  else ctx.rect(-R * 2, -R * 2, R * 4, R * 2 - gap);
  ctx.clip();
  const col = p.gold ? GOLD_COL : GEM_COLS[p.type];
  ctx.fillStyle = p.gold ? GOLD_FILL : GEM_FILLS[p.type];
  drawGemPath(p.type, R);
  ctx.fill();
  ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}
function drawTrail(tNow) {
  while (trail.length && tNow - trail[0].t > TRAIL_LIFE) trail.shift();
  if (trail.length < 2) return;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  for (let pass = 0; pass < 2; pass++) {
    for (let i = 0; i < trail.length - 1; i++) {
      const a = trail[i], b = trail[i + 1];
      const f = Math.max(0, 1 - (tNow - b.t) / TRAIL_LIFE);
      if (f <= 0) continue;
      ctx.strokeStyle = pass === 0
        ? 'rgba(68,136,255,' + (0.3 * f).toFixed(3) + ')'
        : 'rgba(221,227,255,' + (0.9 * f).toFixed(3) + ')';
      ctx.lineWidth = Math.max(0.5, (pass === 0 ? 2.4 : 0.8) * f * scale);
      ctx.beginPath();
      ctx.moveTo(px(a.x), py(a.y));
      ctx.lineTo(px(b.x), py(b.y));
      ctx.stroke();
    }
  }
}
function render() {
  const tNow = performance.now() / 1000;
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 14, (Math.random() - 0.5) * shake * 14);

  // arena
  ctx.fillStyle = '#0b0b16';
  ctx.fillRect(px(0), py(0), UW * scale, UH * scale);
  ctx.strokeStyle = 'rgba(68,136,255,0.05)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let gx = 10; gx < UW; gx += 10) { ctx.moveTo(px(gx), py(0)); ctx.lineTo(px(gx), py(UH)); }
  for (let gy = 10; gy < UH; gy += 10) { ctx.moveTo(px(0), py(gy)); ctx.lineTo(px(UW), py(gy)); }
  ctx.stroke();

  // drop line along the bottom edge
  ctx.strokeStyle = 'rgba(255,34,68,0.28)'; ctx.lineWidth = 1.5;
  ctx.shadowColor = '#ff2244'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(px(0), py(UH - 0.8)); ctx.lineTo(px(UW), py(UH - 0.8)); ctx.stroke();
  ctx.shadowBlur = 0;

  // entities
  for (const p of pieces) drawPiece(p);
  for (const g of gems) drawGem(g);

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.2);
    ctx.fillStyle = p.c;
    ctx.fillRect(px(p.x) - 1.5, py(p.y) - 1.5, 3, 3);
  }
  ctx.globalAlpha = 1;

  // blade trail
  drawTrail(tNow);

  // score popups
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const p of popups) {
    ctx.globalAlpha = Math.max(0, p.life < 0.35 ? p.life / 0.35 : 1);
    ctx.font = 'bold ' + Math.round(p.size * scale) + "px 'Share Tech Mono'";
    ctx.fillStyle = p.col;
    ctx.shadowColor = p.col; ctx.shadowBlur = 8;
    ctx.fillText(p.txt, px(p.x), py(p.y - p.t * 9));
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;

  // slow-mo tint
  if (slowmoT > 0) {
    ctx.fillStyle = 'rgba(180,79,255,0.07)';
    ctx.fillRect(0, 0, cw, ch);
  }

  // border
  ctx.strokeStyle = 'rgba(68,136,255,0.55)'; ctx.lineWidth = 2.5;
  ctx.shadowColor = '#4488ff'; ctx.shadowBlur = 10;
  ctx.strokeRect(px(0), py(0), UW * scale, UH * scale);
  ctx.shadowBlur = 0;

  ctx.restore();

  // bomb flash (over everything, unshaken)
  if (flashT > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * flashT / FLASH_TIME).toFixed(3) + ')';
    ctx.fillRect(0, 0, cw, ch);
  }
}

// ---------- main loop
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.1) dt = 0.1;
  simTime += dt;
  const dts = dt * (slowmoT > 0 ? SLOWMO_SCALE : 1);
  slowmoT = Math.max(0, slowmoT - dt);
  flashT = Math.max(0, flashT - dt);
  shake = Math.max(0, shake - dt);
  if (state === 'play') {
    if (freezeT > 0) freezeT = Math.max(0, freezeT - dt);   // hit-stop: world pauses
    else { step(dts); updateFx(dts); }
  } else {
    updateFx(dt);
  }
  if (state === 'over') deathT += dt;
  render();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => { resize(); setTimeout(resize, 250); });
resize();
updateHud();
requestAnimationFrame(frame);
</script>
</body>
