<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06060e; --panel:#0b0b16; --border:#1a1a30;
  --green:#39ff14; --gold:#ffc300; --blue:#4488ff; --cyan:#00e5ff;
  --red:#ff2244; --white:#dde3ff; --dim:#8899bb; --purple:#b44fff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--white);user-select:none;touch-action:manipulation;}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;align-items:center;overflow:hidden;}
.screen.active{display:flex;}

/* ── MAIN MENU ── */
#s-main{justify-content:center;gap:20px;padding:40px 20px;}
.title-glow{font-family:'Black Ops One',sans-serif;font-size:clamp(2.4rem,10vw,4rem);color:var(--green);text-shadow:0 0 30px #39ff1488,0 0 60px #39ff1444;letter-spacing:8px;text-align:center;}
.subtitle{font-size:0.65rem;color:var(--dim);letter-spacing:4px;margin-top:-12px;}
.menu-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;}
.btn{font-family:'Share Tech Mono',monospace;font-size:0.85rem;letter-spacing:2px;padding:14px 20px;background:var(--panel);border:1px solid var(--border);color:var(--white);cursor:pointer;border-radius:4px;transition:all 0.2s;text-transform:uppercase;}
.btn:hover,.btn:active{border-color:var(--green);color:var(--green);box-shadow:0 0 15px #39ff1433;background:#0d0d1a;}
.btn.gold{border-color:var(--gold);color:var(--gold);}
.btn.gold:hover{box-shadow:0 0 15px #ffc30033;}
.btn.red{border-color:var(--red);color:var(--red);}
.btn.red:hover{box-shadow:0 0 15px #ff224433;}
.btn.blue{border-color:var(--blue);color:var(--blue);}
.btn.blue:hover{box-shadow:0 0 15px #4488ff33;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{box-shadow:0 0 15px #39ff1433;}
.btn.dim{border-color:#333;color:#555;cursor:not-allowed;}
.btn.dim:hover{border-color:#333;color:#555;box-shadow:none;background:var(--panel);}
.btn.purple{border-color:var(--purple);color:var(--purple);}
.btn.purple:hover{box-shadow:0 0 15px #b44fff33;}

/* ── LOAD GAME ── */
#s-load{padding:20px;}
.screen-header{display:flex;align-items:center;gap:12px;width:100%;max-width:480px;margin-bottom:16px;}
.screen-title{font-family:'Black Ops One',sans-serif;font-size:1.2rem;color:var(--green);letter-spacing:4px;}
.saves-list{width:100%;max-width:480px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;padding-bottom:20px;}
.save-row{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.2s;}
.save-row:hover{border-color:var(--blue);}
.save-info{flex:1;}
.save-name{font-size:0.85rem;color:var(--white);}
.save-meta{font-size:0.62rem;color:var(--dim);margin-top:3px;}
.save-icons{font-size:1rem;letter-spacing:2px;}
.trash-btn{background:none;border:1px solid var(--border);color:var(--red);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:0.8rem;transition:all 0.2s;font-family:'Share Tech Mono',monospace;}
.trash-btn:hover{border-color:var(--red);box-shadow:0 0 10px #ff224433;}
.empty-saves{color:var(--dim);font-size:0.8rem;text-align:center;margin-top:40px;}

/* ── CHAR CREATE ── */
#s-create{padding:20px;gap:16px;overflow-y:auto;}
.progress-bar{display:flex;gap:8px;padding:0 0 4px;}
.prog-slot{width:52px;height:52px;border:2px solid var(--gold);border-radius:6px;background:var(--panel);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;overflow:hidden;}
.prog-slot.active{border-color:var(--gold);box-shadow:0 0 10px var(--gold);animation:pulse-gold 1.5s infinite;}
.prog-slot.filled{border-color:var(--dim);}
.prog-slot.filled:hover{border-color:var(--blue);box-shadow:0 0 8px #4488ff55;}
.prog-slot img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;display:block;}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 8px var(--gold);}50%{box-shadow:0 0 18px var(--gold),0 0 30px #ffc30044;}}
.create-section{width:100%;max-width:480px;}
.create-label{font-size:0.65rem;color:var(--dim);letter-spacing:3px;margin-bottom:10px;text-transform:uppercase;}
.type-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.type-card{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:14px 10px;cursor:pointer;transition:all 0.2s;text-align:center;}
.type-card:hover,.type-card.selected{border-color:var(--green);box-shadow:0 0 12px #39ff1433;}
.type-card.selected{background:#0d160d;}
.type-icon{font-size:1.8rem;margin-bottom:6px;}
.type-name{font-family:'Black Ops One',sans-serif;font-size:0.75rem;color:var(--green);letter-spacing:2px;}
.type-desc{font-size:0.58rem;color:var(--dim);margin-top:4px;line-height:1.5;}
.gender-cards{display:flex;gap:10px;}
.gender-card{flex:1;background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:10px 6px 10px;cursor:pointer;text-align:center;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.gender-card:hover,.gender-card.selected{border-color:var(--blue);box-shadow:0 0 12px #4488ff33;}
.gender-card.selected{background:#0a0d1a;}
.gender-card-label{font-size:0.65rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}
.gender-card-img{width:72px;height:72px;border-radius:4px;object-fit:cover;image-rendering:pixelated;}
.gender-card.selected .gender-card-label{color:var(--blue);}
.name-row{display:flex;gap:8px;align-items:center;}
.name-input{flex:1;background:var(--panel);border:1px solid var(--border);color:var(--white);font-family:'Share Tech Mono',monospace;font-size:0.9rem;padding:10px 12px;border-radius:4px;outline:none;}
.name-input:focus{border-color:var(--blue);}
.rand-btn{background:var(--panel);border:1px solid var(--border);color:var(--dim);padding:10px 12px;border-radius:4px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.75rem;transition:all 0.2s;white-space:nowrap;}
.rand-btn:hover{border-color:var(--purple);color:var(--purple);}

/* ── ADVENTURE FLOW ── */
#s-adventure{position:relative;}
.adv-topbar{width:100%;background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:10;flex-shrink:0;}
.adv-party-name{font-family:'Black Ops One',sans-serif;font-size:0.85rem;color:var(--green);letter-spacing:2px;flex:1;}
.adv-gold{font-size:0.75rem;color:var(--gold);}
.adv-party-btn{background:none;border:1px solid var(--border);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
.adv-party-btn:hover{border-color:var(--green);}
.adv-flow{flex:1;overflow-y:auto;padding:20px 20px 80px;display:flex;flex-direction:column;align-items:center;gap:0;}
.flow-node{display:flex;align-items:flex-start;gap:12px;width:100%;max-width:400px;margin-bottom:0;}
.flow-line-col{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;}
.flow-vert-line{width:2px;background:var(--border);flex:1;min-height:20px;}
.flow-vert-line.active-line{background:var(--green);}
.flow-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--panel);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;cursor:pointer;transition:all 0.2s;}
.flow-dot.completed{border-color:var(--dim);background:var(--dim);}
.flow-dot.current{border-color:var(--green);background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 1.5s infinite;}
.flow-dot.future{border-color:var(--border);opacity:0.4;}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--green);}50%{box-shadow:0 0 20px var(--green),0 0 40px #39ff1444;}}
.flow-content{flex:1;padding:8px 0 20px;}
.flow-node-title{font-family:'Black Ops One',sans-serif;font-size:0.8rem;color:var(--white);letter-spacing:2px;}
.flow-node-desc{font-size:0.65rem;color:var(--dim);margin-top:3px;line-height:1.5;}
.flow-node-action{margin-top:8px;}
.flow-choices{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.flow-choice-btn{background:var(--panel);border:1px solid var(--border);color:var(--white);padding:10px 14px;border-radius:4px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.72rem;text-align:left;transition:all 0.2s;line-height:1.4;}
.flow-choice-btn:hover{border-color:var(--blue);color:var(--blue);}
.flow-choice-label{font-size:0.8rem;color:var(--blue);}
.flow-choice-desc{font-size:0.62rem;color:var(--dim);margin-top:2px;}
.party-walker{font-size:1rem;margin-right:2px;}

/* ── COMBAT ── */
#s-combat{padding:0;gap:0;}
.combat-enemies{flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:14px 16px;background:linear-gradient(180deg,#08081a 0%,var(--bg) 100%);border-bottom:2px solid var(--border);}
.enemy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(92vw,420px);}
.enemy-tile{aspect-ratio:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;cursor:default;transition:border-color 0.2s,box-shadow 0.2s;overflow:hidden;}
.enemy-tile.targetable{cursor:pointer;}
.enemy-tile.targetable:hover{border-color:var(--gold);}
.enemy-tile.is-selected{border-color:var(--gold);box-shadow:0 0 10px #ffc30044;}
.enemy-tile.dead{opacity:0.25;cursor:default;}
.enemy-tile.empty-slot{border-color:transparent;background:transparent;pointer-events:none;}
.et-icon{font-size:2rem;line-height:1;}
.et-name{font-size:0.68rem;color:var(--white);text-align:center;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;}
.et-hp{width:88%;height:4px;background:#1a0a0a;border-radius:2px;margin-top:4px;overflow:hidden;}
.et-hp-fill{height:100%;background:var(--red);border-radius:2px;}
.et-hp-text{font-size:0.56rem;color:var(--dim);margin-top:2px;}
.combat-divider{font-size:0.6rem;color:var(--dim);letter-spacing:4px;padding:4px 0;background:var(--bg);width:100%;text-align:center;flex-shrink:0;}
.combat-party{flex:1;display:flex;flex-direction:column;padding:10px 16px;gap:8px;overflow-y:auto;min-height:0;}
.party-member-row.ally-targeted{border-color:var(--gold);box-shadow:0 0 10px #ffc30022;}
@keyframes invalid-flash{0%{border-color:var(--border);}40%{border-color:var(--red);box-shadow:0 0 8px #ff224455;}100%{border-color:var(--border);}}
.enemy-tile.invalid-flash{animation:invalid-flash 0.35s ease-out;}
.combat-actions{padding:6px 12px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.action-row{display:flex;gap:6px;flex-wrap:wrap;}
.action-btn{flex:1;min-width:80px;padding:10px 8px;background:var(--panel);border:1px solid var(--border);color:var(--white);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.72rem;border-radius:4px;transition:all 0.2s;text-align:center;}
.action-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);}
.action-btn:disabled{opacity:0.3;cursor:not-allowed;}
.action-label{font-size:0.6rem;color:var(--dim);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase;}
.party-member-row{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
.party-member-row.active{border-color:var(--cyan);box-shadow:0 0 10px #00e5ff22;}
.party-member-row.ko{opacity:0.4;}
.pm-icon{width:56px;height:56px;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;}.pm-icon img{width:56px;height:56px;object-fit:cover;image-rendering:pixelated;border-radius:4px;}.pm-icon.ko img{filter:grayscale(1) opacity(0.45);}.pm-icon.ko::after{content:'😵';position:absolute;font-size:1.1rem;}
.pm-info{flex:1;min-width:0;}
.pm-name{font-size:0.9rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm-hp-bar{height:6px;background:#1a0a0a;border-radius:3px;margin-top:4px;overflow:hidden;}
.pm-hp-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s;}
.pm-hp-fill.low{background:var(--gold);}
.pm-hp-fill.crit{background:var(--red);}
.pm-hp-text{font-size:0.7rem;color:var(--dim);margin-top:3px;}
.pm-status{font-size:0.65rem;color:var(--dim);flex-shrink:0;}
.pm-action-btns{display:flex;gap:6px;flex-shrink:0;}
.pm-action-btn{width:46px;height:46px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--white);cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;padding:0;}
.pm-action-btn:hover:not(:disabled){border-color:var(--green);}
.pm-action-btn.ready{border-color:var(--green);color:var(--green);background:#001800;box-shadow:0 0 8px #39ff1444;}
.pm-action-btn:disabled{opacity:0.3;cursor:not-allowed;}
.combat-log{height:72px;overflow-y:auto;padding:8px 14px;background:#050510;border-top:1px solid var(--border);flex-shrink:0;}
.log-line{font-size:0.72rem;color:var(--dim);line-height:1.6;}
.log-line.hit{color:var(--white);}
.log-line.dmg{color:var(--red);}
.log-line.good{color:var(--green);}
.log-line.info{color:var(--blue);}
@media(orientation:landscape){
  #s-combat{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr auto;grid-template-areas:"enemies party" "log log";}
  .combat-enemies{grid-area:enemies;border-right:2px solid var(--border);border-bottom:none;background:linear-gradient(90deg,#08081a 0%,var(--bg) 100%);flex:unset;}
  .combat-divider{display:none;}
  .combat-party{grid-area:party;overflow-y:auto;}
  .combat-log{grid-area:log;border-top:1px solid var(--border);}
  .enemy-grid{width:min(86%,280px);}
}

/* ── TRANSITION ── */
#transition-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;opacity:0;pointer-events:none;z-index:999;transition:opacity 0.5s;}

/* ── RP ENCOUNTER ── */
#s-rp{justify-content:flex-end;padding:0;}
.rp-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#04040c 0%,#0a0a18 100%);display:flex;align-items:center;justify-content:center;}
.rp-portrait-area{position:absolute;top:20%;left:50%;transform:translateX(-50%);font-size:5rem;text-align:center;}
.rp-dialog{width:100%;background:var(--panel);border-top:2px solid var(--border);padding:16px;z-index:5;flex-shrink:0;}
.rp-speaker{font-family:'Black Ops One',sans-serif;font-size:0.75rem;color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
.rp-text{font-size:0.78rem;color:var(--white);line-height:1.6;margin-bottom:14px;min-height:40px;}
.rp-choices{display:flex;flex-direction:column;gap:6px;}
.rp-choice-btn{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:10px 14px;border-radius:4px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.72rem;text-align:left;transition:all 0.2s;}
.rp-choice-btn:hover{border-color:var(--blue);color:var(--blue);}

/* ── PARTY STATUS ── */
#s-party{padding:0;}
.party-header{width:100%;background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.party-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;width:100%;}
.char-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px;width:100%;max-width:480px;margin:0 auto;}
.char-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.char-type-icon{width:56px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}.char-type-icon img{width:56px;height:56px;object-fit:cover;image-rendering:pixelated;border-radius:5px;}
.char-name-area{flex:1;}
.char-name{font-family:'Black Ops One',sans-serif;font-size:0.9rem;color:var(--white);letter-spacing:2px;}
.char-meta{font-size:0.62rem;color:var(--dim);margin-top:2px;}
.char-level{font-family:'Black Ops One',sans-serif;font-size:1rem;color:var(--gold);}
.xp-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.xp-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.3s;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:8px 0;}
.stat-item{font-size:0.65rem;color:var(--dim);}
.stat-item span{color:var(--white);}
.equip-section{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;}
.equip-label{font-size:0.6rem;color:var(--dim);letter-spacing:2px;margin-bottom:4px;}
.equip-name{font-size:0.75rem;color:var(--blue);}
.ability-slots{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;}
.ability-slot{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:6px 8px;font-size:0.62rem;}
.ability-slot.filled{border-color:var(--purple);color:var(--purple);}
.ability-slot.empty{color:#333;}
.monster-form{font-size:0.8rem;color:var(--green);margin-top:6px;}
.transform-hint{font-size:0.62rem;color:var(--dim);margin-top:3px;}

/* ── COMBAT RESULTS ── */
#s-results{justify-content:center;padding:20px;gap:16px;}
.results-title{font-family:'Black Ops One',sans-serif;font-size:1.4rem;color:var(--gold);letter-spacing:4px;text-shadow:0 0 20px #ffc30066;}
.results-content{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;display:flex;flex-direction:column;gap:8px;}
.result-line{font-size:0.78rem;color:var(--white);padding:4px 0;border-bottom:1px solid var(--border);}
.result-line:last-child{border-bottom:none;}
.result-line.good{color:var(--green);}
.result-line.xp{color:var(--gold);}
.result-line.loot{color:var(--blue);}

/* ── MODAL ── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:20px;width:100%;max-width:380px;}
.modal-title{font-family:'Black Ops One',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:3px;margin-bottom:10px;}
.modal-text{font-size:0.78rem;color:var(--dim);line-height:1.6;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap;}
.modal-btn{flex:1;min-width:100px;padding:10px;background:var(--bg);border:1px solid var(--border);color:var(--white);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.75rem;border-radius:4px;transition:all 0.2s;text-align:center;}
.modal-btn:hover{border-color:var(--green);color:var(--green);}
.modal-btn.danger{border-color:var(--red);color:var(--red);}
.modal-btn.danger:hover{box-shadow:0 0 10px #ff224433;}

/* ── LEVELUP BANNER ── */
#levelup-banner{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:none;align-items:center;justify-content:center;pointer-events:none;}
#levelup-banner.show{display:flex;animation:lvlflash 2s forwards;}
@keyframes lvlflash{0%{background:#00000000;}10%{background:#ffc30044;}90%{background:#ffc30000;}100%{background:#00000000;display:none;}}
.levelup-text{font-family:'Black Ops One',sans-serif;font-size:clamp(1.4rem,6vw,2.2rem);color:var(--gold);text-shadow:0 0 30px var(--gold);letter-spacing:4px;text-align:center;animation:lvltxt 2s forwards;}
@keyframes lvltxt{0%{opacity:0;transform:scale(0.5);}20%{opacity:1;transform:scale(1.1);}80%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0.9);}}

/* ── ITEM PICKER ── */
.item-picker{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;margin-bottom:10px;}
.item-pick-btn{background:var(--bg);border:1px solid var(--border);color:var(--white);padding:8px 12px;border-radius:4px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.72rem;text-align:left;transition:all 0.2s;display:flex;justify-content:space-between;}
.item-pick-btn:hover{border-color:var(--green);color:var(--green);}

/* ── MUTATION MODAL ── */
.mutation-slots{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.mut-slot-btn{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:8px 12px;border-radius:4px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.72rem;text-align:left;transition:all 0.2s;}
.mut-slot-btn:hover{border-color:var(--purple);color:var(--purple);}
.mut-slot-btn.filled{border-color:#333;color:#555;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- SCREENS -->
<div id="s-main" class="screen active">
  <div class="title-glow">ADVENTURE</div>
  <div class="subtitle">-- PATH TO THE UNKNOWN --</div>
  <div class="menu-btns">
    <button id="continue-btn" class="btn green" onclick="loadAutosave()" style="display:none">CONTINUE</button>
    <button class="btn gold" onclick="startNewGame()">NEW GAME</button>
    <button class="btn blue" onclick="showLoad()">LOAD GAME</button>
    <button class="btn dim">SETTINGS &nbsp;— COMING SOON</button>
  </div>
</div>

<div id="s-load" class="screen">
  <div class="screen-header">
    <button class="btn" style="padding:8px 14px;" onclick="showScreen('s-main')">← BACK</button>
    <div class="screen-title">LOAD GAME</div>
  </div>
  <div id="saves-list" class="saves-list"></div>
</div>

<div id="s-create" class="screen">
  <div class="progress-bar" id="prog-bar"></div>
  <div class="create-section">
    <div class="create-label" id="create-step-label">STEP</div>
    <div id="create-content"></div>
  </div>
  <div style="width:100%;max-width:480px;margin-top:10px;display:flex;gap:8px;">
    <button class="btn gold" id="create-confirm-btn" onclick="confirmCreateStep()" style="flex:1">CONFIRM</button>
    <button class="btn purple" id="create-allrandom-btn" onclick="randomizeAllChars()">ALL RANDOM</button>
  </div>
</div>

<div id="s-adventure" class="screen">
  <div class="adv-topbar">
    <div class="adv-party-name" id="adv-party-name">Party</div>
    <div class="adv-gold" id="adv-gold">💰 0</div>
    <button class="adv-party-btn" onclick="showPartyStatus()">👥</button>
    <button class="adv-party-btn" onclick="saveGame()">💾</button>
  </div>
  <div class="adv-flow" id="adv-flow"></div>
</div>

<div id="s-combat" class="screen">
  <div class="combat-enemies" id="combat-enemies"></div>
  <div class="combat-divider">── VS ──</div>
  <div class="combat-party" id="combat-party"></div>
  <div class="combat-log" id="combat-log"></div>
</div>

<div id="s-rp" class="screen">
  <div class="rp-bg">
    <div class="rp-portrait-area" id="rp-portrait"></div>
  </div>
  <div class="rp-dialog">
    <div class="rp-speaker" id="rp-speaker"></div>
    <div class="rp-text" id="rp-text"></div>
    <div class="rp-choices" id="rp-choices"></div>
  </div>
</div>

<div id="s-party" class="screen">
  <div class="party-header">
    <button class="btn" style="padding:8px 14px;" onclick="showScreen('s-adventure')">← BACK</button>
    <div class="screen-title">PARTY STATUS</div>
    <div style="flex:1"></div>
    <div class="adv-gold" id="party-gold">💰 0</div>
  </div>
  <div class="party-scroll" id="party-scroll"></div>
</div>

<div id="s-results" class="screen">
  <div class="results-title" id="results-title">VICTORY</div>
  <div class="results-content" id="results-content"></div>
  <button class="btn gold" style="width:100%;max-width:400px;" onclick="endCombat()">CONTINUE</button>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<div id="levelup-banner">
  <div class="levelup-text" id="levelup-text"></div>
</div>

<div id="transition-overlay"></div>

function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function chance(p){ return Math.random()<p; }

let _screenTimer = null;
function showScreen(id){
  if(_screenTimer){ clearTimeout(_screenTimer); _screenTimer=null; }
  const overlay = document.getElementById('transition-overlay');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'all';
  _screenTimer = setTimeout(()=>{
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el = document.getElementById(id);
    if(el) el.classList.add('active');
    if(id==='s-main') refreshMainMenu();
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    _screenTimer = null;
  }, 500);
}

function showModal(title, text, buttons){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;
  const bb = document.getElementById('modal-btns');
  bb.innerHTML = '';
  buttons.forEach(b=>{
    const btn = document.createElement('button');
    btn.className = 'modal-btn'+(b.cls?' '+b.cls:'');
    btn.textContent = b.label;
    btn.onclick = ()=>{ closeModal(); b.action && b.action(); };
    bb.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('active'); }

function showLevelUp(name, level){
  const banner = document.getElementById('levelup-banner');
  document.getElementById('levelup-text').textContent = `LEVEL UP!\n${name} — Lv.${level}`;
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), 2000);
}

function formatTS(ts){
  const d = new Date(ts);
  return d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function buildChar(type, gender, name){
  const t = CHAR_TYPES[type];
  const ch = {type, gender, name, level:1, xp:0};
  if(type === 'monster'){
    ch.form = 'dog';
    const fd = MONSTER_FORMS.dog;
    ch.maxHp = fd.hp; ch.hp = fd.hp;
    ch.str = 0; ch.dex = 0; ch.def = fd.def;
    ch.weapon = null; ch.armor = null;
  } else {
    ch.maxHp = t.startHP; ch.hp = t.startHP;
    ch.str = t.startSTR; ch.dex = t.startDEX; ch.def = t.startDEF;
    ch.weapon = t.startWeapon;
    ch.armor = null;
  }
  if(type === 'mutant'){
    const pool = [...ABILITIES].sort(()=>Math.random()-0.5);
    ch.abilities = [pool[0].id, pool[1].id, null, null];
  } else {
    ch.abilities = null;
  }
  ch.statusEffects = [];
  ch.ko = false;
  return ch;
}

function startNewGame(){
  createState = {charIndex:0, chars:[null,null,null,null], current:{type:null,gender:null,name:''}};
  renderCreateScreen();
  showScreen('s-create');
}

function renderCreateScreen(){
  const {charIndex, current} = createState;
  // progress dots
  const pb = document.getElementById('prog-bar');
  pb.innerHTML = '';
  for(let i=0;i<4;i++){
    const ch = createState.chars[i];
    const slot = document.createElement('div');
    if(ch){
      slot.className = 'prog-slot filled'+(i===charIndex?' active':'');
      const iconKey = ch.type==='monster'?'dog':ch.type;
      const imgSrc = CHAR_ICONS[iconKey]?.[ch.gender]||'';
      if(imgSrc) slot.innerHTML = `<img src="${imgSrc}" alt="${ch.name}">`;
      slot.title = `${ch.name} (tap to edit)`;
      slot.onclick = ()=>editChar(i);
    } else {
      slot.className = 'prog-slot'+(i===charIndex?' active':'');
      slot.title = `Character slot ${i+1}`;
      slot.onclick = ()=>jumpToSlot(i);
    }
    pb.appendChild(slot);
  }
  const allFilled = createState.chars.every(c=>c!==null);
  document.getElementById('create-step-label').textContent = allFilled?'PARTY READY — CONFIRM TO BEGIN':`CHARACTER ${charIndex+1} OF 4`;
  const confirmBtn = document.getElementById('create-confirm-btn');
  if(confirmBtn) confirmBtn.textContent = allFilled?'BEGIN ADVENTURE':'CONFIRM';

  const cont = document.getElementById('create-content');
  cont.innerHTML = '';

  // type selector
  const typeSection = document.createElement('div');
  typeSection.innerHTML = `<div class="create-label">CHOOSE TYPE</div>`;
  const cards = document.createElement('div');
  cards.className = 'type-cards';
  Object.entries(CHAR_TYPES).forEach(([key,t])=>{
    const card = document.createElement('div');
    card.className = 'type-card'+(current.type===key?' selected':'');
    card.innerHTML = `<div class="type-icon">${t.icon}</div><div class="type-name">${t.name.toUpperCase()}</div><div class="type-desc">${t.desc}</div>`;
    card.onclick = ()=>{
      const prev = createState.current.type;
      createState.current.type = key;
      if(prev !== key && createState.current.gender){
        const list = RANDOM_NAMES[key]?.[createState.current.gender]||[];
        if(list.length) createState.current.name = pick(list);
      }
      renderCreateScreen();
    };
    cards.appendChild(card);
  });
  typeSection.appendChild(cards);
  cont.appendChild(typeSection);

  // gender — only show if type is chosen
  if(current.type){
    const genSection = document.createElement('div');
    genSection.style.marginTop='14px';
    const genderOptions = [
      {key:'male', label:'MALE'},
      {key:'female', label:'FEMALE'},
      {key:'androgynous', label:'ANDROGYNOUS'},
    ];
    const cards = genderOptions.map(g=>{
      const imgSrc = CHAR_ICONS[current.type]?.[g.key] || '';
      const sel = current.gender===g.key?' selected':'';
      return `<div class="gender-card${sel}" onclick="createState.current.gender='${g.key}';createState.current.name='';randomizeName();renderCreateScreen();">
        <div class="gender-card-label">${g.label}</div>
        <img class="gender-card-img" src="${imgSrc}" alt="${g.label}">
      </div>`;
    }).join('');
    genSection.innerHTML = `<div class="create-label">CHOOSE GENDER</div><div class="gender-cards">${cards}</div>`;
    cont.appendChild(genSection);
  }

  // name — only show if both type and gender chosen
  if(current.type && current.gender){
    const nameSection = document.createElement('div');
    nameSection.style.marginTop='14px';
    nameSection.innerHTML = `<div class="create-label">NAME</div><div class="name-row">
      <input class="name-input" id="name-input" maxlength="12" placeholder="Enter name..." value="${current.name||''}">
      <button class="rand-btn" onclick="randomizeName()">RANDOM</button>
    </div>`;
    cont.appendChild(nameSection);
    const ni = document.getElementById('name-input');
    if(ni) ni.oninput = ()=>{ createState.current.name = ni.value; };
  }
}

function randomizeName(){
  const {type, gender} = createState.current;
  if(!type||!gender){ return; }
  const list = RANDOM_NAMES[type][gender];
  createState.current.name = pick(list);
  renderCreateScreen();
}

function editChar(i){
  const ch = createState.chars[i];
  if(!ch) return;
  createState.charIndex = i;
  createState.current = {type:ch.type, gender:ch.gender, name:ch.name};
  renderCreateScreen();
}

function jumpToSlot(i){
  if(createState.chars[i]!==null) return;
  createState.charIndex = i;
  createState.current = {type:null, gender:null, name:''};
  renderCreateScreen();
}

function randomizeAllChars(){
  const types = Object.keys(CHAR_TYPES);
  const genders = ['male','female'];
  const chars = [];
  for(let i=0;i<4;i++){
    const type = pick(types);
    const gender = pick(genders);
    const name = pick(RANDOM_NAMES[type][gender]);
    chars.push(buildChar(type, gender, name));
  }
  beginAdventure(chars);
}

function confirmCreateStep(){
  const {current} = createState;
  if(!current.type){ showModal('Missing Info','Please choose a type.',[{label:'OK'}]); return; }
  if(!current.gender){ showModal('Missing Info','Please choose a gender.',[{label:'OK'}]); return; }
  const name = (document.getElementById('name-input')?.value||'').trim();
  if(!name){ showModal('Missing Info','Please enter a name.',[{label:'OK'}]); return; }
  current.name = name;
  createState.chars[createState.charIndex] = buildChar(current.type, current.gender, current.name);
  if(createState.chars.every(c=>c!==null)){
    beginAdventure(createState.chars);
    return;
  }
  const nextEmpty = createState.chars.findIndex((c,i)=>c===null);
  createState.charIndex = nextEmpty;
  createState.current = {type:null, gender:null, name:''};
  renderCreateScreen();
}

const SAVE_KEY = 'adventure_saves';
const AUTOSAVE_KEY = 'adventure_autosave';

function getSaves(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY)||'[]'); }catch(e){ return []; } }
function putSaves(arr){ localStorage.setItem(SAVE_KEY, JSON.stringify(arr)); }

function autoSave(){
  if(!G||!G.party||!G.party.length) return;
  const obj = {
    saveId: G.saveId||null,
    timestamp: Date.now(),
    party: G.party,
    nodes: G.nodes,
    currentNodeId: G.currentNodeId,
    completedNodes: G.completedNodes,
    inventory: G.inventory,
    gold: G.gold,
    location: G.location,
    day: G.day,
    flags: G.flags,
  };
  try{ localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(obj)); }catch(e){}
}

function loadAutosave(){
  try{
    const sv = JSON.parse(localStorage.getItem(AUTOSAVE_KEY));
    if(!sv) return;
    G = {
      party: sv.party,
      nodes: sv.nodes,
      currentNodeId: sv.currentNodeId,
      completedNodes: sv.completedNodes,
      inventory: sv.inventory,
      gold: sv.gold,
      location: sv.location,
      day: sv.day||1,
      saveId: sv.saveId||null,
      flags: sv.flags||{},
    };
    G.party.forEach(c=>{ if(!c.statusEffects) c.statusEffects=[]; if(typeof c.ko==='undefined') c.ko=false; });
    showScreen('s-adventure');
    renderAdventureFlow();
  }catch(e){}
}

function refreshMainMenu(){
  const has = !!localStorage.getItem(AUTOSAVE_KEY);
  const btn = document.getElementById('continue-btn');
  if(btn) btn.style.display = has ? '' : 'none';
}

function saveGame(){
  const saves = getSaves();
  const leader = G.party[0];
  const saveName = `${leader.name} & Party — Day ${G.day}`;
  const obj = {
    id: G.saveId || Date.now().toString(),
    name: saveName,
    timestamp: Date.now(),
    party: G.party,
    nodes: G.nodes,
    currentNodeId: G.currentNodeId,
    completedNodes: G.completedNodes,
    inventory: G.inventory,
    gold: G.gold,
    location: G.location,
    day: G.day,
    flags: G.flags,
  };
  G.saveId = obj.id;
  const idx = saves.findIndex(s=>s.id===obj.id);
  if(idx>=0) saves[idx]=obj; else {
    if(saves.length>=10){ showModal('Save Limit','Max 10 saves. Delete one first.',[{label:'OK'}]); return; }
    saves.push(obj);
  }
  putSaves(saves);
  showModal('Saved!',`Game saved: ${saveName}`,[{label:'OK'}]);
}

function loadSave(id){
  const saves = getSaves();
  const sv = saves.find(s=>s.id===id);
  if(!sv) return;
  G = {
    party: sv.party,
    nodes: sv.nodes,
    currentNodeId: sv.currentNodeId,
    completedNodes: sv.completedNodes,
    inventory: sv.inventory,
    gold: sv.gold,
    location: sv.location,
    day: sv.day || 1,
    saveId: sv.id,
    flags: sv.flags || {},
  };
  // re-init statusEffects if missing
  G.party.forEach(c=>{ if(!c.statusEffects) c.statusEffects=[];  if(typeof c.ko==='undefined') c.ko=false; });
  showScreen('s-adventure');
  renderAdventureFlow();
}

function deleteSave(id){
  showModal('Delete Save?','This cannot be undone.',[
    {label:'Cancel'},
    {label:'DELETE', cls:'danger', action:()=>{
      const saves = getSaves().filter(s=>s.id!==id);
      putSaves(saves);
      showLoad();
    }}
  ]);
}

function showLoad(){
  const saves = getSaves();
  const list = document.getElementById('saves-list');
  list.innerHTML = '';
  if(!saves.length){
    list.innerHTML = '<div class="empty-saves">No saved games found.</div>';
  } else {
    saves.sort((a,b)=>b.timestamp-a.timestamp).forEach(sv=>{
      const row = document.createElement('div');
      row.className = 'save-row';
      const icons = sv.party.map(c=>charPortrait(c,22)).join('');
      row.innerHTML = `
        <div class="save-info" style="cursor:pointer" onclick="loadSave('${sv.id}')">
          <div class="save-name">${sv.name}</div>
          <div class="save-meta">${formatTS(sv.timestamp)}</div>
          <div class="save-icons">${icons}</div>
        </div>
        <button class="trash-btn" onclick="deleteSave('${sv.id}')">🗑️</button>
      `;
      list.appendChild(row);
    });
  }
  showScreen('s-load');
}

  {id:20, type:'rp', title:'Silence',           script:'green_eyes_ending',  next:null},
];

function getScript(name){
  if(name==='father_warning') return FATHER_WARNING;
  if(name==='wounded_traveler') return WOUNDED_TRAVELER;
  if(name==='inn_rest') return INN_REST;
  if(name==='merchant') return MERCHANT_SCRIPT;
  if(name==='mystic') return MYSTIC_SCRIPT;
  if(name==='green_eyes_morning') return GREEN_EYES_MORNING;
  if(name==='green_eyes_hub') return GREEN_EYES_HUB;
  if(name==='road_north') return ROAD_NORTH;
  if(name==='deep_forest') return DEEP_FOREST;
  if(name==='lab_entrance') return LAB_ENTRANCE;
  if(name==='lab_interior') return LAB_INTERIOR;
  if(name==='puzzle_1') return PUZZLE_1;
  if(name==='puzzle_2') return PUZZLE_2;
  if(name==='puzzle_3') return PUZZLE_3;
  if(name==='puzzle_4') return PUZZLE_4;
  if(name==='puzzle_5_final') return PUZZLE_5_FINAL;
  if(name==='green_eyes_ending') return GREEN_EYES_ENDING;
  return null;
}

function generateNode(id){
  const loc = G.location;
  const pool = loc==='forest' ? 'forest' : loc==='town' ? 'town' : 'road';
  const highLevel = G.party.reduce((a,c)=>a+c.level,0)/G.party.length >= 3;
  const r = Math.random();
  let node;
  if(r < 0.55){
    // combat
    let enemies;
    if(highLevel && loc==='forest' && chance(0.3)){
      enemies = pick(ENEMY_POOLS.boss_forest);
    } else {
      enemies = pick(ENEMY_POOLS[pool] || ENEMY_POOLS.road);
    }
    node = {id, type:'combat', title:pick(['Ambush!','Patrol Encounter','Hostile Ground','Surprise Attack','Road Danger']),
      desc:pick(['Enemies block your path.','They come out of nowhere.','Your party is surrounded.','A fight breaks out.']),
      enemies, next:null};
  } else if(r < 0.85){
    // rp
    const scripts = loc==='town' ? ['inn_rest','mystic'] : ['merchant','mystic','wounded_traveler'];
    const script = pick(scripts);
    const titles = {inn_rest:'Inn Rest',merchant:'Traveling Merchant',mystic:'Mysterious Figure',wounded_traveler:'Wounded Traveler'};
    node = {id, type:'rp', title:titles[script]||'Encounter', script, next:null};
  } else {
    // decision
    node = {id, type:'decision', title:'At the Crossroads',
      desc:'Your party pauses. Where to next?',
      choices:[
        {label:'Explore the Forest', desc:'Hunt for monsters and treasure.', locChange:'forest', next:id+1},
        {label:'Return toward Town', desc:'Rest and resupply.', locChange:'town', next:id+1},
        {label:'Follow the Road', desc:'See what lies ahead.', locChange:'road', next:id+1},
      ]};
  }
  return node;
}

function getNode(id){
  if(id < TUTORIAL_NODES.length) return TUTORIAL_NODES[id];
  const existing = G.nodes.find(n=>n.id===id);
  if(existing) return existing;
  const node = generateNode(id);
  G.nodes.push(node);
  return node;
}

function beginAdventure(party){
  G = {
    party,
    nodes: [],
    currentNodeId: 0,
    completedNodes: [],
    inventory: [{id:'potion',qty:2}],
    gold: 0,
    location: 'road',
    day: 1,
    saveId: null,
    flags: {},
  };
  showScreen('s-adventure');
  renderAdventureFlow();
  setTimeout(()=>triggerNode(0), 1400);
}

function renderAdventureFlow(){
  autoSave();
  const flow = document.getElementById('adv-flow');
  flow.innerHTML = '';
  const leader = G.party[0];
  document.getElementById('adv-party-name').textContent = `${leader.name} & Party`;
  document.getElementById('adv-gold').textContent = `💰 ${G.gold}`;

  const maxNode = Math.max(G.currentNodeId, ...G.completedNodes, 0);
  for(let i=0;i<=maxNode;i++){
    const node = getNode(i);
    if(!node || node.type==='_generate') break;
    const isCompleted = G.completedNodes.includes(i);
    const isCurrent = i===G.currentNodeId;
    const isFuture = !isCompleted && !isCurrent;

    const wrapper = document.createElement('div');
    wrapper.className = 'flow-node';

    const lineCol = document.createElement('div');
    lineCol.className = 'flow-line-col';

    if(i>0){
      const topLine = document.createElement('div');
      topLine.className = 'flow-vert-line'+(isCompleted?' active-line':'');
      topLine.style.minHeight='20px';
      lineCol.appendChild(topLine);
    }

    const dot = document.createElement('div');
    dot.className = 'flow-dot'+(isCompleted?' completed':isCurrent?' current':' future');
    const dotIcons = {combat:'⚔️',rp:'💬',decision:'🔀'};
    dot.textContent = isCompleted?'✓':(dotIcons[node.type]||'•');
    if(isCurrent){ dot.title='Tap to begin'; dot.onclick=()=>triggerNode(i); }
    if(isCompleted){ dot.onclick=()=>showNodeSummary(i); }
    lineCol.appendChild(dot);

    const botLine = document.createElement('div');
    botLine.className = 'flow-vert-line'+(isCompleted?' active-line':'');
    botLine.style.minHeight='20px';
    lineCol.appendChild(botLine);

    wrapper.appendChild(lineCol);

    const content = document.createElement('div');
    content.className = 'flow-content';
    content.innerHTML = `<div class="flow-node-title">${node.title||''}</div>`;
    if(node.desc) content.innerHTML += `<div class="flow-node-desc">${node.desc}</div>`;

    if(isCurrent){
      if(node.type==='decision'){
        const cf = document.createElement('div');
        cf.className = 'flow-choices';
        (node.choices||[]).forEach(ch=>{
          const btn = document.createElement('button');
          btn.className = 'flow-choice-btn';
          btn.innerHTML = `<div class="flow-choice-label">${ch.label}</div><div class="flow-choice-desc">${ch.desc||''}</div>`;
          btn.onclick=()=>chooseDecision(ch);
          cf.appendChild(btn);
        });
        content.appendChild(cf);
      } else {
        const ab = document.createElement('div');
        ab.className = 'flow-node-action';
        const tb = document.createElement('button');
        tb.className = 'btn gold';
        tb.style.fontSize='0.75rem';
        tb.style.padding='10px 16px';
        tb.textContent = node.type==='combat'?'⚔️ ENGAGE':'💬 BEGIN';
        tb.onclick=()=>triggerNode(i);
        ab.appendChild(tb);
        content.appendChild(ab);
      }
      // walker icon
      const walker = document.createElement('div');
      walker.style.fontSize='0.85rem';
      walker.style.marginTop='4px';
      walker.style.display='flex'; walker.style.gap='3px'; walker.innerHTML = G.party.map(c=>charPortrait(c,20)).join('');
      content.appendChild(walker);
    }

    wrapper.appendChild(content);
    flow.appendChild(wrapper);
  }
  // scroll to current
  setTimeout(()=>{
    const dots = flow.querySelectorAll('.flow-dot.current');
    if(dots.length) dots[0].scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function chooseDecision(choice){
  if(choice.locChange) G.location = choice.locChange;
  G.completedNodes.push(G.currentNodeId);
  G.currentNodeId = choice.next;
  G.day++;
  const nextNode = getNode(choice.next);
  if(nextNode && nextNode.type !== 'decision'){
    triggerNode(choice.next);
  } else {
    renderAdventureFlow();
  }
}

function triggerNode(id){
  const node = getNode(id);
  if(!node) return;
  if(node.type==='combat'){
    startCombat(node);
  } else if(node.type==='rp'){
    startRP(node);
  } else if(node.type==='decision'){
    // decisions are handled inline
  }
}

function showNodeSummary(id){
  const node = getNode(id);
  if(!node) return;
  showModal(node.title||'Past Event', node.desc||'You recall this event.',[{label:'OK'}]);
}

function advanceFromNode(nodeId){
  G.completedNodes.push(nodeId);
  const node = getNode(nodeId);
  let next = node?.next;
  if(typeof next === 'number'){
    G.currentNodeId = next;
  } else {
    G.currentNodeId = nodeId+1;
  }
  G.day++;
  // check for monster transform
  checkMonsterTransform(()=>{
    showScreen('s-adventure');
    renderAdventureFlow();
  });
}

function checkMonsterTransform(cb){
  const monster = G.party.find(c=>c.type==='monster');
  if(!monster){ cb(); return; }
  const tree = MONSTER_TREE[monster.form]||[];
  const available = tree.filter(t=>G.inventory.find(i=>i.id===t.meat&&i.qty>0));
  if(!available.length){ cb(); return; }
  const opts = available.map(a=>{
    const fd = MONSTER_FORMS[a.form];
    return {label:`Eat ${ALL_ITEMS[a.meat]?.name||a.meat} → ${fd.name} (HP:${fd.hp} ATK:${fd.atk})`, action:()=>{
      removeItem(a.meat,1);
      transformMonster(monster, a.form);
      showModal('Transformed!',`${monster.name} becomes ${MONSTER_FORMS[a.form].name}!`,[{label:'OK',action:cb}]);
    }};
  });
  opts.push({label:'Not now', action:cb});
  showModal(`${monster.name} can transform!`,'Eligible meat in inventory. Transform now?', opts);
}

function transformMonster(ch, form){
  ch.form = form;
  const fd = MONSTER_FORMS[form];
  const oldMaxHp = ch.maxHp;
  ch.maxHp = fd.hp + (ch.level-1)*4;
  ch.hp = Math.min(ch.hp + (ch.maxHp - oldMaxHp), ch.maxHp);
  ch.def = fd.def;
}

function buildEnemyGroup(enemyDefs){
  const group = [];
  enemyDefs.forEach(def=>{
    const tmpl = ENEMIES[def.id];
    if(!tmpl) return;
    for(let i=0;i<def.count;i++){
      group.push({
        ...tmpl,
        maxHp: tmpl.hp,
        hp: tmpl.hp,
        id: def.id,
        uid: Math.random().toString(36).slice(2),
        statusEffects: [],
        dead: false,
      });
    }
  });
  return group;
}

function getAttackerStat(ch){
  if(ch.type==='monster'){
    return MONSTER_FORMS[ch.form]?.atk || 4;
  }
  const w = ch.weapon ? WEAPONS[ch.weapon] : null;
  if(!w) return ch.str||0;
  return w.stat==='dex' ? (ch.dex||0) : (ch.str||0);
}

function getWeaponDmg(ch){
  if(ch.type==='monster'){
    const fd = MONSTER_FORMS[ch.form];
    return {min:fd.atk-2, max:fd.atk+2};
  }
  const w = ch.weapon ? WEAPONS[ch.weapon] : null;
  if(!w) return {min:1,max:3};
  return {min:w.dmgMin, max:w.dmgMax};
}

function calcHit(attackerStat, defDEF, bonuses=0){
  return clamp(0.75 + (attackerStat - defDEF)*0.02 + bonuses, 0.15, 0.95);
}

function calcDmg(ch){
  const d = getWeaponDmg(ch);
  const stat = getAttackerStat(ch);
  let dmg = rand(d.min, d.max) + Math.floor(stat/3);
  const oc = (ch.statusEffects||[]).find(s=>s.id==='overclock');
  if(oc){ dmg = Math.round(dmg*oc.dmgMult); ch.statusEffects=ch.statusEffects.filter(s=>s!==oc); }
  return dmg;
}

function getCharDef(ch){
  let def = ch.def||0;
  const armor = ch.armor ? ARMORS[ch.armor] : null;
  if(armor) def += armor.def;
  if(ch.abilities && ch.abilities.includes('iron_skin')) def+=3;
  if(ch.abilities && ch.abilities.includes('berserk')) def-=3;
  return Math.max(0,def);
}

function getCharStr(ch){
  let s = ch.str||0;
  if(ch.abilities && ch.abilities.includes('berserk')) s+=5;
  return s;
}

function autoArm(){
  const ch = combatState.party[combatState.activeCharIdx];
  if(!ch||ch.ko) return;
  const slots = getCharActionSlots(ch);
  const si = ch.lastCombatSlot ?? 0;
  const slot = slots[si] && !slots[si].disabled ? slots[si] : slots[0];
  const realSi = (slot===slots[si]&&!slots[si]?.disabled) ? si : 0;
  if(slot && !slot.disabled){
    combatState.phase='pending';
    combatState.pendingSlot=realSi;
    combatState.pendingAbility=slot.abilityId?ABILITIES.find(a=>a.id===slot.abilityId):null;
    setDefaultTarget(slot.targetType);
  }
}

function startCombat(node){
  currentNodeForCombat = node;
  const enemies = buildEnemyGroup(node.enemies||[]);
  combatState = {
    node,
    enemies,
    party: G.party.map(c=>({...c})),
    turn: 'player',
    activeCharIdx: 0,
    log:[],
    loot:[],
    xpGained:0,
    goldGained:0,
    phase:'select',
    pendingSlot: null,
    pendingAbility: null,
    selectedEnemyIdx: null,
    selectedAllyIdx: null,
    roundNum: 1,
  };
  combatState.activeCharIdx = firstLiving(combatState.party);
  autoArm();
  showScreen('s-combat');
  renderCombat();
}

function firstLiving(party){
  for(let i=0;i<party.length;i++) if(!party[i].ko) return i;
  return 0;
}

function nextLivingChar(party, after){
  for(let i=after+1;i<party.length;i++) if(!party[i].ko) return i;
  return -1;
}

function addLog(msg, cls=''){
  combatState.log.push({msg,cls});
  renderCombatLog();
}

function renderCombatLog(){
  const el = document.getElementById('combat-log');
  el.innerHTML = combatState.log.slice(-6).map(l=>`<div class="log-line ${l.cls}">${l.msg}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}

function renderCombat(){
  renderEnemies();
  renderCombatParty();
}


// ── COMBAT ACTION HELPERS ──────────────────────────────────────────

function getWeaponTargetType(ch){
  if(ch.type==='monster') return 'enemy_front';
  const w = ch.weapon?WEAPONS[ch.weapon]:null;
  return (w&&w.type==='ranged')?'enemy_any':'enemy_front';
}

function getFirstActiveAbility(ch){
  if(!ch.abilities) return null;
  for(const id of ch.abilities){
    if(!id) continue;
    const ab = ABILITIES.find(a=>a.id===id&&a.type==='active');
    if(ab) return ab;
  }
  return null;
}

function getAbilityTargetType(ab){
  if(!ab) return 'enemy_any';
  if(ab.id==='thunder') return 'enemy_all';
  if(ab.id==='heal') return 'ally';
  return 'enemy_any';
}

function getCharActionSlots(ch){
  const w = ch.weapon?WEAPONS[ch.weapon]:null;
  const atkName = ch.type==='monster'?(MONSTER_FORMS[ch.form]?.natural||'Bite'):(w?w.name:'Punch');
  const slot0 = {label:`⚔️ ${atkName}`, id:'attack', targetType:getWeaponTargetType(ch)};
  let slot1;
  switch(ch.type){
    case 'human':{
      const hasPot = G.inventory.some(i=>(i.id==='potion'||i.id==='hi_potion')&&i.qty>0);
      slot1 = {label:'💊 Potion', id:'heal_ally', targetType:'ally', disabled:!hasPot};
      break;
    }
    case 'mutant':{
      const ab = getFirstActiveAbility(ch);
      slot1 = ab?{label:`⚡ ${ab.name}`, id:'ability', abilityId:ab.id, targetType:getAbilityTargetType(ab)}:{label:'⚡ No Ability', id:'no_ability', disabled:true};
      break;
    }
    case 'monster':
      slot1 = {label:'😤 Growl', id:'growl', targetType:'enemy_front'};
      break;
    case 'robot':
      slot1 = {label:'⚙️ Overclock', id:'overclock', targetType:'self'};
      break;
    default:
      slot1 = {label:'—', id:'none', disabled:true};
  }
  return [slot0, slot1, {label:'🏃 Flee', id:'flee', targetType:'all_allies'}];
}

function setDefaultTarget(targetType){
  if(targetType==='enemy_front'){
    const fi = combatState.enemies.slice(0,3).findIndex(e=>!e.dead);
    combatState.selectedEnemyIdx = fi>=0?fi:null;
    combatState.selectedAllyIdx = null;
  } else if(targetType==='enemy_any'){
    const fi = combatState.enemies.findIndex(e=>!e.dead);
    combatState.selectedEnemyIdx = fi>=0?fi:null;
    combatState.selectedAllyIdx = null;
  } else if(targetType==='enemy_all'){
    combatState.selectedEnemyIdx = -1;
    combatState.selectedAllyIdx = null;
  } else if(targetType==='ally'){
    combatState.selectedEnemyIdx = null;
    combatState.selectedAllyIdx = combatState.activeCharIdx;
  } else if(targetType==='self'){
    combatState.selectedEnemyIdx = null;
    combatState.selectedAllyIdx = combatState.activeCharIdx;
  } else if(targetType==='all_allies'){
    combatState.selectedEnemyIdx = null;
    combatState.selectedAllyIdx = -1;
  }
}

function tapActionSlot(si){
  const ch = combatState.party[combatState.activeCharIdx];
  const slot = getCharActionSlots(ch)[si];
  if(!slot||slot.disabled) return;
  if(combatState.phase==='pending'&&combatState.pendingSlot===si){
    executeSlot(si);
  } else {
    combatState.phase='pending';
    combatState.pendingSlot=si;
    combatState.pendingAbility = slot.abilityId?ABILITIES.find(a=>a.id===slot.abilityId):null;
    setDefaultTarget(slot.targetType);
    renderCombat();
  }
}

function executeSlot(si){
  const ch = combatState.party[combatState.activeCharIdx];
  const slot = getCharActionSlots(ch)[si];
  if(!slot) return;
  ch.lastCombatSlot = si;
  combatState.phase='select';
  combatState.pendingSlot = null;
  const ei = combatState.selectedEnemyIdx;
  const ai = combatState.selectedAllyIdx;
  combatState.selectedEnemyIdx = null;
  combatState.selectedAllyIdx = null;
  switch(slot.id){
    case 'attack':
      if(ei!=null&&ei>=0) doPlayerAttack(ei); else endPlayerAction(); break;
    case 'ability':
      if(ei===-1) applyAbilityAllEnemies(combatState.pendingAbility);
      else if(ai!=null&&ai>=0) applyAbilityToAlly(ai);
      else if(ei!=null&&ei>=0) applyAbilityToEnemy(ei);
      else endPlayerAction();
      break;
    case 'heal_ally': useHealOnAlly(ai!=null&&ai>=0?ai:combatState.activeCharIdx); break;
    case 'growl': doGrowl(ei!=null&&ei>=0?ei:combatState.enemies.findIndex(e=>!e.dead)); break;
    case 'overclock': doOverclock(); break;
    case 'flee': attemptFlee(); break;
    default: endPlayerAction();
  }
  combatState.pendingAbility = null;
}

function handleEnemyCardClick(idx){
  if(combatState.phase!=='pending'||combatState.pendingSlot===null) return;
  const e = combatState.enemies[idx];
  if(!e||e.dead) return;
  const ch = combatState.party[combatState.activeCharIdx];
  const slot = getCharActionSlots(ch)[combatState.pendingSlot];
  if(!slot) return;
  const tt = slot.targetType;
  if(tt==='enemy_front'){
    if(idx<=2){ combatState.selectedEnemyIdx=idx; renderCombat(); } else flashInvalidTarget(idx);
  } else if(tt==='enemy_any'){
    combatState.selectedEnemyIdx=idx; renderCombat();
  } else { flashInvalidTarget(idx); }
}

function handleAllyClick(idx){
  if(combatState.phase!=='pending') return;
  const ch = combatState.party[combatState.activeCharIdx];
  const slot = getCharActionSlots(ch)[combatState.pendingSlot];
  if(!slot||slot.targetType!=='ally') return;
  combatState.selectedAllyIdx=idx;
  renderCombat();
}

function flashInvalidTarget(idx){
  const isLandscape = window.innerWidth > window.innerHeight;
  const displayOrder = isLandscape ? [6,3,0,7,4,1,8,5,2] : [6,7,8,3,4,5,0,1,2];
  const domPos = displayOrder.indexOf(idx);
  if(domPos<0) return;
  const cells = document.querySelectorAll('.enemy-tile');
  const cell = cells[domPos];
  if(cell){ cell.classList.add('invalid-flash'); setTimeout(()=>cell.classList.remove('invalid-flash'),380); }
}

function doGrowl(enemyIdx){
  const ch = combatState.party[combatState.activeCharIdx];
  const e = combatState.enemies[enemyIdx];
  if(!e||e.dead){ endPlayerAction(); return; }
  e.statusEffects = e.statusEffects||[];
  e.statusEffects.push({id:'growl',name:'Weakened',turns:2,atkMod:-2});
  addLog(`${ch.name} growls fiercely! ${e.name}'s attack weakened!`,'info');
  endPlayerAction();
}

function doOverclock(){
  const ch = combatState.party[combatState.activeCharIdx];
  ch.statusEffects = ch.statusEffects||[];
  ch.statusEffects.push({id:'overclock',name:'Overclocked',turns:1,dmgMult:1.5});
  addLog(`${ch.name} overclocks! Next attack +50% damage!`,'good');
  endPlayerAction();
}

function useHealOnAlly(allyIdx){
  const target = combatState.party[allyIdx];
  if(!target){ endPlayerAction(); return; }
  const hiPot = G.inventory.find(i=>i.id==='hi_potion'&&i.qty>0);
  const pot = G.inventory.find(i=>i.id==='potion'&&i.qty>0);
  const item = hiPot||pot;
  if(!item){ addLog('No potions!',''); endPlayerAction(); return; }
  const def = CONSUMABLES[item.id];
  target.hp = Math.min(target.maxHp, target.hp+def.value);
  removeItem(item.id,1);
  addLog(`${target.name} drinks ${def.name} and recovers ${def.value} HP!`,'good');
  endPlayerAction();
}

function renderEnemies(){
  const el = document.getElementById('combat-enemies');
  el.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'enemy-grid';

  // portrait: back(top)→mid→front(bottom); landscape: back(left)→mid→front(right, nearest party)
  const isLandscape = window.innerWidth > window.innerHeight;
  const displayOrder = isLandscape ? [6,3,0,7,4,1,8,5,2] : [6,7,8,3,4,5,0,1,2];
  const sIdx = combatState.selectedEnemyIdx;
  const inPending = combatState.phase==='pending';

  displayOrder.forEach(slotIdx=>{
    const e = combatState.enemies[slotIdx];
    const cell = document.createElement('div');
    if(!e){
      cell.className='enemy-tile empty-slot';
      grid.appendChild(cell);
      return;
    }
    cell.className='enemy-tile'+(e.dead?' dead':'');
    const pct=Math.max(0,e.hp/e.maxHp*100);
    if(inPending && !e.dead && (sIdx===slotIdx||sIdx===-1)) cell.classList.add('is-selected');
    if(!e.dead) cell.classList.add('targetable');
    cell.innerHTML=`
      <div class="et-icon">${e.icon||'👾'}</div>
      <div class="et-name">${e.name}</div>
      <div class="et-hp"><div class="et-hp-fill" style="width:${pct}%"></div></div>
      <div class="et-hp-text">${e.dead?'✗':e.hp+'/'+e.maxHp}</div>
      ${e.statusEffects?.length?`<div style="font-size:0.44rem;color:var(--purple)">${e.statusEffects.map(s=>s.name[0]).join(',')}</div>`:''}`;
    if(!e.dead) cell.onclick=()=>handleEnemyCardClick(slotIdx);
    grid.appendChild(cell);
  });
  el.appendChild(grid);
}

function renderCombatParty(){
  const el = document.getElementById('combat-party');
  el.innerHTML = '';
  const isPlayerTurn = combatState.turn==='player';
  const selAlly = combatState.selectedAllyIdx;
  const inPending = combatState.phase==='pending';
  combatState.party.forEach((ch,i)=>{
    const isActive = i===combatState.activeCharIdx && isPlayerTurn;
    const isAllyTargeted = inPending && !ch.ko && (selAlly===i||selAlly===-1);
    const row = document.createElement('div');
    row.className = 'party-member-row'+(isActive?' active':'')+(ch.ko?' ko':'')+(isAllyTargeted?' ally-targeted':'');
    const pct = Math.max(0,ch.hp/ch.maxHp*100);
    const hpCls = pct>50?'':pct>25?'low':'crit';
    const statusStr = ch.statusEffects?.length?ch.statusEffects.map(s=>s.name).join(', '):'';
    row.innerHTML=`
      <div class="pm-icon${ch.ko?' ko':''}">${charPortrait(ch,56)}</div>
      <div class="pm-info">
        <div class="pm-name">${ch.name}${ch.ko?' (KO)':''}</div>
        <div class="pm-hp-bar"><div class="pm-hp-fill ${hpCls}" style="width:${pct}%"></div></div>
        <div class="pm-hp-text">${ch.hp}/${ch.maxHp} HP${statusStr?' · '+statusStr:''}</div>
      </div>`;
    if(isActive && !ch.ko && isPlayerTurn){
      const btns = document.createElement('div');
      btns.className='pm-action-btns';
      getCharActionSlots(ch).forEach((slot,si)=>{
        if(!slot) return;
        const btn=document.createElement('button');
        const isPending=inPending && combatState.pendingSlot===si;
        btn.className='pm-action-btn'+(isPending?' ready':'');
        btn.disabled=!!slot.disabled;
        btn.title=slot.label;
        // Extract leading emoji as icon
        btn.textContent=(slot.label.match(/^\S+/)||['?'])[0];
        btn.onclick=ev=>{ ev.stopPropagation(); tapActionSlot(si); };
        btns.appendChild(btn);
      });
      row.appendChild(btns);
    }
    if(inPending && !ch.ko){
      const activeSlots=getCharActionSlots(combatState.party[combatState.activeCharIdx]);
      const slot=activeSlots[combatState.pendingSlot];
      if(slot && slot.targetType==='ally'){ row.style.cursor='pointer'; row.onclick=()=>handleAllyClick(i); }
    }

    el.appendChild(row);
  });
}

function renderActions(){
  const al = document.getElementById('action-label');
  const ar = document.getElementById('action-row');
  ar.innerHTML = '';
  const ch = combatState.party[combatState.activeCharIdx];

  if(combatState.turn!=='player'||!ch||ch.ko){
    al.textContent='ENEMY TURN...';
    return;
  }

  if(combatState.phase==='select'){
    al.textContent=`${ch.name}'s TURN`;
    // Actions are rendered inline in the party member row
    return;
  }

  if(combatState.phase==='target_enemy'||combatState.phase==='ability_target_enemy'){
    al.textContent='SELECT TARGET';
    const back=document.createElement('button');
    back.className='action-btn';
    back.textContent='← BACK';
    back.onclick=()=>{combatState.phase='select';combatState.pendingAction=null;combatState.pendingAbility=null;renderCombat();};
    ar.appendChild(back);
    return;
  }
  if(combatState.phase==='ability_target_ally'||combatState.phase==='target_ally'){
    al.textContent='SELECT ALLY';
    const back=document.createElement('button');
    back.className='action-btn';
    back.textContent='← BACK';
    back.onclick=()=>{combatState.phase='select';combatState.pendingAction=null;combatState.pendingAbility=null;renderCombat();};
    ar.appendChild(back);
    renderAllyTargets();
    return;
  }
  if(combatState.phase==='item_select'){
    al.textContent='USE ITEM';
    renderItemPicker();
    return;
  }
  if(combatState.phase==='ability_select'){
    al.textContent='USE ABILITY';
    renderAbilityPicker(ch);
    return;
  }
}

function addAttackBtn(ar, ch){
  const w = ch.weapon ? WEAPONS[ch.weapon] : null;
  const atkBtn = document.createElement('button');
  atkBtn.className='action-btn';
  const wname = ch.type==='monster'?MONSTER_FORMS[ch.form]?.natural||'Attack':(w?w.name:'Punch');
  atkBtn.textContent=`⚔️ ${wname}`;
  atkBtn.onclick=()=>{ combatState.phase='target_enemy'; combatState.pendingAction='attack'; renderCombat(); };
  ar.appendChild(atkBtn);
}

function renderItemPicker(){
  const ar = document.getElementById('action-row');
  ar.innerHTML = '';
  const back = document.createElement('button');
  back.className='action-btn';
  back.textContent='← BACK';
  back.onclick=()=>{ combatState.phase='select'; renderCombat(); };
  ar.appendChild(back);

  const al = document.getElementById('action-label');
  al.textContent = 'CHOOSE ITEM';

  // item list below action row
  let picker = document.getElementById('item-picker-inline');
  if(!picker){
    picker = document.createElement('div');
    picker.id = 'item-picker-inline';
    picker.className = 'item-picker';
    document.getElementById('combat-actions').appendChild(picker);
  }
  picker.innerHTML='';

  G.inventory.forEach(invItem=>{
    const itemDef = CONSUMABLES[invItem.id];
    if(!itemDef||invItem.qty<=0) return;
    const btn = document.createElement('button');
    btn.className='item-pick-btn';
    btn.innerHTML=`<span>${itemDef.name} x${invItem.qty}</span><span style="color:var(--dim);font-size:0.62rem">${itemDef.desc}</span>`;
    btn.onclick=()=>{
      picker.remove();
      useItemInCombat(invItem.id, itemDef);
    };
    picker.appendChild(btn);
  });
}

function removeItemPickerInline(){
  const p = document.getElementById('item-picker-inline');
  if(p) p.remove();
}

function useItemInCombat(itemId, itemDef){
  if(itemDef.effect==='heal'){
    if(itemDef.target==='all'){
      combatState.party.forEach(c=>{ if(!c.ko) c.hp=Math.min(c.maxHp,c.hp+itemDef.value); });
      addLog(`${itemDef.name} heals the party!`,'good');
    } else {
      // need to pick ally
      combatState.pendingAction='item';
      combatState.pendingItem=itemId;
      combatState.phase='target_ally';
      renderCombat();
      return;
    }
  } else if(itemDef.effect==='revive'){
    combatState.pendingAction='item';
    combatState.pendingItem=itemId;
    combatState.phase='target_ally';
    renderCombat();
    return;
  }
  removeItem(itemId,1);
  combatState.phase='select';
  endPlayerAction();
}

function renderAllyTargets(){
  let picker = document.getElementById('item-picker-inline');
  if(!picker){
    picker = document.createElement('div');
    picker.id = 'item-picker-inline';
    picker.className = 'item-picker';
    document.getElementById('combat-actions').appendChild(picker);
  }
  picker.innerHTML='';
  combatState.party.forEach((ch,i)=>{
    const btn = document.createElement('button');
    btn.className='item-pick-btn';
    const isKo = ch.ko;
    btn.innerHTML=`<span>${isKo?'😵':''} ${ch.name}</span><span style="color:var(--dim);font-size:0.62rem">${ch.hp}/${ch.maxHp} HP</span>`;
    btn.onclick=()=>{
      picker.remove();
      applyAllyTarget(i);
    };
    picker.appendChild(btn);
  });
}

function applyAllyTarget(idx){
  const ch = combatState.party[idx];
  if(combatState.pendingAction==='item'){
    const itemId = combatState.pendingItem;
    const itemDef = CONSUMABLES[itemId];
    if(itemDef.effect==='heal'){
      ch.hp = Math.min(ch.maxHp, ch.hp+(itemDef.value||30));
      addLog(`${ch.name} healed for ${itemDef.value||30} HP!`,'good');
    } else if(itemDef.effect==='revive'){
      if(ch.ko){
        ch.ko=false;
        ch.hp=1;
        addLog(`${ch.name} revived!`,'good');
      }
    }
    removeItem(itemId,1);
  } else if(combatState.phase==='ability_target_ally'){
    applyAbilityToAlly(idx);
    return;
  }
  combatState.phase='select';
  endPlayerAction();
}

function renderAbilityPicker(ch){
  const ar = document.getElementById('action-row');
  ar.innerHTML='';
  const back = document.createElement('button');
  back.className='action-btn';
  back.textContent='← BACK';
  back.onclick=()=>{ combatState.phase='select'; renderCombat(); };
  ar.appendChild(back);

  let picker = document.getElementById('item-picker-inline');
  if(!picker){
    picker = document.createElement('div');
    picker.id='item-picker-inline';
    picker.className='item-picker';
    document.getElementById('combat-actions').appendChild(picker);
  }
  picker.innerHTML='';
  (ch.abilities||[]).forEach(aId=>{
    if(!aId) return;
    const ab = ABILITIES.find(x=>x.id===aId);
    if(!ab||ab.type!=='active') return;
    const btn = document.createElement('button');
    btn.className='item-pick-btn';
    btn.innerHTML=`<span>${ab.name}</span><span style="color:var(--dim);font-size:0.62rem">${ab.desc}</span>`;
    btn.onclick=()=>{
      picker.remove();
      combatState.pendingAbility = ab;
      if(ab.target==='all_enemies'){
        applyAbilityAllEnemies(ab);
      } else if(ab.target==='ally'){
        combatState.phase='ability_target_ally';
        renderCombat();
      } else {
        combatState.phase='ability_target_enemy';
        renderCombat();
      }
    };
    picker.appendChild(btn);
  });
}

function selectEnemyTarget(idx){
  const e = combatState.enemies[idx];
  if(!e||e.dead) return;
  if(combatState.phase==='target_enemy'){
    doPlayerAttack(idx);
  } else if(combatState.phase==='ability_target_enemy'){
    applyAbilityToEnemy(idx);
  }
}

function doPlayerAttack(enemyIdx){
  const ch = combatState.party[combatState.activeCharIdx];
  const e = combatState.enemies[enemyIdx];
  const stat = getAttackerStat(ch);
  // check eagle eye
  const hitBonus = (ch.abilities&&ch.abilities.includes('eagle_eye'))?0.15:0;
  const hitChance = calcHit(stat, e.def||0, hitBonus);
  if(Math.random()<hitChance){
    const dmg = calcDmg(ch);
    e.hp = Math.max(0, e.hp-dmg);
    addLog(`${ch.name} attacks ${e.name} for ${dmg} damage!`,'hit');
    if(e.hp<=0){ e.dead=true; addLog(`${e.name} defeated!`,'good'); rollLoot(e); }
  } else {
    addLog(`${ch.name} attacks ${e.name}... MISS!`,'');
  }
  combatState.phase='select';
  endPlayerAction();
}

function applyAbilityToEnemy(idx){
  const ch = combatState.party[combatState.activeCharIdx];
  const e = combatState.enemies[idx];
  const ab = combatState.pendingAbility;
  if(!ab||e.dead) return;
  applyActiveAbility(ab, ch, e, null);
  combatState.phase='select';
  combatState.pendingAbility=null;
  endPlayerAction();
}

function applyAbilityToAlly(idx){
  const ch = combatState.party[combatState.activeCharIdx];
  const target = combatState.party[idx];
  const ab = combatState.pendingAbility;
  if(!ab) return;
  applyActiveAbility(ab, ch, null, target);
  combatState.phase='select';
  combatState.pendingAbility=null;
  endPlayerAction();
}

function applyAbilityAllEnemies(ab){
  const ch = combatState.party[combatState.activeCharIdx];
  combatState.enemies.forEach(e=>{ if(!e.dead) applyActiveAbility(ab,ch,e,null); });
  combatState.phase='select';
  combatState.pendingAbility=null;
  endPlayerAction();
}

function applyActiveAbility(ab, caster, enemy, ally){
  const lv = caster.level||1;
  switch(ab.id){
    case 'fire_blast':
      if(enemy){ const d=rand(8+lv,12+lv); enemy.hp=Math.max(0,enemy.hp-d); addLog(`${caster.name} blasts ${enemy.name} with fire for ${d}!`,'dmg'); if(enemy.hp<=0){enemy.dead=true;addLog(`${enemy.name} defeated!`,'good');rollLoot(enemy);}}
      break;
    case 'ice_shard':
      if(enemy){ const d=rand(6+lv,10+lv); enemy.hp=Math.max(0,enemy.hp-d); enemy.statusEffects=enemy.statusEffects||[]; enemy.statusEffects.push({id:'slow',name:'Slowed',turns:1,hitMod:-0.1}); addLog(`${caster.name} shatters ${enemy.name} with ice for ${d}!`,'dmg'); if(enemy.hp<=0){enemy.dead=true;addLog(`${enemy.name} defeated!`,'good');rollLoot(enemy);}}
      break;
    case 'thunder':
      if(enemy){ const d=rand(5+lv,9+lv); enemy.hp=Math.max(0,enemy.hp-d); addLog(`Thunder strikes ${enemy.name} for ${d}!`,'dmg'); if(enemy.hp<=0){enemy.dead=true;addLog(`${enemy.name} defeated!`,'good');rollLoot(enemy);}}
      break;
    case 'poison':
      if(enemy){ enemy.statusEffects=enemy.statusEffects||[]; enemy.statusEffects.push({id:'poison',name:'Poisoned',turns:3,dmgPerTurn:3}); addLog(`${enemy.name} is poisoned!`,'info'); }
      break;
    case 'drain':
      if(enemy){ const d=rand(6+lv,10+lv); enemy.hp=Math.max(0,enemy.hp-d); caster.hp=Math.min(caster.maxHp,caster.hp+d); addLog(`${caster.name} drains ${d} HP from ${enemy.name}!`,'good'); if(enemy.hp<=0){enemy.dead=true;addLog(`${enemy.name} defeated!`,'good');rollLoot(enemy);}}
      break;
    case 'heal':
      if(ally){ const h=12+lv; ally.hp=Math.min(ally.maxHp,ally.hp+h); addLog(`${caster.name} mends ${ally.name} for ${h} HP!`,'good'); }
      break;
  }
  renderCombat();
}

function rollLoot(enemy){
  const g = rand(enemy.gold[0], enemy.gold[1]);
  combatState.goldGained += g;
  combatState.xpGained += enemy.xp||0;
  (enemy.loot||[]).forEach(l=>{
    if(chance(l.chance)){
      combatState.loot.push(l.id);
      addLog(`Found: ${ALL_ITEMS[l.id]?.name||l.id}!`,'loot');
    }
  });
}

function endPlayerAction(){
  combatState.phase='select';
  combatState.pendingSlot=null;
  combatState.selectedEnemyIdx=null;
  combatState.selectedAllyIdx=null;
  combatState.pendingAbility=null;
  renderCombat();
  if(combatState.enemies.every(e=>e.dead)){
    setTimeout(showCombatResults, 600);
    return;
  }
  const next = nextLivingChar(combatState.party, combatState.activeCharIdx);
  if(next>=0){
    combatState.activeCharIdx = next;
    combatState.phase = 'select';
    autoArm();
    const ch = combatState.party[next];
    if(ch.abilities && ch.abilities.includes('regen')){
      ch.hp = Math.min(ch.maxHp, ch.hp+3);
      addLog(`${ch.name} regenerates 3 HP.`,'good');
    }
    renderCombat();
  } else {
    setTimeout(doEnemyTurn, 500);
  }
}

function doEnemyTurn(){
  combatState.turn='enemy';
  addLog('Enemy turn...','info');
  const livingEnemies = combatState.enemies.filter(e=>!e.dead);
  livingEnemies.forEach(e=>{
    // tick status effects on enemy
    (e.statusEffects||[]).forEach(se=>{
      if(se.id==='poison'){ e.hp=Math.max(0,e.hp-se.dmgPerTurn); addLog(`${e.name} takes ${se.dmgPerTurn} poison damage!`,'dmg'); if(e.hp<=0){e.dead=true;addLog(`${e.name} defeated!`,'good');rollLoot(e);} }
      se.turns--;
    });
    e.statusEffects = (e.statusEffects||[]).filter(se=>se.turns>0);
    if(e.dead) return;
    // attack random living party member
    const targets = combatState.party.filter(c=>!c.ko);
    if(!targets.length) return;
    const target = pick(targets);
    const def = getCharDef(target);
    const slowMod = (e.statusEffects||[]).find(s=>s.id==='slow')?.hitMod||0;
    const growlMod = (e.statusEffects||[]).find(s=>s.id==='growl');
    const effAtk = e.atk + (growlMod?growlMod.atkMod:0);
    const hitChance = clamp(0.75+(effAtk-def)*0.02+slowMod, 0.15, 0.95);
    if(Math.random()<hitChance){
      let dmg = rand(Math.max(1,effAtk-2), effAtk+2) + Math.floor(effAtk/3);
      // check counter
      if(target.abilities&&target.abilities.includes('counter')&&chance(0.3)){
        const counterDmg = calcDmg(target);
        e.hp=Math.max(0,e.hp-counterDmg);
        addLog(`${target.name} counters for ${counterDmg}!`,'good');
        if(e.hp<=0){e.dead=true;addLog(`${e.name} defeated!`,'good');rollLoot(e);}
      }
      target.hp=Math.max(0,target.hp-dmg);
      addLog(`${e.name} attacks ${target.name} for ${dmg}!`,'dmg');
      if(target.hp<=0){ target.ko=true; target.hp=0; addLog(`${target.name} is knocked out!`,''); }
    } else {
      addLog(`${e.name} attacks ${target.name}... MISS!`,'');
    }
  });

  // apply party regen at start of their new turn
  combatState.party.forEach(ch=>{
    if(!ch.ko&&ch.abilities&&ch.abilities.includes('regen')){
      ch.hp=Math.min(ch.maxHp,ch.hp+3);
    }
  });

  renderCombat();

  // check if all party KO
  if(combatState.party.every(c=>c.ko)){
    setTimeout(partyWipe, 600);
    return;
  }

  // start new player round
  combatState.turn='player';
  combatState.roundNum++;
  combatState.activeCharIdx = firstLiving(combatState.party);
  combatState.phase='select';
  autoArm();
  renderCombat();
}

function attemptFlee(){
  const fleeChance = 0.5 + (G.party.some(c=>c.abilities&&c.abilities.includes('camouflage'))?0.2:0);
  if(chance(fleeChance)){
    addLog('Your party fled successfully!','info');
    setTimeout(()=>{
      combatState=null;
      showScreen('s-adventure');
      renderAdventureFlow();
    },800);
  } else {
    addLog('Failed to flee! Enemies get a free attack!','dmg');
    combatState.phase='select';
    combatState.turn='enemy';
    renderActions();
    setTimeout(doEnemyTurn,500);
  }
}

function partyWipe(){
  // restore everyone to 1 HP
  G.party.forEach(c=>{ c.hp=Math.max(1,Math.floor(c.maxHp*0.3)); c.ko=false; c.statusEffects=[]; });
  showModal('Party Defeated','Your party retreats to the inn. Everyone recovers enough to continue.',[
    {label:'Continue', action:()=>{
      combatState=null;
      showScreen('s-adventure');
      renderAdventureFlow();
    }}
  ]);
}

function showCombatResults(){
  // apply XP, gold, loot to main party
  const xp = combatState.xpGained;
  const gold = combatState.goldGained;
  G.gold += gold;
  combatState.loot.forEach(id=>{
    if(CONSUMABLES[id]||ARMORS[id]||WEAPONS[id]) addItem(id,1);
  });

  // copy HP changes back to main party
  combatState.party.forEach((cc,i)=>{ G.party[i].hp=cc.hp; G.party[i].ko=cc.ko; G.party[i].statusEffects=[]; });

  const levelUps = [];
  G.party.forEach(c=>{
    if(c.ko){ c.hp=1; c.ko=false; }
    c.xp = (c.xp||0)+xp;
    while(c.xp >= xpThreshold(c.level)){
      c.xp -= xpThreshold(c.level);
      c.level++;
      applyLevelUp(c);
      levelUps.push({name:c.name, level:c.level});
    }
  });

  // build results screen
  const title = document.getElementById('results-title');
  title.textContent = 'VICTORY!';
  const content = document.getElementById('results-content');
  content.innerHTML = '';
  addResult(content,`XP Gained: ${xp}`, 'xp');
  addResult(content,`Gold Gained: ${gold}`, 'good');
  if(combatState.loot.length){
    combatState.loot.forEach(id=>addResult(content,`Loot: ${ALL_ITEMS[id]?.name||id}`,'loot'));
  }
  levelUps.forEach(lu=>addResult(content,`★ ${lu.name} reached Lv.${lu.level}!`,'good'));

  showScreen('s-results');

  // show level up banners
  levelUps.forEach((lu,i)=>{
    setTimeout(()=>showLevelUp(lu.name, lu.level), i*2100);
  });

  // check mutation after fight
  setTimeout(()=>{
    checkMutationOffer(()=>{});
  }, levelUps.length*2100+500);
}

function addResult(cont, text, cls=''){
  const d = document.createElement('div');
  d.className='result-line '+cls;
  d.textContent=text;
  cont.appendChild(d);
}

function endCombat(){
  const node = currentNodeForCombat;
  combatState=null;
  if(!node){ showScreen('s-adventure'); renderAdventureFlow(); return; }
  if(node._failReturn!==undefined){
    G.currentNodeId=node._failReturn;
    checkMonsterTransform(()=>{ showScreen('s-adventure'); renderAdventureFlow(); });
    return;
  }
  advanceFromNode(node.id);
}

function startFailCombat(returnNodeId){
  G.currentNodeId=returnNodeId;
  startCombat({type:'combat',title:'Insect Swarm!',desc:'The wrong setting releases an angry swarm.',enemies:[{id:'insect_swarm',count:2}],_failReturn:returnNodeId});
}

function xpThreshold(level){ return level*20; }

function applyLevelUp(c){
  const t = CHAR_TYPES[c.type];
  if(c.type==='monster'){
    c.maxHp = (MONSTER_FORMS[c.form]?.hp||28) + c.level*4;
    c.hp = c.maxHp; // heal on level up
    return;
  }
  c.maxHp += t.hpPerLv;
  c.hp = Math.min(c.hp+t.hpPerLv, c.maxHp);
  c.str = (c.str||0) + t.strPerLv;
  c.dex = (c.dex||0) + t.dexPerLv;
  c.def += t.defPerLv;
  // round non-integer stats
  c.str = Math.round(c.str*10)/10;
  c.dex = Math.round(c.dex*10)/10;
  c.def = Math.round(c.def*10)/10;
}

function checkMutationOffer(cb){
  const mutants = G.party.filter(c=>c.type==='mutant');
  if(!mutants.length){ cb(); return; }
  const mutant = mutants[0];
  if(!chance(0.2)){ cb(); return; }
  const newAb = pick(ABILITIES);
  offerMutation(mutant, newAb, cb);
}

function offerMutation(ch, ab, cb){
  pendingMutation = ab;
  pendingMutationChar = ch;

  const slotLabels = (ch.abilities||[]).map((id,i)=>{
    const existing = id ? ABILITIES.find(x=>x.id===id) : null;
    return `Slot ${i+1}: ${existing?existing.name:'(Empty)'}`;
  });

  const buttons = (ch.abilities||[]).map((id,i)=>({
    label: `Replace ${slotLabels[i]}`,
    action: ()=>{
      ch.abilities[i] = ab.id;
      addLog && addLog(`${ch.name} learned ${ab.name}!`,'good');
      cb();
    }
  }));
  buttons.push({label:'Decline', action:cb});

  showModal(`New Mutation: ${ab.name}`, `${ab.desc}\n\nChoose a slot to replace:`, buttons);
}
