<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #06060e;
  --panel: #0b0b16;
  --border: #1a1a30;
  --green: #39ff14;
  --gold: #ffc300;
  --white: #dde3ff;
  --dim: #353555;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--white);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px;
}
h1 {
  font-family: 'Black Ops One', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  color: var(--green);
  text-shadow: 0 0 20px #39ff1466;
  letter-spacing: 6px;
  margin-bottom: 6px;
}
.sub { font-size: 0.62rem; color: var(--dim); letter-spacing: 4px; margin-bottom: 40px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  max-width: 800px;
  width: 100%;
}
.game-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 24px 20px;
  text-decoration: none;
  color: var(--white);
  display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center;
  transition: all 0.2s;
}
.game-card:hover {
  border-color: var(--green);
  box-shadow: 0 0 20px #39ff1422;
  transform: translateY(-3px);
}
.game-icon { font-size: 2.8rem; }
.game-name {
  font-family: 'Black Ops One', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 2px;
  color: var(--green);
}
.game-desc { font-size: 0.58rem; color: var(--dim); line-height: 1.6; }
.back { margin-top: 40px; font-size: 0.6rem; color: var(--dim); }
.back a { color: var(--dim); text-decoration: none; }
.back a:hover { color: var(--white); }
</style>
</head>
<body>
  <h1>GAMES</h1>
  <div class="sub">-- PICK YOUR BATTLE --</div>

  <div class="grid">
    <a class="game-card" href="stick-wars.html">
      <div class="game-icon">⚔️</div>
      <div class="game-name">STICK WARS</div>
      <div class="game-desc">Wave-based brawler. Fight 10 waves of enemies, collect coins, unlock upgrades, and ascend to power.</div>
    </a>
  </div>

  <div class="back"><a href="../">← back to home</a></div>
</body>
</html>
