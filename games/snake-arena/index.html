<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Neon Snake Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06060e; --panel:#0b0b16; --border:#1a1a30;
  --green:#39ff14; --gold:#ffc300; --blue:#4488ff; --red:#ff2244;
  --white:#dde3ff; --dim:#8899bb; --purple:#b44fff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; background:var(--bg); overflow:hidden;
  font-family:'Share Tech Mono', monospace; color:var(--white);
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  overscroll-behavior:none;
}
#app { display:flex; flex-direction:column; height:100dvh; }
#hud {
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) 14px 6px;
  gap:6px; font-size:0.72rem;
}
.hud-label { font-size:0.52rem; letter-spacing:2px; color:var(--dim); }
.hud-val { font-size:0.95rem; line-height:1.15; }
#h-score .hud-val { color:var(--green); }
#h-len .hud-val { color:var(--blue); }
#h-combo .hud-val { color:var(--purple); }
#h-best .hud-val { color:var(--gold); }
#h-best { text-align:right; }
#game { flex:1; display:block; width:100%; touch-action:none; }
.overlay {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(6,6,14,0.88); text-align:center; padding:24px;
  touch-action:none;
}
.overlay.hidden { display:none; }
.ov-title {
  font-family:'Black Ops One', sans-serif; font-size:1.9rem; letter-spacing:4px;
  color:var(--green); text-shadow:0 0 24px rgba(57,255,20,0.7); margin-bottom:14px;
}
.ov-sub { font-size:0.75rem; color:var(--dim); letter-spacing:1px; line-height:2; margin-bottom:26px; }
.ov-score {
  font-family:'Black Ops One', sans-serif; font-size:1.5rem; letter-spacing:3px;
  color:var(--gold); text-shadow:0 0 18px rgba(255,195,0,0.6); margin-bottom:8px;
}
.ov-tap {
  font-size:0.85rem; color:var(--white); letter-spacing:3px;
  border:1px solid var(--border); background:var(--panel);
  padding:12px 26px; border-radius:8px;
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
#banner {
  position:fixed; left:0; right:0; top:30%; z-index:40; text-align:center;
  pointer-events:none; opacity:0; transition:opacity 0.25s;
}
#banner.show { opacity:1; }
#banner .b-big {
  font-family:'Black Ops One', sans-serif; font-size:1.4rem; letter-spacing:4px;
  color:var(--gold); text-shadow:0 0 22px rgba(255,195,0,0.8);
}
</style>
</head>
<body>
<div id="build-badge" style="position:fixed;top:2px;right:6px;z-index:2147483647;font-family:'Courier New',monospace;font-size:9px;color:#888;opacity:0.55;pointer-events:none;letter-spacing:0.5px;user-select:none;">build 2026-07-24 05:24 UTC</div>
<div id="app">
  <div id="hud">
    <div id="h-score"><div class="hud-label">SCORE</div><div class="hud-val" id="v-score">0</div></div>
    <div id="h-len"><div class="hud-label">LENGTH</div><div class="hud-val" id="v-len">14</div></div>
    <div id="h-combo"><div class="hud-label">COMBO</div><div class="hud-val" id="v-combo">–</div></div>
    <div id="h-best"><div class="hud-label">BEST</div><div class="hud-val" id="v-best">0</div></div>
  </div>
  <canvas id="game"></canvas>
</div>

<div id="banner"><div class="b-big" id="b-big"></div></div>

<div class="overlay" id="ov-start">
  <div class="ov-title">NEON SNAKE ARENA</div>
  <div class="ov-sub">
    HOLD + DRAG ANYWHERE TO STEER<br>
    EAT ORBS TO GROW &bull; CHAIN FOR COMBOS<br>
    GOLD ORBS ARE WORTH BIG POINTS<br>
    AVOID WALLS, MINES, AND YOURSELF
  </div>
  <div class="ov-tap">TAP TO SLITHER</div>
</div>

<div class="overlay hidden" id="ov-dead">
  <div class="ov-title" style="color:var(--red); text-shadow:0 0 24px rgba(255,34,68,0.7);" id="d-title">CRASHED</div>
  <div class="ov-score" id="d-score">0</div>
  <div class="ov-sub" id="d-sub"></div>
  <div class="ov-tap">TAP TO SLITHER AGAIN</div>
</div>

<script>
'use strict';
// ------------------------------------------------------------- constants
const UW = 100, UH = 150;               // arena unit space
const PATH_SPACING = 0.7;               // distance between recorded path samples
const SEG_SPACING = 1.4;                // distance between body segments (= 2 samples)
const START_SEGS = 14, GROW_PER_ORB = 5, MAX_SEGS = 220;
const HEAD_R = 2.1;
const SPEED0 = 30, SPEED_RAMP = 0.28, SPEED_MAX = 54;   // ramp per second played
const TURN = 4.6;                       // rad/s steering rate
const COMBO_WINDOW = 4;                 // s between eats to keep the chain
const ORB_COUNT = 3, ORB_R = 2.0;
const GOLD_EVERY = 5, GOLD_LIFE = 7;
const MINE_START = 10, MINE_EVERY = 9, MINE_CAP = 9;
const MINE_TELEGRAPH = 1.3, MINE_LIFE = 26, MINE_R = 3.0;

// ------------------------------------------------------------- state
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let dpr = 1, cw = 0, ch = 0, scale = 1, ox = 0, oy = 0;

let state = 'title';                    // title | play | dead
let simTime = 0, playT = 0, deathT = 0;
let head = { x: 50, y: 75, ang: -Math.PI / 2 };
let targetAng = -Math.PI / 2;
let pts = [];                           // path samples, newest first
let travelAcc = 0;
let segs = START_SEGS;
let orbs = [];                          // {x,y,gold,age}
let orbSpawned = 0;
let mines = [];                         // {x,y,t} t counts up; telegraph then active
let mineTimer = MINE_START;
let scoreV = 0, comboN = 0, comboT = 0;
let particles = [];
let shake = 0;
let joy = null;                         // {ox,oy,cx,cy} screen px
let keys = {};
let best = +(localStorage.getItem('snakeArena.best') || 0);

const $ = id => document.getElementById(id);

// ------------------------------------------------------------- audio
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq, dur, type, gain, slideTo) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(gain || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sndEat   = n => beep(440 + Math.min(n, 8) * 70, 0.09, 'sine', 0.13);
const sndGold  = () => { beep(660, 0.09, 'sine', 0.13); setTimeout(() => beep(880, 0.09, 'sine', 0.12), 70); setTimeout(() => beep(1174, 0.14, 'sine', 0.12), 140); };
const sndMine  = () => beep(180, 0.15, 'square', 0.06, 120);
const sndDeath = () => { beep(240, 0.4, 'sawtooth', 0.16, 40); setTimeout(() => beep(150, 0.5, 'square', 0.1, 30), 90); };

// ------------------------------------------------------------- layout
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  cw = canvas.clientWidth; ch = canvas.clientHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const pad = 8;
  scale = Math.min((cw - pad * 2) / UW, (ch - pad * 2) / UH);
  ox = (cw - UW * scale) / 2;
  oy = (ch - UH * scale) / 2;
}
const px = x => ox + x * scale;
const py = y => oy + y * scale;

// ------------------------------------------------------------- flow
function reset() {
  simTime = 0; playT = 0; deathT = 0;
  head = { x: 50, y: 95, ang: -Math.PI / 2 };
  targetAng = head.ang; joy = null;
  pts = [];
  for (let i = 0; i < START_SEGS * 2 + 6; i++) pts.push({ x: head.x, y: head.y + i * PATH_SPACING });
  travelAcc = 0;
  segs = START_SEGS;
  orbs = []; orbSpawned = 0;
  for (let i = 0; i < ORB_COUNT; i++) spawnOrb();
  mines = []; mineTimer = MINE_START;
  scoreV = 0; comboN = 0; comboT = 0;
  particles = []; shake = 0;
  state = 'play';
  updateHud();
}
function speedNow() { return Math.min(SPEED_MAX, SPEED0 + playT * SPEED_RAMP); }
function updateHud() {
  $('v-score').textContent = scoreV;
  $('v-len').textContent = segs;
  $('v-combo').textContent = comboN > 1 ? 'x' + comboN : '–';
  $('v-best').textContent = best;
}
function showBanner(t, ms) {
  $('b-big').textContent = t;
  $('banner').classList.add('show');
  clearTimeout(showBanner.t);
  showBanner.t = setTimeout(() => $('banner').classList.remove('show'), ms || 900);
}
function die(why) {
  state = 'dead'; deathT = 0; shake = 0.5;
  sndDeath();
  for (let i = 0; i < segs; i += 2) {
    const p = bodyPoint(i);
    if (p) burst(p.x, p.y, i % 4 ? '#39ff14' : '#4488ff', 3);
  }
  burst(head.x, head.y, '#ff2244', 24);
  const isBest = scoreV > best;
  if (isBest) { best = scoreV; localStorage.setItem('snakeArena.best', best); }
  setTimeout(() => {
    $('d-title').textContent = why;
    $('d-score').textContent = scoreV + (isBest ? '  ★ NEW BEST' : '');
    $('d-sub').innerHTML = 'LENGTH ' + segs + '<br>BEST ' + best;
    $('ov-dead').classList.remove('hidden');
    updateHud();
  }, 700);
}

// ------------------------------------------------------------- snake body
function bodyPoint(i) { return pts[Math.min(pts.length - 1, (i + 1) * 2)]; }
function bodyRadius(i) { return HEAD_R * (1 - 0.55 * (i / Math.max(1, segs - 1))); }

// ------------------------------------------------------------- spawning
function spawnOrb() {
  orbSpawned++;
  const gold = orbSpawned % GOLD_EVERY === 0;
  for (let tries = 0; tries < 40; tries++) {
    const x = 8 + Math.random() * (UW - 16);
    const y = 8 + Math.random() * (UH - 16);
    if (Math.hypot(x - head.x, y - head.y) < 18) continue;
    let bad = false;
    for (const m of mines) if (Math.hypot(x - m.x, y - m.y) < MINE_R + 5) { bad = true; break; }
    if (bad) continue;
    orbs.push({ x, y, gold, age: 0 });
    return;
  }
  orbs.push({ x: 8 + Math.random() * (UW - 16), y: 8 + Math.random() * (UH - 16), gold, age: 0 });
}
function spawnMine() {
  for (let tries = 0; tries < 40; tries++) {
    const x = 10 + Math.random() * (UW - 20);
    const y = 10 + Math.random() * (UH - 20);
    if (Math.hypot(x - head.x, y - head.y) < 26) continue;
    mines.push({ x, y, t: 0 });
    sndMine();
    return;
  }
}

// ------------------------------------------------------------- step
function angleTo(cur, target, rate) {
  let d = target - cur;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  const m = rate;
  if (d > m) d = m; else if (d < -m) d = -m;
  return cur + d;
}
function step(dt) {
  playT += dt;

  // steering
  if (keys.ArrowLeft || keys.KeyA) targetAng = head.ang - 1;
  if (keys.ArrowRight || keys.KeyD) targetAng = head.ang + 1;
  head.ang = angleTo(head.ang, targetAng, TURN * dt);

  // move
  const sp = speedNow();
  const dx = Math.cos(head.ang) * sp * dt, dy = Math.sin(head.ang) * sp * dt;
  head.x += dx; head.y += dy;
  travelAcc += Math.hypot(dx, dy);
  while (travelAcc >= PATH_SPACING) {
    travelAcc -= PATH_SPACING;
    pts.unshift({ x: head.x, y: head.y });
  }
  const need = segs * 2 + 8;
  if (pts.length > need) pts.length = need;

  // combo decay
  if (comboT > 0) { comboT -= dt; if (comboT <= 0) { comboN = 0; updateHud(); } }

  // walls
  if (head.x < HEAD_R || head.x > UW - HEAD_R || head.y < HEAD_R || head.y > UH - HEAD_R) {
    die('HIT THE WALL'); return;
  }
  // self
  for (let i = 8; i < segs; i++) {
    const p = bodyPoint(i);
    if (!p) break;
    if (Math.hypot(head.x - p.x, head.y - p.y) < HEAD_R + bodyRadius(i) * 0.55) {
      die('ATE YOURSELF'); return;
    }
  }
  // mines
  for (const m of mines) {
    if (m.t < MINE_TELEGRAPH || m.t > MINE_LIFE) continue;
    if (Math.hypot(head.x - m.x, head.y - m.y) < HEAD_R + MINE_R * 0.8) {
      die('MINED'); return;
    }
  }
  for (const m of mines) m.t += dt;
  mines = mines.filter(m => m.t < MINE_LIFE + 1);

  mineTimer -= dt;
  if (mineTimer <= 0 && mines.length < MINE_CAP) { spawnMine(); mineTimer = MINE_EVERY; }

  // orbs
  for (const o of orbs) o.age += dt;
  orbs = orbs.filter(o => {
    if (o.gold && o.age > GOLD_LIFE) return false;
    if (Math.hypot(head.x - o.x, head.y - o.y) < HEAD_R + ORB_R + 0.8) {
      comboN = Math.min(9, comboN + 1); comboT = COMBO_WINDOW;
      const pts2 = (o.gold ? 50 : 10) * comboN;
      scoreV += pts2;
      segs = Math.min(MAX_SEGS, segs + GROW_PER_ORB);
      if (o.gold) { sndGold(); showBanner('+' + pts2 + ' GOLD!'); }
      else sndEat(comboN);
      if (comboN >= 4 && !o.gold) showBanner('COMBO x' + comboN, 700);
      burst(o.x, o.y, o.gold ? '#ffc300' : '#39ff14', o.gold ? 18 : 8);
      updateHud();
      return false;
    }
    return true;
  });
  while (orbs.length < ORB_COUNT) spawnOrb();
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 12 + Math.random() * 45;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.35 + Math.random() * 0.3, c: color });
  }
}

// ------------------------------------------------------------- input
let lastTap = 0;
function pointerPos(e) {
  const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  return [t.clientX, t.clientY];
}
function onDown(e) {
  e.preventDefault(); audio();
  if (state !== 'play') return;
  const [x, y] = pointerPos(e);
  joy = { ox: x, oy: y, cx: x, cy: y };
}
function onMove(e) {
  e.preventDefault();
  if (!joy) return;
  const [x, y] = pointerPos(e);
  joy.cx = x; joy.cy = y;
  const dx = x - joy.ox, dy = y - joy.oy;
  if (Math.hypot(dx, dy) > 12) targetAng = Math.atan2(dy, dx);
}
function onUp(e) {
  e.preventDefault();
  joy = null;
}
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp, { passive: false });
canvas.addEventListener('touchcancel', onUp, { passive: false });
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', e => { if (joy) onMove(e); });
window.addEventListener('mouseup', e => { if (joy) onUp(e); });
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function uiTap(e) {
  e.preventDefault();
  const now = performance.now();
  if (now - lastTap < 400) return;
  lastTap = now;
  audio();
  if (state === 'title') { $('ov-start').classList.add('hidden'); reset(); }
  else if (state === 'dead' && deathT > 0.7) { $('ov-dead').classList.add('hidden'); reset(); }
}
$('ov-start').addEventListener('touchend', uiTap, { passive: false });
$('ov-start').addEventListener('click', uiTap);
$('ov-dead').addEventListener('touchend', uiTap, { passive: false });
$('ov-dead').addEventListener('click', uiTap);

// ------------------------------------------------------------- render
function render() {
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 14, (Math.random() - 0.5) * shake * 14);

  // arena
  ctx.fillStyle = '#0b0b16';
  ctx.fillRect(px(0), py(0), UW * scale, UH * scale);
  ctx.strokeStyle = 'rgba(68,136,255,0.05)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let gx = 10; gx < UW; gx += 10) { ctx.moveTo(px(gx), py(0)); ctx.lineTo(px(gx), py(UH)); }
  for (let gy = 10; gy < UH; gy += 10) { ctx.moveTo(px(0), py(gy)); ctx.lineTo(px(UW), py(gy)); }
  ctx.stroke();

  // mines
  for (const m of mines) {
    if (m.t < MINE_TELEGRAPH) {
      const f = m.t / MINE_TELEGRAPH;
      ctx.strokeStyle = 'rgba(255,34,68,' + (0.25 + f * 0.55) + ')';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(px(m.x), py(m.y), (MINE_R + (1 - f) * 7) * scale, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      const dying = m.t > MINE_LIFE;
      const a = dying ? Math.max(0, 1 - (m.t - MINE_LIFE)) : 1;
      const pulse = 0.6 + 0.4 * Math.sin(simTime * 5 + m.x);
      ctx.globalAlpha = a;
      ctx.shadowColor = '#ff2244'; ctx.shadowBlur = 8 * pulse;
      ctx.fillStyle = '#ff2244';
      ctx.beginPath(); ctx.arc(px(m.x), py(m.y), MINE_R * scale * 0.62, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      // spikes
      ctx.strokeStyle = 'rgba(255,34,68,' + (0.7 * a) + ')'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let k = 0; k < 8; k++) {
        const a2 = k / 8 * Math.PI * 2 + simTime * 0.8;
        ctx.moveTo(px(m.x + Math.cos(a2) * MINE_R * 0.62), py(m.y + Math.sin(a2) * MINE_R * 0.62));
        ctx.lineTo(px(m.x + Math.cos(a2) * MINE_R * 1.05), py(m.y + Math.sin(a2) * MINE_R * 1.05));
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // orbs
  for (const o of orbs) {
    const bob = Math.sin(simTime * 4 + o.x) * 0.6;
    const blink = o.gold && o.age > GOLD_LIFE - 2 && Math.floor(o.age * 6) % 2 === 0;
    if (blink) continue;
    const col = o.gold ? '#ffc300' : '#39ff14';
    ctx.shadowColor = col; ctx.shadowBlur = o.gold ? 14 : 9;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(px(o.x), py(o.y + bob), ORB_R * scale * (o.gold ? 0.75 : 0.6), 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = col; ctx.globalAlpha = 0.4; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(px(o.x), py(o.y + bob), (ORB_R + 0.8) * scale, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // snake body (tail → head so head draws on top)
  if (state !== 'title') {
    for (let i = segs - 1; i >= 0; i--) {
      const p = bodyPoint(i);
      if (!p) continue;
      const f = i / Math.max(1, segs - 1);
      const r = bodyRadius(i);
      // green head fading to blue tail
      const cr = Math.round(57 + (68 - 57) * f);
      const cg = Math.round(255 + (136 - 255) * f);
      const cb = Math.round(20 + (255 - 20) * f);
      ctx.fillStyle = 'rgb(' + cr + ',' + cg + ',' + cb + ')';
      if (i % 3 === 0) { ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 6; }
      ctx.beginPath(); ctx.arc(px(p.x), py(p.y), r * scale, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    // head
    const hr = HEAD_R * (comboT > 0 ? 1 + 0.12 * Math.sin(simTime * 10) : 1);
    ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#39ff14';
    ctx.beginPath(); ctx.arc(px(head.x), py(head.y), hr * scale, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // eyes
    const ea = head.ang;
    for (const s of [-1, 1]) {
      const exx = head.x + Math.cos(ea) * hr * 0.45 + Math.cos(ea + Math.PI / 2) * s * hr * 0.5;
      const eyy = head.y + Math.sin(ea) * hr * 0.45 + Math.sin(ea + Math.PI / 2) * s * hr * 0.5;
      ctx.fillStyle = '#06060e';
      ctx.beginPath(); ctx.arc(px(exx), py(eyy), hr * scale * 0.22, 0, Math.PI * 2); ctx.fill();
    }
  }

  // joystick indicator
  if (joy) {
    ctx.strokeStyle = 'rgba(221,227,255,0.25)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(joy.ox, joy.oy, 26, 0, Math.PI * 2); ctx.stroke();
    const dx = joy.cx - joy.ox, dy = joy.cy - joy.oy;
    const d = Math.hypot(dx, dy) || 1;
    const cl = Math.min(d, 26);
    ctx.fillStyle = 'rgba(57,255,20,0.5)';
    ctx.beginPath(); ctx.arc(joy.ox + dx / d * cl, joy.oy + dy / d * cl, 10, 0, Math.PI * 2); ctx.fill();
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.2);
    ctx.fillStyle = p.c;
    ctx.fillRect(px(p.x) - 1.5, py(p.y) - 1.5, 3, 3);
  }
  ctx.globalAlpha = 1;

  // combo timer arc
  if (comboT > 0 && comboN > 1 && state === 'play') {
    ctx.strokeStyle = '#b44fff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px(head.x), py(head.y), (HEAD_R + 2.2) * scale, -Math.PI / 2, -Math.PI / 2 + (comboT / COMBO_WINDOW) * Math.PI * 2);
    ctx.stroke();
  }

  // border
  ctx.strokeStyle = 'rgba(57,255,20,0.65)'; ctx.lineWidth = 2.5;
  ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 10;
  ctx.strokeRect(px(0), py(0), UW * scale, UH * scale);
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ------------------------------------------------------------- main loop
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.1) dt = 0.1;
  simTime += dt;
  if (state === 'play') step(dt);
  if (state === 'dead') deathT += dt;
  shake = Math.max(0, shake - dt);
  for (const p of particles) { p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; }
  particles = particles.filter(p => p.life > 0);
  render();
}
window.addEventListener('resize', resize);
resize();
updateHud();
requestAnimationFrame(frame);
</script>
</body>
