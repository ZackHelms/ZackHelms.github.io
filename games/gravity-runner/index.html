<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gravity Runner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06060e; --panel:#0b0b16; --border:#1a1a30;
  --green:#39ff14; --gold:#ffc300; --blue:#4488ff; --red:#ff2244;
  --white:#dde3ff; --dim:#8899bb; --purple:#b44fff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; background:var(--bg); overflow:hidden;
  font-family:'Share Tech Mono', monospace; color:var(--white);
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  overscroll-behavior:none;
}
#app { display:flex; flex-direction:column; height:100dvh; }
#hud {
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) 14px 6px;
  gap:6px; font-size:0.72rem;
}
.hud-label { font-size:0.52rem; letter-spacing:2px; color:var(--dim); }
.hud-val { font-size:0.95rem; line-height:1.15; }
#h-dist .hud-val { color:var(--green); }
#h-orbs .hud-val { color:var(--gold); }
#h-spd .hud-val { color:var(--blue); }
#h-best .hud-val { color:var(--purple); }
#h-best { text-align:right; }
#game { flex:1; display:block; width:100%; touch-action:none; }
.overlay {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(6,6,14,0.88); text-align:center; padding:24px;
  touch-action:none;
}
.overlay.hidden { display:none; }
.ov-title {
  font-family:'Black Ops One', sans-serif; font-size:2.1rem; letter-spacing:4px;
  color:var(--green); text-shadow:0 0 24px rgba(57,255,20,0.7); margin-bottom:14px;
}
.ov-sub { font-size:0.75rem; color:var(--dim); letter-spacing:1px; line-height:2; margin-bottom:26px; }
.ov-score {
  font-family:'Black Ops One', sans-serif; font-size:1.5rem; letter-spacing:3px;
  color:var(--gold); text-shadow:0 0 18px rgba(255,195,0,0.6); margin-bottom:8px;
}
.ov-tap {
  font-size:0.85rem; color:var(--white); letter-spacing:3px;
  border:1px solid var(--border); background:var(--panel);
  padding:12px 26px; border-radius:8px;
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
#banner {
  position:fixed; left:0; right:0; top:30%; z-index:40; text-align:center;
  pointer-events:none; opacity:0; transition:opacity 0.25s;
}
#banner.show { opacity:1; }
#banner .b-big {
  font-family:'Black Ops One', sans-serif; font-size:1.4rem; letter-spacing:4px;
  color:var(--gold); text-shadow:0 0 22px rgba(255,195,0,0.8);
}
</style>
</head>
<body>
<div id="build-badge" style="position:fixed;top:2px;right:6px;z-index:2147483647;font-family:'Courier New',monospace;font-size:9px;color:#888;opacity:0.55;pointer-events:none;letter-spacing:0.5px;user-select:none;">build 2026-07-24 05:24 UTC</div>
<div id="app">
  <div id="hud">
    <div id="h-dist"><div class="hud-label">DIST</div><div class="hud-val" id="v-dist">0</div></div>
    <div id="h-orbs"><div class="hud-label">ORBS</div><div class="hud-val" id="v-orbs">0</div></div>
    <div id="h-spd"><div class="hud-label">SPEED</div><div class="hud-val" id="v-spd">x1.0</div></div>
    <div id="h-best"><div class="hud-label">BEST</div><div class="hud-val" id="v-best">0</div></div>
  </div>
  <canvas id="game"></canvas>
</div>

<div id="banner"><div class="b-big" id="b-big"></div></div>

<div class="overlay" id="ov-start">
  <div class="ov-title">GRAVITY RUNNER</div>
  <div class="ov-sub">
    TAP TO FLIP GRAVITY<br>
    RUN THE CORRIDOR &bull; DODGE THE RED<br>
    GRAB GOLD ORBS FOR BONUS POINTS<br>
    YOU CAN ONLY FLIP WHILE ON A SURFACE
  </div>
  <div class="ov-tap">TAP TO RUN</div>
</div>

<div class="overlay hidden" id="ov-dead">
  <div class="ov-title" style="color:var(--red); text-shadow:0 0 24px rgba(255,34,68,0.7);">WRECKED</div>
  <div class="ov-score" id="d-score">0</div>
  <div class="ov-sub" id="d-sub"></div>
  <div class="ov-tap">TAP TO RUN AGAIN</div>
</div>

<script>
'use strict';
// ------------------------------------------------------------- constants
// unit space: 100 wide, 160 tall, y grows downward. Player runs "rightward";
// the world scrolls left past a fixed player x.
const UW = 100, UH = 160;
const CEIL = 14, FLOOR = 146;           // corridor surfaces (inner faces)
const PX = 26;                          // player fixed x (center)
const PSIZE = 5.6;                      // player cube half... full side
const GRAV = 1350;                      // units/s^2
const SPEED0 = 52, SPEEDMAX = 150, SPEEDRAMP = 1.35;  // u/s, ramp per second
const COYOTE = 0.09;                    // s of grace after leaving a surface
const ORB_R = 2.4;

// ------------------------------------------------------------- state
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let dpr = 1, cw = 0, ch = 0, scale = 1, ox = 0, oy = 0;

let state = 'title';                    // title | play | dead
let simTime = 0;
let speed = SPEED0;
let dist = 0;                           // world distance scrolled (units)
let gdir = 1;                           // 1 = gravity down, -1 = up
let py = FLOOR, pvy = 0;                // player y (bottom face when gdir=1)
let grounded = true, coyote = 0;
let orbsGot = 0;
let obstacles = [];                     // {x,y,w,h,kind} x in world coords
let orbs = [];                          // {x,y,got}
let nextSpawnX = 0;                     // world x where next pattern spawns
let lastSafeSide = 1;                   // which surface the last pattern let you use
let particles = [];
let trail = [];
let shake = 0;
let deathT = 0;
let best = +(localStorage.getItem('gravityRunner.best') || 0);

const $ = id => document.getElementById(id);

// ------------------------------------------------------------- audio
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq, dur, type, gain, slideTo) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(gain || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sndFlip  = () => beep(170, 0.12, 'triangle', 0.13, 340);
const sndLand  = () => beep(120, 0.05, 'square', 0.05);
const sndOrb   = () => { beep(660, 0.08, 'sine', 0.12); setTimeout(() => beep(880, 0.1, 'sine', 0.1), 60); };
const sndDeath = () => { beep(220, 0.4, 'sawtooth', 0.16, 40); setTimeout(() => beep(160, 0.5, 'square', 0.1, 30), 80); };

// ------------------------------------------------------------- layout
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  cw = canvas.clientWidth; ch = canvas.clientHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const pad = 8;
  scale = Math.min((cw - pad * 2) / UW, (ch - pad * 2) / UH);
  ox = (cw - UW * scale) / 2;
  oy = (ch - UH * scale) / 2;
}
const px = x => ox + x * scale;
const py2 = y => oy + y * scale;

// ------------------------------------------------------------- patterns
// Each pattern appends obstacles at world x `wx` and returns its width.
// kinds: 'spike' (triangle, deadly), 'block' (rect, deadly), 'gate' (deadly)
// Every pattern leaves at least one survivable route at current speeds.
function addSpikes(wx, side, n) {
  // run of n spikes on one surface; survivable from the other surface
  const w = 7;
  for (let i = 0; i < n; i++) {
    const x = wx + i * w;
    if (side === 1) obstacles.push({ x, y: FLOOR - 7, w: w - 1, h: 7, kind: 'spike', side: 1 });
    else obstacles.push({ x, y: CEIL, w: w - 1, h: 7, kind: 'spike', side: -1 });
  }
  lastSafeSide = -side;
  return n * w;
}
function addCenterBlock(wx) {
  // floating block mid-corridor: hug either surface to pass
  const h = 58, y = (CEIL + FLOOR) / 2 - h / 2;
  obstacles.push({ x: wx, y, w: 10, h, kind: 'block', side: 0 });
  // safe side unchanged — both work
  return 10;
}
function addGate(wx, side) {
  // pillar from one surface most of the way across: must be on other side
  const h = (FLOOR - CEIL) * 0.62;
  if (side === 1) obstacles.push({ x: wx, y: FLOOR - h, w: 8, h, kind: 'gate', side: 1 });
  else obstacles.push({ x: wx, y: CEIL, w: 8, h, kind: 'gate', side: -1 });
  lastSafeSide = -side;
  return 8;
}
function addStagger(wx) {
  // floor spikes then ceiling spikes with a flip window between
  let w = addSpikes(wx, 1, 2);
  const gap = 30 + speed * 0.22;         // flip travel window scales with speed
  w += gap;
  w += addSpikes(wx + w, -1, 2);
  return w;
}
function addOrbArc(wx, side) {
  // decorative reward line along a surface
  for (let i = 0; i < 4; i++) {
    const x = wx + i * 8;
    const y = side === 1 ? FLOOR - 6 : CEIL + 6;
    orbs.push({ x, y, got: false });
  }
  return 32;
}
function spawnPattern() {
  const wx = nextSpawnX;
  const r = Math.random();
  let w = 0;
  const hard = Math.min(1, dist / 2400);      // 0 → 1 difficulty over ~2400u
  if (r < 0.26) w = addSpikes(wx, lastSafeSide * -1 === 1 ? 1 : -1, 1 + (Math.random() < hard ? 2 : 1));
  else if (r < 0.46) w = addGate(wx, Math.random() < 0.5 ? 1 : -1);
  else if (r < 0.62) w = addCenterBlock(wx);
  else if (r < 0.82) w = addStagger(wx);
  else w = addOrbArc(wx, Math.random() < 0.5 ? 1 : -1);
  // spacing shrinks as difficulty rises but always leaves reaction+flip room
  const minGap = 34 + speed * 0.30;
  const slack = (1 - hard) * 42;
  nextSpawnX = wx + w + minGap + Math.random() * slack;
}

// ------------------------------------------------------------- flow
function reset() {
  simTime = 0; speed = SPEED0; dist = 0;
  gdir = 1; py = FLOOR; pvy = 0; grounded = true; coyote = 0;
  orbsGot = 0; obstacles = []; orbs = []; particles = []; trail = [];
  shake = 0; deathT = 0;
  nextSpawnX = 130;                      // first hazard comfortably ahead
  lastSafeSide = 1;
  state = 'play';
  updateHud();
}
function score() { return Math.floor(dist / 10) + orbsGot * 25; }
function updateHud() {
  $('v-dist').textContent = Math.floor(dist / 10);
  $('v-orbs').textContent = orbsGot;
  $('v-spd').textContent = 'x' + (speed / SPEED0).toFixed(1);
  $('v-best').textContent = best;
}
function showBanner(t, ms) {
  $('b-big').textContent = t;
  $('banner').classList.add('show');
  clearTimeout(showBanner.t);
  showBanner.t = setTimeout(() => $('banner').classList.remove('show'), ms || 900);
}
function die() {
  state = 'dead'; deathT = 0; shake = 0.5;
  sndDeath();
  burst(PX, py - gdir * PSIZE / 2, '#ff2244', 40);
  burst(PX, py - gdir * PSIZE / 2, '#ffc300', 18);
  const s = score();
  const isBest = s > best;
  if (isBest) { best = s; localStorage.setItem('gravityRunner.best', best); }
  setTimeout(() => {
    $('d-score').textContent = s + (isBest ? '  ★ NEW BEST' : '');
    $('d-sub').innerHTML = 'DISTANCE ' + Math.floor(dist / 10) + ' &bull; ORBS ' + orbsGot + '<br>BEST ' + best;
    $('ov-dead').classList.remove('hidden');
    updateHud();
  }, 650);
}

// ------------------------------------------------------------- physics
function flip() {
  if (state !== 'play') return;
  if (!grounded && coyote <= 0) return;
  const cy = py - gdir * PSIZE / 2;   // keep the cube's center fixed across the flip
  gdir = -gdir;
  py = cy + gdir * PSIZE / 2;
  grounded = false; coyote = 0;
  pvy = gdir * 30;                       // small shove off the surface
  sndFlip();
  burst(PX, py, '#39ff14', 8);
}
function playerRect() {
  // py tracks the surface-contact face; center offset by gravity direction
  const cy = py - gdir * PSIZE / 2;
  return [PX - PSIZE / 2, cy - PSIZE / 2, PSIZE, PSIZE];
}
function rectsOverlap(a, b) {
  return a[0] < b[0] + b[2] && a[0] + a[2] > b[0] && a[1] < b[1] + b[3] && a[1] + a[3] > b[1];
}
function step(dt) {
  speed = Math.min(SPEEDMAX, speed + SPEEDRAMP * dt);
  dist += speed * dt;

  // vertical physics
  if (!grounded) {
    pvy += GRAV * gdir * dt;
    py += pvy * dt;
    coyote -= dt;
    if (gdir === 1 && py >= FLOOR) { py = FLOOR; pvy = 0; grounded = true; sndLand(); burst(PX, FLOOR, '#4488ff', 5); }
    if (gdir === -1 && py <= CEIL) { py = CEIL; pvy = 0; grounded = true; sndLand(); burst(PX, CEIL, '#4488ff', 5); }
  } else {
    coyote = COYOTE;
  }

  // spawn patterns ahead of view
  while (nextSpawnX < dist + UW + 60) spawnPattern();

  // cull passed
  obstacles = obstacles.filter(o => o.x + o.w > dist - 20);
  orbs = orbs.filter(o => !o.got && o.x > dist - 20);

  // collisions (screen coords: sx = o.x - dist)
  const pr = playerRect();
  for (const o of obstacles) {
    const r = [o.x - dist, o.y, o.w, o.h];
    if (!rectsOverlap(pr, r)) continue;
    if (o.kind === 'spike') {
      // forgiving spike hitbox: inner 60%
      const inner = [r[0] + r[2] * 0.2, o.side === 1 ? r[1] + r[3] * 0.35 : r[1], r[2] * 0.6, r[3] * 0.65];
      if (!rectsOverlap(pr, inner)) continue;
    }
    die(); return;
  }
  for (const o of orbs) {
    if (o.got) continue;
    const dx = (o.x - dist) - PX, dy = o.y - (py - gdir * PSIZE / 2);
    if (dx * dx + dy * dy < (ORB_R + PSIZE / 2) * (ORB_R + PSIZE / 2)) {
      o.got = true; orbsGot++;
      sndOrb();
      burst(o.x - dist, o.y, '#ffc300', 10);
      if (orbsGot % 10 === 0) showBanner(orbsGot + ' ORBS!');
    }
  }

  // trail
  trail.push([PX, py - gdir * PSIZE / 2, gdir]);
  if (trail.length > 16) trail.shift();

  updateHud();
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 15 + Math.random() * 55;
    particles.push({ x, y, vx: Math.cos(a) * sp - 20, vy: Math.sin(a) * sp, life: 0.35 + Math.random() * 0.35, c: color });
  }
}

// ------------------------------------------------------------- input
let lastTap = 0;
function onTap(e) {
  e.preventDefault();
  audio();
  if (state === 'play') { flip(); return; }
  const now = performance.now();
  if (now - lastTap < 400) return;
  lastTap = now;
  if (state === 'title') { $('ov-start').classList.add('hidden'); reset(); }
  else if (state === 'dead' && deathT > 0.7) { $('ov-dead').classList.add('hidden'); reset(); }
}
canvas.addEventListener('touchstart', onTap, { passive: false });
canvas.addEventListener('mousedown', onTap);
$('ov-start').addEventListener('touchend', onTap, { passive: false });
$('ov-start').addEventListener('click', onTap);
$('ov-dead').addEventListener('touchend', onTap, { passive: false });
$('ov-dead').addEventListener('click', onTap);
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); onTap(e); }
});

// ------------------------------------------------------------- render
function render() {
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake * 14, (Math.random() - 0.5) * shake * 14);
  }

  // corridor panel
  ctx.fillStyle = '#0b0b16';
  ctx.fillRect(px(0), py2(0), UW * scale, UH * scale);

  // parallax grid (scrolls with world)
  ctx.strokeStyle = 'rgba(68,136,255,0.06)'; ctx.lineWidth = 1;
  ctx.beginPath();
  const goff = (dist * 0.5) % 10;
  for (let gx = -goff; gx < UW; gx += 10) { if (gx < 0) continue; ctx.moveTo(px(gx), py2(0)); ctx.lineTo(px(gx), py2(UH)); }
  for (let gy = 10; gy < UH; gy += 10) { ctx.moveTo(px(0), py2(gy)); ctx.lineTo(px(UW), py2(gy)); }
  ctx.stroke();
  // fast grid layer
  ctx.strokeStyle = 'rgba(68,136,255,0.10)';
  ctx.beginPath();
  const goff2 = dist % 20;
  for (let gx = -goff2; gx < UW; gx += 20) { if (gx < 0) continue; ctx.moveTo(px(gx), py2(CEIL)); ctx.lineTo(px(gx), py2(FLOOR)); }
  ctx.stroke();

  // floor + ceiling
  ctx.strokeStyle = 'rgba(57,255,20,0.8)'; ctx.lineWidth = 2.5;
  ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(px(0), py2(FLOOR)); ctx.lineTo(px(UW), py2(FLOOR));
  ctx.moveTo(px(0), py2(CEIL)); ctx.lineTo(px(UW), py2(CEIL));
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(57,255,20,0.05)';
  ctx.fillRect(px(0), py2(FLOOR), UW * scale, (UH - FLOOR) * scale);
  ctx.fillRect(px(0), py2(0), UW * scale, CEIL * scale);

  // obstacles
  for (const o of obstacles) {
    const sx = o.x - dist;
    if (sx > UW + 4 || sx + o.w < -4) continue;
    if (o.kind === 'spike') {
      ctx.fillStyle = '#ff2244';
      ctx.shadowColor = '#ff2244'; ctx.shadowBlur = 8;
      ctx.beginPath();
      if (o.side === 1) {
        ctx.moveTo(px(sx), py2(FLOOR));
        ctx.lineTo(px(sx + o.w / 2), py2(o.y));
        ctx.lineTo(px(sx + o.w), py2(FLOOR));
      } else {
        ctx.moveTo(px(sx), py2(CEIL));
        ctx.lineTo(px(sx + o.w / 2), py2(o.y + o.h));
        ctx.lineTo(px(sx + o.w), py2(CEIL));
      }
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = o.kind === 'gate' ? 'rgba(255,34,68,0.28)' : 'rgba(180,79,255,0.25)';
      const edge = o.kind === 'gate' ? '#ff2244' : '#b44fff';
      ctx.shadowColor = edge; ctx.shadowBlur = 9;
      ctx.fillRect(px(sx), py2(o.y), o.w * scale, o.h * scale);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = edge; ctx.lineWidth = 1.5;
      ctx.strokeRect(px(sx), py2(o.y), o.w * scale, o.h * scale);
      // hazard stripes
      ctx.save();
      ctx.beginPath(); ctx.rect(px(sx), py2(o.y), o.w * scale, o.h * scale); ctx.clip();
      ctx.strokeStyle = o.kind === 'gate' ? 'rgba(255,34,68,0.35)' : 'rgba(180,79,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let s = -o.h; s < o.w + o.h; s += 5) {
        ctx.moveTo(px(sx + s), py2(o.y));
        ctx.lineTo(px(sx + s + o.h * 0.6), py2(o.y + o.h));
      }
      ctx.stroke();
      ctx.restore();
    }
  }

  // orbs
  const bob = Math.sin(simTime * 5) * 1.1;
  for (const o of orbs) {
    if (o.got) continue;
    const sx = o.x - dist;
    if (sx > UW + 4 || sx < -4) continue;
    ctx.shadowColor = '#ffc300'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffc300';
    ctx.beginPath(); ctx.arc(px(sx), py2(o.y + bob), ORB_R * scale * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,195,0,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(px(sx), py2(o.y + bob), ORB_R * scale, 0, Math.PI * 2); ctx.stroke();
  }

  // trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    ctx.globalAlpha = (i / trail.length) * 0.35;
    ctx.fillStyle = '#39ff14';
    const s = PSIZE * scale * (0.3 + 0.5 * i / trail.length);
    ctx.fillRect(px(t[0]) - s / 2 - (trail.length - i) * scale * 1.1, py2(t[1]) - s / 2, s, s);
  }
  ctx.globalAlpha = 1;

  // player
  if (state !== 'dead') {
    const cy = py - gdir * PSIZE / 2;
    ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#39ff14';
    const s = PSIZE * scale;
    ctx.fillRect(px(PX) - s / 2, py2(cy) - s / 2, s, s);
    ctx.shadowBlur = 0;
    // face: two eyes offset toward travel, flipped with gravity
    ctx.fillStyle = '#06060e';
    const eyeY = py2(cy) - gdir * s * 0.12;
    ctx.fillRect(px(PX) + s * 0.02, eyeY - s * 0.09, s * 0.14, s * 0.18);
    ctx.fillRect(px(PX) + s * 0.24, eyeY - s * 0.09, s * 0.14, s * 0.18);
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.2);
    ctx.fillStyle = p.c;
    ctx.fillRect(px(p.x) - 1.5, py2(p.y) - 1.5, 3, 3);
  }
  ctx.globalAlpha = 1;

  // border
  ctx.strokeStyle = 'rgba(57,255,20,0.5)'; ctx.lineWidth = 2;
  ctx.strokeRect(px(0), py2(0), UW * scale, UH * scale);

  ctx.restore();
}

// ------------------------------------------------------------- main loop
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.1) dt = 0.1;
  simTime += dt;
  if (state === 'play') step(dt);
  if (state === 'dead') deathT += dt;
  shake = Math.max(0, shake - dt);
  for (const p of particles) { p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; }
  particles = particles.filter(p => p.life > 0);
  render();
}
window.addEventListener('resize', resize);
resize();
updateHud();
requestAnimationFrame(frame);
</script>
</body>
