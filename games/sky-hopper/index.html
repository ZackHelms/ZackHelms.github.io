<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sky Hopper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06060e; --panel:#0b0b16; --border:#1a1a30;
  --green:#39ff14; --gold:#ffc300; --blue:#4488ff; --red:#ff2244;
  --white:#dde3ff; --dim:#8899bb; --purple:#b44fff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; background:var(--bg); overflow:hidden;
  font-family:'Share Tech Mono', monospace; color:var(--white);
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  overscroll-behavior:none;
}
#app { display:flex; flex-direction:column; height:100dvh; }
#hud {
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) 14px 6px;
  gap:6px; font-size:0.72rem;
}
.hud-label { font-size:0.52rem; letter-spacing:2px; color:var(--dim); }
.hud-val { font-size:0.95rem; line-height:1.15; }
#h-height .hud-val { color:var(--green); }
#h-score .hud-val { color:var(--gold); }
#h-best .hud-val { color:var(--purple); }
#h-best { text-align:right; }
#game { flex:1; display:block; width:100%; touch-action:none; }
.overlay {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(6,6,14,0.88); text-align:center; padding:24px;
  touch-action:none;
}
.overlay.hidden { display:none; }
.ov-title {
  font-family:'Black Ops One', sans-serif; font-size:2.0rem; letter-spacing:4px;
  color:var(--green); text-shadow:0 0 24px rgba(57,255,20,0.7); margin-bottom:14px;
}
.ov-sub { font-size:0.75rem; color:var(--dim); letter-spacing:1px; line-height:2; margin-bottom:26px; }
.ov-score {
  font-family:'Black Ops One', sans-serif; font-size:1.5rem; letter-spacing:3px;
  color:var(--gold); text-shadow:0 0 18px rgba(255,195,0,0.6); margin-bottom:8px;
}
.ov-tap {
  font-size:0.85rem; color:var(--white); letter-spacing:3px;
  border:1px solid var(--border); background:var(--panel);
  padding:12px 26px; border-radius:8px;
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
#banner {
  position:fixed; left:0; right:0; top:26%; z-index:40; text-align:center;
  pointer-events:none; opacity:0; transition:opacity 0.25s;
}
#banner.show { opacity:1; }
#banner .b-big {
  font-family:'Black Ops One', sans-serif; font-size:1.4rem; letter-spacing:4px;
  color:var(--gold); text-shadow:0 0 22px rgba(255,195,0,0.8);
}
</style>
</head>
<body>
<div id="build-badge" style="position:fixed;top:2px;right:6px;z-index:2147483647;font-family:'Courier New',monospace;font-size:9px;color:#888;opacity:0.55;pointer-events:none;letter-spacing:0.5px;user-select:none;">build 2026-07-24 07:01 UTC</div>
<div id="app">
  <div id="hud">
    <div id="h-height"><div class="hud-label">HEIGHT</div><div class="hud-val" id="v-h">0m</div></div>
    <div id="h-score"><div class="hud-label">SCORE</div><div class="hud-val" id="v-score">0</div></div>
    <div id="h-best"><div class="hud-label">BEST</div><div class="hud-val" id="v-best">0</div></div>
  </div>
  <canvas id="game"></canvas>
</div>

<div id="banner"><div class="b-big" id="b-big"></div></div>

<div class="overlay" id="ov-start">
  <div class="ov-title">SKY HOPPER</div>
  <div class="ov-sub">
    HOLD + DRAG TO STEER<br>
    BOUNCE AUTOMATIC &bull; SPRINGS LAUNCH YOU<br>
    AMBER PLATFORMS CRUMBLE<br>
    DON'T FALL
  </div>
  <div class="ov-tap">TAP TO HOP</div>
</div>

<div class="overlay hidden" id="ov-dead">
  <div class="ov-title" style="color:var(--red); text-shadow:0 0 24px rgba(255,34,68,0.7);" id="d-title">FELL</div>
  <div class="ov-score" id="d-score">0</div>
  <div class="ov-sub" id="d-sub"></div>
  <div class="ov-tap">TAP TO HOP AGAIN</div>
</div>

<script>
'use strict';
// ------------------------------------------------------------- constants
// unit space: fixed 100 units wide; height (VH) derives from canvas aspect.
// world y grows UPWARD (y == meters climbed); screen mapping flips it.
const UW = 100;
const GRAV = 260;                       // units/s^2 downward
const BOUNCE_VY = 158;                  // upward velocity on a normal bounce
const MAX_REACH = BOUNCE_VY * BOUNCE_VY / (2 * GRAV);  // ~48u max bounce height
const SPRING_MULT = 2.2;                // spring bounce = 2.2x -> ~232u reach
const FALL_MAX = 240;                   // terminal fall speed
const HMAX = 160;                       // max horizontal chase speed u/s
const STEER_GAIN = 1.6;                 // finger px -> unit gain (relative steering)
const SQUASH_TIME = 0.16;               // s of landing squash
const BODY_R = 3.1, BODY_H = 3.4;       // hopper half-width / half-height
const PLAT_H = 3.2;                     // platform thickness
const GAP_MIN_F = 0.55, GAP_MAX_F = 0.90, GAP_RAMP_ALT = 2000;
const BREAK_DELAY = 0.32;               // crumble: cracks -> gone
const SPRING_CHANCE = 0.12;
const ORB_CHANCE = 0.30, ORB_PTS = 50, COMET_PTS = 250;
const MILESTONE = 500;                  // banner + hue shift every 500m
const COMET_MIN_ALT = 400;
const CAM_ANCHOR_F = 0.52;              // player rides at ~52% up the screen

// ------------------------------------------------------------- state
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let dpr = 1, cw = 0, ch = 0, scale = 1;
let VH = 200;                           // unit-space height (from aspect)

let state = 'title';                    // title | play | dead (tests use 'paused')
let simTime = 0, playT = 0, deathT = 0;
let player = newPlayer();
let platforms = [];                     // {x,y,w,type,baseX,amp,speed,phase,spring,springT,breakT,dead,bonus}
let orbs = [];                          // {x,y,ph}
let particles = [], ghosts = [], texts = [];
let comet = null, cometTimer = 9;
let camBot = -30, maxY = 0, nextMile = MILESTONE;
let bonus = 0, orbsGot = 0;
let genY = 0, lastRungCrumble = false;
let drag = null;                        // {fx,fy,cx,cy,px} finger anchor + player x anchor
let steerX = null;                      // absolute steer target (from drag or autopilot)
let keys = {};
let shake = 0, bgHue = 240, ghostAcc = 0;
let best = 0;
try { best = +(localStorage.getItem('skyHopper.best') || 0); } catch (e) {}

const $ = id => document.getElementById(id);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const mod = (v, m) => ((v % m) + m) % m;
const wrapDx = d => mod(d + UW / 2, UW) - UW / 2;   // shortest wrapped delta

function newPlayer() {
  return { x: 50, y: BODY_H, vy: BOUNCE_VY, sx: 1, sy: 1, squashT: 0, vxSm: 0, face: 1, blinkT: 2.5 };
}

// ------------------------------------------------------------- audio
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq, dur, type, gain, slideTo) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(gain || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sndBounce   = () => beep(300, 0.07, 'triangle', 0.09, 470);
const sndSpring   = () => beep(240, 0.28, 'sawtooth', 0.11, 960);
const sndOrb      = () => { beep(760, 0.07, 'sine', 0.11); setTimeout(() => beep(1140, 0.1, 'sine', 0.1), 55); };
const sndComet    = () => beep(1400, 0.4, 'sine', 0.05, 700);
const sndCometGet = () => { beep(880, 0.08, 'sine', 0.12); setTimeout(() => beep(1320, 0.09, 'sine', 0.11), 60); setTimeout(() => beep(1760, 0.14, 'sine', 0.1), 120); };
const sndCrack    = () => beep(150, 0.1, 'square', 0.07, 90);
const sndMile     = () => { beep(520, 0.09, 'sine', 0.1); setTimeout(() => beep(780, 0.14, 'sine', 0.1), 80); };
const sndDeath    = () => { beep(320, 0.5, 'sawtooth', 0.15, 60); setTimeout(() => beep(180, 0.5, 'square', 0.09, 40), 100); };

// ------------------------------------------------------------- layout
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  cw = canvas.clientWidth; ch = canvas.clientHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = cw / UW;
  VH = ch / scale;
}
const sx = x => x * scale;
const sy = y => (camBot + VH - y) * scale;

// ------------------------------------------------------------- stars
const STAR_LAYERS = [
  { n: 46, extra: 24, f: 0.12, r: 0.9, a: 0.5,  c: '#dde3ff' },
  { n: 30, extra: 20, f: 0.35, r: 1.4, a: 0.7,  c: '#dde3ff' },
  { n: 16, extra: 14, f: 0.70, r: 2.1, a: 0.95, c: '#aabbff' },
];
let stars = [];
function initStars() {
  stars = STAR_LAYERS.map(L => {
    const arr = [];
    for (let i = 0; i < L.n + L.extra; i++)
      arr.push({ x: Math.random() * UW, y: Math.random() * 400, tw: 2 + Math.random() * 4, ph: Math.random() * Math.PI * 2 });
    return arr;
  });
}

// ------------------------------------------------------------- generator
// Reachability guarantee: rung gaps never exceed 0.90 * MAX_REACH, every
// platform fits fully on screen (wrap covers horizontal distance <= 50u,
// clearable at HMAX within the bounce window), and a crumble rung is never
// followed by another crumble rung — so the guaranteed ladder never asks
// for two one-shot platforms in a row.
function gapAt(alt) {
  const t = clamp(alt / GAP_RAMP_ALT, 0, 1);
  const f = GAP_MIN_F + (GAP_MAX_F - GAP_MIN_F) * t;
  return MAX_REACH * f * (0.92 + Math.random() * 0.08);
}
function pickType(alt) {
  const t = clamp(alt / GAP_RAMP_ALT, 0, 1);
  let wS = 0.78 - 0.48 * t, wM = 0.10 + 0.28 * t, wC = 0.12 + 0.20 * t;
  if (lastRungCrumble || alt < 80) { wS += wC * 0.6; wM += wC * 0.4; wC = 0; }
  const r = Math.random() * (wS + wM + wC);
  return r < wS ? 'static' : r < wS + wM ? 'move' : 'crumble';
}
function makePlatform(y, type, alt, isBonus) {
  const t = clamp(alt / GAP_RAMP_ALT, 0, 1);
  const w = 18 - 4 * t;
  const p = { x: 0, y, w, type, baseX: 0, amp: 0, speed: 0, phase: Math.random() * Math.PI * 2,
              spring: false, springT: 0, breakT: -1, dead: false, bonus: !!isBonus };
  if (type === 'move') {
    p.amp = Math.min(8 + 16 * t + Math.random() * 6, (UW - w) / 2 - 3);
    p.speed = 0.8 + 1.5 * t + Math.random() * 0.5;
    const lo = p.amp + w / 2 + 2;
    p.baseX = lo + Math.random() * (UW - 2 * lo);
    p.x = p.baseX + Math.sin(p.phase) * p.amp;
  } else {
    p.x = w / 2 + 2 + Math.random() * (UW - w - 4);
    if (type === 'static' && Math.random() < SPRING_CHANCE) p.spring = true;
  }
  return p;
}
function spawnRung() {
  const alt = genY;
  const type = pickType(alt);
  const g = gapAt(alt);
  platforms.push(makePlatform(alt, type, alt, false));
  lastRungCrumble = type === 'crumble';
  // bonus platform between rungs at low altitude (extra option, never load-bearing)
  if (alt < 900 && Math.random() < 0.35 - alt * 0.0003) {
    const bt = Math.random() < 0.75 ? 'static' : 'move';
    platforms.push(makePlatform(alt + g * 0.5, bt, alt, true));
  }
  if (Math.random() < ORB_CHANCE)
    orbs.push({ x: 6 + Math.random() * (UW - 12), y: alt + g * (0.4 + Math.random() * 0.3), ph: Math.random() * Math.PI * 2 });
  genY += g;
}
function ensurePlatforms() {
  while (genY < camBot + VH + 60) spawnRung();
}

// ------------------------------------------------------------- flow
function reset() {
  playT = 0; deathT = 0;
  player = newPlayer();
  platforms = [{ x: UW / 2, y: 0, w: UW, type: 'static', baseX: UW / 2, amp: 0, speed: 0,
                 phase: 0, spring: false, springT: 0, breakT: -1, dead: false, bonus: false }];
  orbs = []; particles = []; ghosts = []; texts = [];
  comet = null; cometTimer = 9;
  camBot = -VH * 0.16; maxY = 0; nextMile = MILESTONE;
  bonus = 0; orbsGot = 0;
  genY = 20; lastRungCrumble = false;
  drag = null; steerX = null;
  shake = 0; bgHue = 240; ghostAcc = 0;
  ensurePlatforms();
  state = 'play';
  updateHud();
}
function score() { return Math.floor(maxY) + bonus; }
function updateHud() {
  $('v-h').textContent = Math.floor(Math.max(0, player.y)) + 'm';
  $('v-score').textContent = score();
  $('v-best').textContent = best;
}
function showBanner(t, ms) {
  $('b-big').textContent = t;
  $('banner').classList.add('show');
  clearTimeout(showBanner.t);
  showBanner.t = setTimeout(() => $('banner').classList.remove('show'), ms || 900);
}
function addText(x, y, str, c) {
  texts.push({ x, y, str, c, life: 0.9 });
}
function die() {
  state = 'dead'; deathT = 0; shake = 0.55;
  sndDeath();
  burst(player.x, Math.max(player.y, camBot + 4), '#39ff14', 22, false);
  burst(player.x, Math.max(player.y, camBot + 4), '#ff2244', 14, false);
  const s = score();
  const isBest = s > best;
  if (isBest) { best = s; try { localStorage.setItem('skyHopper.best', best); } catch (e) {} }
  const fellAt = Math.floor(maxY);
  setTimeout(() => {
    $('d-title').textContent = 'FELL AT ' + fellAt + 'm';
    $('d-score').textContent = s + (isBest ? '  ★ NEW BEST' : '');
    $('d-sub').innerHTML = 'ORBS ' + orbsGot + ' &bull; HEIGHT ' + fellAt + 'm<br>BEST ' + best;
    $('ov-dead').classList.remove('hidden');
    updateHud();
  }, 700);
}

// ------------------------------------------------------------- physics
function bounceOn(p) {
  player.y = p.y + BODY_H;
  const overSpring = p.spring && Math.abs(wrapDx(player.x - p.x)) < 4.2;
  if (overSpring) {
    player.vy = BOUNCE_VY * SPRING_MULT;
    p.springT = 0.35;
    shake = Math.max(shake, 0.18);
    sndSpring();
    burst(p.x, p.y + 1, '#ffc300', 14, false);
  } else {
    player.vy = BOUNCE_VY;
    sndBounce();
    burst(player.x, p.y + 0.5, '#8899bb', 5, false);
  }
  player.squashT = SQUASH_TIME;
  if (p.type === 'crumble' && p.breakT < 0) { p.breakT = 0; sndCrack(); }
}
function debris(p) {
  for (let i = 0; i < 12; i++) {
    particles.push({ x: p.x - p.w / 2 + Math.random() * p.w, y: p.y - Math.random() * PLAT_H,
      vx: (Math.random() - 0.5) * 26, vy: -10 - Math.random() * 30,
      life: 0.6 + Math.random() * 0.4, c: i % 3 ? '#ff9922' : '#ff2244', g: true, s: 2 + Math.random() * 2.5 });
  }
}
function burst(x, y, color, n, grav) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 12 + Math.random() * 46;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.35 + Math.random() * 0.35, c: color, g: !!grav, s: 3 });
  }
}
function step(dt) {
  playT += dt;

  // steering: drag anchor -> absolute target; autopilot may set steerX directly
  if (drag) steerX = drag.px + (drag.cx - drag.fx) / scale * STEER_GAIN;
  if (keys.ArrowLeft || keys.KeyA)  { player.x -= HMAX * 0.75 * dt; steerX = null; }
  if (keys.ArrowRight || keys.KeyD) { player.x += HMAX * 0.75 * dt; steerX = null; }
  let vx = 0;
  if (steerX != null) {
    const dx = wrapDx(steerX - player.x);
    const stp = clamp(dx * 12, -HMAX, HMAX) * dt;
    player.x += stp; vx = stp / dt;
  }
  player.vxSm += (vx - player.vxSm) * Math.min(1, dt * 10);
  if (Math.abs(player.vxSm) > 2) player.face = player.vxSm > 0 ? 1 : -1;
  if (player.x < 0 || player.x >= UW) player.x = mod(player.x, UW);   // screen wrap

  // platform animation / crumble timers
  for (const p of platforms) {
    if (p.type === 'move') p.x = p.baseX + Math.sin(playT * p.speed + p.phase) * p.amp;
    if (p.springT > 0) p.springT -= dt;
    if (p.breakT >= 0) {
      p.breakT += dt;
      if (p.breakT > BREAK_DELAY && !p.dead) { p.dead = true; debris(p); }
    }
  }

  // vertical physics + one-way landing (feet sweep across platform tops)
  const prevFeet = player.y - BODY_H;
  player.vy -= GRAV * dt;
  if (player.vy < -FALL_MAX) player.vy = -FALL_MAX;
  player.y += player.vy * dt;
  const feet = player.y - BODY_H;
  if (player.vy < 0) {
    let landP = null;
    for (const p of platforms) {
      if (p.dead) continue;
      if (prevFeet >= p.y && feet <= p.y) {
        if (Math.abs(wrapDx(player.x - p.x)) < p.w / 2 + BODY_R * 0.7) {
          if (!landP || p.y > landP.y) landP = p;
        }
      }
    }
    if (landP) bounceOn(landP);
  }

  // squash / stretch
  player.squashT = Math.max(0, player.squashT - dt);
  const k = player.squashT / SQUASH_TIME;
  if (k > 0) { player.sx = 1 + 0.45 * k; player.sy = 1 - 0.42 * k; }
  else {
    const st = clamp(Math.abs(player.vy) / 700, 0, 0.4);
    player.sy = 1 + st; player.sx = 1 - st * 0.45;
  }
  player.blinkT -= dt;
  if (player.blinkT < -0.12) player.blinkT = 2.2 + Math.random() * 2.8;

  // spring-launch afterimage trail
  if (player.vy > BOUNCE_VY * 1.25) {
    ghostAcc += dt;
    if (ghostAcc > 0.024) { ghostAcc = 0; ghosts.push({ x: player.x, y: player.y, life: 0.3 }); }
  }

  // orbs
  orbs = orbs.filter(o => {
    if (o.y < camBot - 8) return false;
    const dxo = wrapDx(player.x - o.x), dyo = player.y - o.y;
    if (dxo * dxo + dyo * dyo < 20) {
      bonus += ORB_PTS; orbsGot++;
      sndOrb();
      burst(o.x, o.y, '#ffc300', 10, false);
      addText(o.x, o.y, '+50', '#ffc300');
      return false;
    }
    return true;
  });

  // comet
  if (maxY > COMET_MIN_ALT && !comet) {
    cometTimer -= dt;
    if (cometTimer <= 0) {
      const dir = Math.random() < 0.5 ? 1 : -1;
      comet = { x: dir > 0 ? -20 : UW + 20, y: camBot + VH * (0.66 + Math.random() * 0.26),
                vx: dir * (55 + Math.random() * 30), vy: -(3 + Math.random() * 5), trail: [] };
      sndComet();
    }
  }
  if (comet) {
    comet.x += comet.vx * dt; comet.y += comet.vy * dt;
    comet.trail.unshift({ x: comet.x, y: comet.y });
    if (comet.trail.length > 26) comet.trail.length = 26;
    const dxc = comet.x - player.x, dyc = comet.y - player.y;
    if (dxc * dxc + dyc * dyc < 30) {
      bonus += COMET_PTS;
      addText(comet.x, comet.y, '+250', '#b44fff');
      showBanner('+250 COMET!', 900);
      burst(comet.x, comet.y, '#b44fff', 22, false);
      sndCometGet();
      comet = null; cometTimer = 14 + Math.random() * 10;
    } else if (comet.x < -30 || comet.x > UW + 30 || comet.y < camBot - 10) {
      comet = null; cometTimer = 10 + Math.random() * 8;
    }
  }

  // camera: chases record height upward only, never scrolls down
  const camTarget = player.y - VH * CAM_ANCHOR_F;
  if (camTarget > camBot) camBot += (camTarget - camBot) * Math.min(1, dt * 10);
  if (player.y > maxY) maxY = player.y;
  while (maxY >= nextMile) { showBanner(nextMile + 'm  ▲', 1100); sndMile(); nextMile += MILESTONE; }

  // world upkeep
  platforms = platforms.filter(p => !p.dead && p.y > camBot - 30);
  ensurePlatforms();

  // fell below the camera's bottom edge
  if (player.y + BODY_H < camBot - 4) { die(); return; }

  updateHud();
}

// ------------------------------------------------------------- input
let lastTap = 0;
function pointerPos(e) {
  const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  return [t.clientX, t.clientY];
}
function onDown(e) {
  e.preventDefault(); audio();
  if (state !== 'play') return;
  const [x, y] = pointerPos(e);
  drag = { fx: x, fy: y, cx: x, cy: y, px: player.x };
}
function onMove(e) {
  e.preventDefault();
  if (!drag) return;
  const [x, y] = pointerPos(e);
  drag.cx = x; drag.cy = y;
}
function onUp(e) {
  e.preventDefault();
  drag = null; steerX = null;
}
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp, { passive: false });
canvas.addEventListener('touchcancel', onUp, { passive: false });
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', e => { if (drag) onMove(e); });
window.addEventListener('mouseup', e => { if (drag) onUp(e); });
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function uiTap(e) {
  e.preventDefault();
  const now = performance.now();
  if (now - lastTap < 400) return;      // iOS fires touchend AND click per tap
  lastTap = now;
  audio();
  if (state === 'title') { $('ov-start').classList.add('hidden'); reset(); }
  else if (state === 'dead' && deathT > 0.7) { $('ov-dead').classList.add('hidden'); reset(); }
}
$('ov-start').addEventListener('touchend', uiTap, { passive: false });
$('ov-start').addEventListener('click', uiTap);
$('ov-dead').addEventListener('touchend', uiTap, { passive: false });
$('ov-dead').addEventListener('click', uiTap);

// ------------------------------------------------------------- render
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawPlat(p) {
  const w = p.w * scale, h = PLAT_H * scale;
  let X = sx(p.x - p.w / 2), Y = sy(p.y);
  if (p.breakT >= 0) X += (Math.random() - 0.5) * 3;
  let fill, edge;
  if (p.type === 'static')      { fill = 'rgba(57,255,20,0.13)';  edge = '#39ff14'; }
  else if (p.type === 'move')   { fill = 'rgba(68,136,255,0.16)'; edge = '#4488ff'; }
  else                          { fill = 'rgba(255,153,34,0.15)'; edge = '#ff9922'; }
  if (p.breakT >= 0) { edge = '#ff2244'; ctx.globalAlpha = 1 - (p.breakT / BREAK_DELAY) * 0.4; }
  ctx.shadowColor = edge; ctx.shadowBlur = 9;
  ctx.fillStyle = fill;
  rr(X, Y, w, h, 3); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = edge; ctx.lineWidth = 1.5;
  rr(X, Y, w, h, 3); ctx.stroke();
  if (p.type === 'crumble') {
    // pre-cracks (always) + deeper cracks while breaking
    ctx.strokeStyle = p.breakT >= 0 ? 'rgba(255,34,68,0.9)' : 'rgba(6,6,14,0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    const c1 = X + w * 0.35, c2 = X + w * 0.68;
    ctx.moveTo(c1, Y); ctx.lineTo(c1 - 3, Y + h * 0.5); ctx.lineTo(c1 + 2, Y + h);
    ctx.moveTo(c2, Y); ctx.lineTo(c2 + 3, Y + h * 0.6); ctx.lineTo(c2 - 2, Y + h);
    if (p.breakT >= 0) { ctx.moveTo(X + w * 0.16, Y); ctx.lineTo(X + w * 0.2, Y + h); ctx.moveTo(X + w * 0.86, Y); ctx.lineTo(X + w * 0.82, Y + h); }
    ctx.stroke();
  }
  if (p.spring) {
    const cxp = sx(p.x);
    const ext = 1 + (p.springT > 0 ? (p.springT / 0.35) * 1.2 : 0);
    const shg = 2.0 * scale * ext, sw = 4.6 * scale;
    const padY = Y - shg;
    // coil
    ctx.strokeStyle = 'rgba(255,195,0,0.75)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cxp - sw * 0.28, Y);
    ctx.lineTo(cxp + sw * 0.28, Y - shg * 0.33);
    ctx.lineTo(cxp - sw * 0.28, Y - shg * 0.66);
    ctx.lineTo(cxp + sw * 0.28, Y - shg);
    ctx.stroke();
    // pad
    ctx.shadowColor = '#ffc300'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffc300';
    rr(cxp - sw / 2, padY - 1.1 * scale, sw, 1.1 * scale, 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}
function drawHopper(wxx, alpha) {
  const R = BODY_R * scale, H = BODY_H * scale;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(sx(wxx), sy(player.y));
  ctx.rotate(clamp(player.vxSm * 0.0016, -0.26, 0.26));
  ctx.scale(player.sx, player.sy);
  // ears (flop with vertical velocity)
  const flop = clamp(player.vy * 0.0011, -0.34, 0.5);
  for (const s of [-1, 1]) {
    ctx.save();
    ctx.translate(s * R * 0.5, -H * 0.72);
    ctx.rotate(s * (0.22 + flop));
    ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#2bd410';
    ctx.beginPath(); ctx.ellipse(0, -H * 0.42, R * 0.26, H * 0.52, 0, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(6,6,14,0.35)';
    ctx.beginPath(); ctx.ellipse(0, -H * 0.4, R * 0.11, H * 0.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  // body
  ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#39ff14';
  ctx.beginPath(); ctx.ellipse(0, 0, R, H, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // sheen
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.beginPath(); ctx.ellipse(-R * 0.3, -H * 0.34, R * 0.34, H * 0.2, -0.5, 0, Math.PI * 2); ctx.fill();
  // feet
  ctx.fillStyle = '#17a30a';
  for (const s of [-1, 1]) {
    ctx.beginPath(); ctx.ellipse(s * R * 0.42, H * 0.86, R * 0.28, H * 0.16, 0, 0, Math.PI * 2); ctx.fill();
  }
  // face
  const fx = player.face * R * 0.14;
  const pupDy = clamp(-player.vy * 0.0009, -0.14, 0.14) * H;
  const blink = player.blinkT < 0;
  for (const s of [-1, 1]) {
    const ex = s * R * 0.36 + fx * 0.5, ey = -H * 0.14;
    if (blink) {
      ctx.strokeStyle = '#06060e'; ctx.lineWidth = Math.max(1, scale * 0.35);
      ctx.beginPath(); ctx.moveTo(ex - R * 0.2, ey); ctx.lineTo(ex + R * 0.2, ey); ctx.stroke();
    } else {
      ctx.fillStyle = '#eaffea';
      ctx.beginPath(); ctx.ellipse(ex, ey, R * 0.27, R * 0.3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#06060e';
      ctx.beginPath(); ctx.arc(ex + fx * 0.6, ey + pupDy, R * 0.13, 0, Math.PI * 2); ctx.fill();
    }
  }
  // mouth: grin while rising, 'o' when plummeting
  ctx.strokeStyle = '#06060e'; ctx.fillStyle = '#06060e';
  ctx.lineWidth = Math.max(1, scale * 0.3);
  if (player.vy < -170) {
    ctx.beginPath(); ctx.arc(fx * 0.6, H * 0.34, R * 0.16, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(fx * 0.6, H * 0.18, R * 0.3, Math.PI * 0.18, Math.PI * 0.82); ctx.stroke();
  }
  ctx.restore();
}
function render() {
  const band = Math.floor(maxY / MILESTONE);
  // sky gradient, hue drifts with altitude band
  const g = ctx.createLinearGradient(0, 0, 0, ch);
  g.addColorStop(0, 'hsl(' + Math.round(bgHue) + ',45%,8%)');
  g.addColorStop(1, 'hsl(' + Math.round(bgHue + 16) + ',50%,4%)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 14, (Math.random() - 0.5) * shake * 14);

  // parallax star layers (denser + faster as bands climb)
  for (let li = 0; li < STAR_LAYERS.length; li++) {
    const L = STAR_LAYERS[li];
    const layer = stars[li];
    const visible = Math.min(layer.length, L.n + band * 4);
    const drift = (0.5 + band * 0.8) * 6 * L.f;
    ctx.fillStyle = L.c;
    for (let i = 0; i < visible; i++) {
      const st = layer[i];
      const yU = mod(st.y + camBot * L.f + simTime * drift, VH);
      ctx.globalAlpha = L.a * (0.55 + 0.45 * Math.sin(simTime * st.tw + st.ph));
      ctx.fillRect(sx(st.x) - L.r / 2, yU * scale - L.r / 2, L.r, L.r);
    }
  }
  ctx.globalAlpha = 1;

  // altitude marker lines every 250m
  ctx.setLineDash([5, 9]);
  ctx.strokeStyle = 'rgba(136,153,187,0.12)';
  ctx.lineWidth = 1;
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.textAlign = 'right';
  for (let my = Math.ceil(camBot / 250) * 250; my <= camBot + VH; my += 250) {
    if (my <= 0) continue;
    const yy = sy(my);
    ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(cw, yy); ctx.stroke();
    ctx.fillStyle = 'rgba(136,153,187,0.35)';
    ctx.fillText(my + 'm', cw - 6, yy - 4);
  }
  ctx.setLineDash([]);

  // platforms
  for (const p of platforms) {
    if (p.y < camBot - 6 || p.y > camBot + VH + 8) continue;
    drawPlat(p);
  }

  // orbs
  for (const o of orbs) {
    if (o.y < camBot - 5 || o.y > camBot + VH + 5) continue;
    const bob = Math.sin(simTime * 3 + o.ph) * 0.8;
    const X = sx(o.x), Y = sy(o.y + bob);
    ctx.shadowColor = '#ffc300'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#ffc300';
    ctx.beginPath(); ctx.arc(X, Y, 1.5 * scale, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,195,0,0.55)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let k2 = 0; k2 < 4; k2++) {
      const aa = simTime * 2 + o.ph + k2 * Math.PI / 2;
      ctx.moveTo(X + Math.cos(aa) * 1.9 * scale, Y + Math.sin(aa) * 1.9 * scale);
      ctx.lineTo(X + Math.cos(aa) * 2.7 * scale, Y + Math.sin(aa) * 2.7 * scale);
    }
    ctx.stroke();
  }

  // comet
  if (comet) {
    const tr = comet.trail;
    for (let i = 0; i < tr.length - 1; i++) {
      ctx.globalAlpha = (1 - i / tr.length) * 0.5;
      ctx.strokeStyle = '#b44fff';
      ctx.lineWidth = Math.max(1, (1 - i / tr.length) * 5);
      ctx.beginPath(); ctx.moveTo(sx(tr[i].x), sy(tr[i].y)); ctx.lineTo(sx(tr[i + 1].x), sy(tr[i + 1].y)); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.shadowColor = '#b44fff'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#b44fff';
    ctx.beginPath(); ctx.arc(sx(comet.x), sy(comet.y), 2 * scale, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(sx(comet.x), sy(comet.y), 0.9 * scale, 0, Math.PI * 2); ctx.fill();
  }

  // spring-launch ghosts
  for (const gh of ghosts) {
    ctx.globalAlpha = gh.life * 0.9;
    ctx.fillStyle = 'rgba(57,255,20,0.4)';
    ctx.beginPath(); ctx.ellipse(sx(gh.x), sy(gh.y), BODY_R * scale * 0.8, BODY_H * scale * 1.1, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // player + wrap ghost on the opposite edge
  if (state !== 'dead') {
    drawHopper(player.x, 1);
    if (player.x < 10) drawHopper(player.x + UW, 1);
    else if (player.x > UW - 10) drawHopper(player.x - UW, 1);
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.2);
    ctx.fillStyle = p.c;
    ctx.fillRect(sx(p.x) - p.s / 2, sy(p.y) - p.s / 2, p.s, p.s);
  }
  ctx.globalAlpha = 1;

  // floating score texts
  ctx.font = '700 13px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  for (const t of texts) {
    ctx.globalAlpha = clamp(t.life * 1.6, 0, 1);
    ctx.fillStyle = t.c;
    ctx.fillText(t.str, sx(t.x), sy(t.y));
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ------------------------------------------------------------- main loop
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.1) dt = 0.1;
  simTime += dt;
  if (state === 'play') step(dt);
  if (state === 'dead') deathT += dt;
  shake = Math.max(0, shake - dt);
  const hueT = 240 + Math.floor(maxY / MILESTONE) * 26;
  bgHue += (hueT - bgHue) * Math.min(1, dt * 1.5);
  for (const p of particles) { p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; if (p.g) p.vy -= 380 * dt; }
  particles = particles.filter(p => p.life > 0);
  for (const gh of ghosts) gh.life -= dt;
  ghosts = ghosts.filter(g2 => g2.life > 0);
  for (const t of texts) { t.life -= dt; t.y += 14 * dt; }
  texts = texts.filter(t => t.life > 0);
  render();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 60));
resize();
initStars();
reset();
state = 'title';
updateHud();
requestAnimationFrame(frame);
</script>
</body>
