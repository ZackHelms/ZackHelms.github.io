<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SORCERY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap');
:root {
  --bg: #06060e; --panel: #0b0b16; --border: #1a1a30;
  --green: #39ff14; --gold: #ffc300; --blue: #4488ff;
  --red: #ff2244; --white: #dde3ff; --dim: #8899bb; --purple: #b44fff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  background:var(--bg); font-family:'Share Tech Mono',monospace;
  color:var(--white); display:flex; flex-direction:column;
  align-items:center; height:100dvh; overflow:hidden;
  user-select:none; touch-action:manipulation;
}

/* ── HUD (portrait: top bar) ── */
#hud {
  width:100%; max-width:600px; flex-shrink:0;
  display:flex; flex-direction:row; align-items:center; gap:8px;
  padding:6px 10px; background:var(--panel);
  border-bottom:1px solid var(--border);
}
.hud-col { display:flex; flex-direction:column; gap:3px; flex:1; min-width:0; }
.hud-col.center { flex:0 0 auto; align-items:center; padding:0 6px; }
.hud-col.right { align-items:flex-end; }
.hud-label {
  font-size:0.55rem; color:var(--dim); letter-spacing:2px;
  font-family:'Share Tech Mono',monospace;
}
.bar-outer {
  width:100%; height:8px; background:#111120;
  border:1px solid var(--border); border-radius:2px; overflow:hidden;
}
.bar-inner { height:100%; border-radius:2px; transition:width 0.12s; }
.hp-bar { background:linear-gradient(90deg,#880000,#ff2244); }
.xp-bar { background:linear-gradient(90deg,#2244cc,#b44fff); }
.hud-val { font-size:0.58rem; color:var(--dim); }
#pause-btn {
  flex-shrink:0; width:36px; height:36px;
  background:var(--bg); border:1px solid var(--border); border-radius:4px;
  color:var(--white); font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#pause-btn:active { border-color:var(--blue); }

/* ── CANVAS WRAP (portrait: fills remaining space) ── */
#canvas-wrap {
  width:100%; max-width:600px; flex:1; min-height:0; min-width:0;
  position:relative; overflow:hidden;
}
/* absolute fill so the canvas always covers its container exactly,
   regardless of intrinsic canvas pixel dimensions */
canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%; cursor:crosshair;
}

/* ── SPELL BAR (portrait: bottom) ── */
#spell-bar {
  width:100%; max-width:600px; flex-shrink:0;
  display:flex; flex-direction:row; gap:6px;
  padding:6px 10px; background:var(--panel);
  border-top:1px solid var(--border);
}
.spell-slot {
  flex:1; border:1px solid var(--border); border-radius:4px;
  padding:6px 10px; background:var(--bg); cursor:pointer;
  display:flex; flex-direction:column; gap:2px;
  transition:border-color 0.15s; min-height:50px;
}
.spell-slot:active { border-color:var(--blue) !important; }
#slot-ray { border-color:#2244aa; }
.slot-lbl {
  color:var(--dim); font-size:0.55rem; letter-spacing:2px;
}
.slot-name {
  font-family:'Black Ops One',sans-serif; font-size:0.72rem;
  color:var(--blue); letter-spacing:1px;
}
.slot-hint {
  color:var(--dim); font-size:0.52rem;
  display:flex; justify-content:space-between; align-items:center;
}

/* ── LANDSCAPE LAYOUT ── */
@media (orientation:landscape) {
  body { flex-direction:row; align-items:stretch; max-width:none; height:100dvh; }

  /* Left panel: HUD */
  #hud {
    flex-direction:column; align-items:stretch;
    width:120px; max-width:none; flex-shrink:0;
    height:100%; border-bottom:none; border-right:1px solid var(--border);
    padding:8px; gap:8px; justify-content:flex-start; overflow:hidden;
  }
  #hud .hud-col { flex:0 0 auto; align-items:flex-start; width:100%; }
  #hud .hud-col.center {
    order:-1; align-items:flex-start; padding:0;
    border-bottom:1px solid var(--border); padding-bottom:7px;
  }
  #hud .hud-col.right { align-items:flex-start; }
  #hud .bar-outer { width:100%; }
  #dbg-btn { width:100%; }
  #pause-btn { margin-top:4px; width:100%; }
  #hud-actions { margin-top:auto; }

  /* Center: canvas — fill all remaining space */
  #canvas-wrap { flex:1; max-width:none; height:100%; min-height:0; min-width:0; }

  /* Right panel: spell slots */
  #spell-bar {
    flex-direction:column; align-items:stretch;
    width:120px; max-width:none; flex-shrink:0;
    height:100%; border-top:none; border-left:1px solid var(--border);
    padding:8px; gap:8px; justify-content:flex-start; overflow:hidden;
  }
  .spell-slot { flex:1; min-height:0; }
}

/* ── SPELL PICKER ── */
#sp-overlay { display:none; position:fixed; inset:0; z-index:60; }
#sp-overlay.show { display:block; }
#sp-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.55); }
#sp-panel {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:min(600px,100%); background:var(--panel);
  border-top:2px solid var(--border); border-radius:12px 12px 0 0;
  padding:14px 14px 20px; max-height:55vh; overflow-y:auto;
}
@media (orientation:landscape) {
  #sp-panel {
    /* In landscape, anchor to right side above the spell bar */
    bottom:0; right:0; left:auto; transform:none;
    width:min(340px,50vw); border-radius:12px 0 0 0;
    border-left:2px solid var(--border); border-top:2px solid var(--border);
  }
}
#sp-title {
  font-family:'Black Ops One',sans-serif; font-size:0.75rem;
  color:var(--dim); letter-spacing:4px; margin-bottom:10px;
  padding-bottom:8px; border-bottom:1px solid var(--border);
}
.sp-item {
  display:flex; flex-direction:column; gap:3px; padding:10px 12px;
  border-radius:6px; cursor:pointer; border:1px solid transparent;
  margin-bottom:6px; transition:all 0.15s;
}
.sp-item:last-child { margin-bottom:0; }
.sp-item:hover,.sp-item:active { border-color:var(--blue); background:#111120; }
.sp-item.equipped { border-color:#2244aa; background:#0a0a18; }
.sp-item .sp-name {
  font-family:'Black Ops One',sans-serif; font-size:0.78rem;
  color:var(--blue); letter-spacing:1px;
}
.sp-item.equipped .sp-name::after { content:' ✓'; color:var(--green); font-family:'Share Tech Mono',monospace; font-size:0.65rem; }
.sp-item .sp-desc { font-size:0.55rem; color:var(--dim); line-height:1.5; }
.sp-empty { color:var(--dim); font-size:0.58rem; padding:10px; text-align:center; line-height:1.8; }

/* ── LEVEL UP ── */
#lu-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(6,6,14,0.88); z-index:100;
  flex-direction:column; justify-content:center; align-items:center;
  gap:12px; padding:16px;
}
#lu-overlay.show { display:flex; }
#lu-title {
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(1.6rem,6vw,2.4rem);
  color:var(--gold); text-shadow:0 0 24px #ffc30077; letter-spacing:6px;
}
#lu-sub { font-size:clamp(0.55rem,2vw,0.7rem); color:var(--dim); letter-spacing:4px; margin-top:-6px; text-align:center; }
#lu-cards {
  display:flex; flex-direction:column; gap:10px;
  align-items:center; width:100%; max-height:65vh; overflow-y:auto;
}
.lu-card {
  background:var(--panel); border:2px solid var(--border); border-radius:10px;
  padding:14px 18px; width:min(90vw,440px); cursor:pointer; transition:all 0.18s;
  display:flex; flex-direction:column; gap:6px;
}
.lu-card:hover,.lu-card:active { border-color:var(--gold); box-shadow:0 0 20px #ffc30044; transform:translateY(-2px); }
.lu-card .c-type {
  font-size:0.52rem; letter-spacing:3px; color:var(--dim);
  background:#111120; display:inline-block; padding:2px 6px; border-radius:3px;
}
.lu-card .c-name { font-family:'Black Ops One',sans-serif; font-size:clamp(1rem,3vw,1.2rem); color:var(--gold); }
.lu-card .c-desc { font-size:clamp(0.58rem,2vw,0.7rem); color:var(--white); line-height:1.6; }
#lu-overlay.blocked .lu-card { pointer-events:none; filter:brightness(0.5); }
@media (orientation:landscape) {
  #lu-cards { flex-direction:row; align-items:stretch; overflow-x:auto; overflow-y:hidden; padding-bottom:4px; max-height:none; }
  .lu-card { width:min(30vw,260px); flex-shrink:0; }
}

/* ── PAUSE OVERLAY ── */
#pause-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(6,6,14,0.82); z-index:90;
  flex-direction:column; justify-content:center; align-items:center;
  gap:14px; cursor:pointer;
}
#pause-overlay.show { display:flex; }
#pause-overlay h2 {
  font-family:'Black Ops One',sans-serif; font-size:clamp(2rem,8vw,3.5rem);
  color:var(--white); letter-spacing:8px; text-shadow:0 0 30px rgba(221,227,255,0.3);
}
.p-sub { font-size:clamp(0.6rem,2.2vw,0.75rem); color:var(--dim); letter-spacing:4px; }
#resume-btn {
  padding:12px 32px; background:var(--panel); border:2px solid var(--blue);
  border-radius:4px; color:var(--blue); font-family:'Black Ops One',sans-serif;
  font-size:0.9rem; letter-spacing:3px; cursor:pointer; margin-top:4px;
}
#resume-btn:hover { box-shadow:0 0 16px #4488ff66; }

/* ── DEBUG OVERLAY ── */
#dbg-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(6,6,14,0.93); z-index:95;
  flex-direction:column; align-items:stretch;
}
#dbg-overlay.show { display:flex; }
#dbg-close {
  position:absolute; top:10px; right:14px;
  background:none; border:none; color:var(--dim);
  font-size:1.1rem; cursor:pointer; z-index:1;
  padding:4px 8px; line-height:1;
}
#dbg-close:hover { color:var(--white); }
#dbg-content {
  flex:1; overflow-y:auto; padding:14px 16px 16px;
  display:flex; flex-direction:column; gap:16px;
}
.debug-header {
  font-family:'Black Ops One',sans-serif; font-size:0.72rem;
  color:var(--gold); letter-spacing:4px;
  padding-bottom:6px; border-bottom:1px solid var(--border); margin-bottom:2px;
}
.debug-spell { padding:6px 0; border-bottom:1px solid #111120; }
.debug-spell-name {
  font-family:'Black Ops One',sans-serif; font-size:0.65rem;
  color:var(--blue); letter-spacing:2px; margin-bottom:3px;
}
.debug-upg { font-size:0.55rem; color:var(--dim); line-height:1.9; }
.debug-enemy-row {
  display:flex; flex-direction:row; gap:10px; flex-wrap:wrap;
  font-size:0.55rem; color:var(--dim); padding:5px 0;
  border-bottom:1px solid #111120; align-items:baseline;
}
.debug-enemy-name {
  font-family:'Black Ops One',sans-serif; color:var(--white);
  font-size:0.62rem; min-width:55px;
}
#dbg-btn {
  flex-shrink:0; width:36px; height:36px;
  background:var(--bg); border:1px solid var(--border); border-radius:4px;
  color:var(--dim); font-family:'Share Tech Mono',monospace;
  font-size:0.52rem; letter-spacing:1px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#dbg-btn:active { border-color:var(--gold); color:var(--gold); }

/* ── GAME OVER ── */
#gameover {
  display:none; position:fixed; inset:0;
  background:rgba(6,6,14,0.93); z-index:200;
  flex-direction:column; justify-content:center; align-items:center; gap:12px;
}
#gameover.show { display:flex; }
#gameover h2 {
  font-family:'Black Ops One',sans-serif; font-size:clamp(1.6rem,6vw,2.8rem);
  color:var(--red); text-shadow:0 0 28px #ff224466; letter-spacing:6px;
}
#go-stats { font-size:clamp(0.62rem,2vw,0.78rem); color:var(--dim); text-align:center; line-height:2.4; }
#restart-btn {
  margin-top:6px; padding:10px 28px; background:var(--panel);
  border:2px solid var(--red); border-radius:4px; color:var(--red);
  font-family:'Black Ops One',sans-serif; font-size:0.85rem; letter-spacing:3px; cursor:pointer;
}
#restart-btn:hover { box-shadow:0 0 16px #ff224466; }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-col">
    <div class="hud-label">BASE HP</div>
    <div class="bar-outer"><div class="bar-inner hp-bar" id="hp-bar" style="width:100%"></div></div>
    <div class="hud-val" id="hp-val">500 / 500</div>
  </div>
  <div class="hud-col center">
    <div style="font-family:'Black Ops One',sans-serif;color:var(--gold);font-size:1rem;letter-spacing:2px" id="lv-txt">LVL 1</div>
    <div style="font-size:0.58rem;color:var(--gold)" id="gold-txt">&#x1F4B0; 0</div>
    <div style="font-size:0.55rem;color:var(--dim)" id="wave-txt">WAVE 1</div>
  </div>
  <div class="hud-col right">
    <div class="hud-label">XP</div>
    <div class="bar-outer"><div class="bar-inner xp-bar" id="xp-bar" style="width:0%"></div></div>
    <div class="hud-val" id="xp-val">0 / 10</div>
  </div>
  <div id="hud-actions" style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
    <button id="dbg-btn" onclick="toggleDebug()" title="Debug">DBG</button>
    <button id="pause-btn" onclick="togglePause()" title="Pause">&#9646;&#9646;</button>
  </div>
</div>

<div id="canvas-wrap"><canvas id="gc"></canvas></div>

<div id="spell-bar">
  <div class="spell-slot" id="slot-ray" onclick="openSpellPicker('ray')">
    <div class="slot-lbl">RAY SPELL</div>
    <div class="slot-name" id="ray-name">MAGIC MISSILE</div>
    <div class="slot-hint"><span>TAP TO FIRE</span><span>&#9660;</span></div>
  </div>
  <div class="spell-slot" id="slot-wall" onclick="openSpellPicker('wall')">
    <div class="slot-lbl">WALL SPELL</div>
    <div class="slot-name" id="wall-name">&#x2014; EMPTY &#x2014;</div>
    <div class="slot-hint"><span>HOLD 1s TO CAST</span><span>&#9660;</span></div>
  </div>
</div>

<!-- Spell Picker -->
<div id="sp-overlay">
  <div id="sp-backdrop"></div>
  <div id="sp-panel">
    <div id="sp-title">SELECT SPELL</div>
    <div id="sp-list"></div>
  </div>
</div>

<!-- Level Up -->
<div id="lu-overlay">
  <div id="lu-title">LEVEL UP!</div>
  <div id="lu-sub">&#x2014; CHOOSE ONE &#x2014;</div>
  <div id="lu-cards"></div>
</div>

<!-- Pause -->
<div id="pause-overlay">
  <h2>PAUSED</h2>
  <div class="p-sub">TAP TO RESUME</div>
  <button id="resume-btn">RESUME</button>
</div>

<!-- Debug -->
<div id="dbg-overlay">
  <button id="dbg-close" onclick="closeDebug()">&#x2715;</button>
  <div id="dbg-content">
    <div id="debug-spells"></div>
    <div id="debug-enemies"></div>
  </div>
</div>

<!-- Game Over -->
<div id="gameover">
  <h2>BASE DESTROYED</h2>
  <div id="go-stats"></div>
  <button id="restart-btn" onclick="startGame()">PLAY AGAIN</button>
</div>

<script>
// ── CANVAS ───────────────────────────────────────────────────────────────────
const CW = 600, CH = 700;
const canvas = document.getElementById('gc');
canvas.width = CW; canvas.height = CH;
const ctx = canvas.getContext('2d');

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const BASE_Y = CH - 90;
const BASE_H = 14;
const BASE_MAX_HP = 500;
function xpNeeded(lvl) { return 10 + (lvl - 1) * 8; }
function diffScale(wave) { return 1 + wave * 0.14; }

// Base color: lerp gray → red as HP decreases
function baseColor(frac) {
  const r = Math.round(0x88 + (0xcc - 0x88) * (1 - frac));
  const g = Math.round(0x88 + (0x11 - 0x88) * (1 - frac));
  const b = Math.round(0x99 + (0x22 - 0x99) * (1 - frac));
  return `rgb(${r},${g},${b})`;
}

// ── SPELL DEFS ───────────────────────────────────────────────────────────────
const RAY_DEFS = {
  magic_missile: {
    id:'magic_missile', name:'MAGIC MISSILE', desc:'Fast blue bolt. Single target.',
    color:'#4488ff', glow:'#2255cc', speed:900, dmg:50, aoe:0, dot:0, dotDur:0, instant:false,
  },
  fireball: {
    id:'fireball', name:'FIREBALL', desc:'AOE explosion on impact + 5s burn.',
    color:'#ff8800', glow:'#ff4400', speed:420, dmg:15, aoe:55, dot:3, dotDur:5, instant:false,
  },
  laserbeam: {
    id:'laserbeam', name:'LASER BEAM', desc:'Instant line through tap. Burns all hit.',
    color:'#ff2244', glow:'#ff0011', speed:Infinity, dmg:12, aoe:0, dot:2, dotDur:5, instant:true,
  },
};

const WALL_DEFS = {
  force_field: {
    id:'force_field', name:'FORCE FIELD', desc:'200 HP barrier. Stops enemies.',
    color:'#00ccff', glow:'#0088cc', baseHp:200, duration:Infinity, slow:0, dotDmg:0, blocks:true,
  },
  fire_wall: {
    id:'fire_wall', name:'FIRE WALL', desc:'Burns enemies passing through. 20s.',
    color:'#ff6600', glow:'#ff3300', baseHp:Infinity, baseW:CW-40, duration:20, slow:0, dotDmg:5, blocks:false,
  },
  slow_wall: {
    id:'slow_wall', name:'SLOW WALL', desc:'Slows enemies 80% movement. 20s.',
    color:'#aabbff', glow:'#6677cc', baseHp:Infinity, baseW:CW-40, duration:20, slow:0.8, dotDmg:0, blocks:false,
  },
};

const UPGRADE_DEFS = [
  // ── magic missile ──
  { id:'split',   name:'SPLIT',     targetType:'ray',
    desc:'Fire one additional ray per cast.',
    avail(s){ return s.id==='magic_missile'||s.id==='laserbeam'; },
    apply(G,s){ s._split=(s._split||1)+1; } },
  { id:'damage',  name:'POWER',     targetType:'ray',
    desc:'+20% impact damage.',
    apply(G,s){ s.dmg=Math.round(s.dmg*1.2); } },
  { id:'bounce',  name:'BOUNCE',    targetType:'ray',
    desc:'+1 bounce to nearest enemy on hit.',
    avail(s){ return s.id==='magic_missile'; },
    apply(G,s){ s._bounce=(s._bounce||0)+1; } },
  // ── fireball ──
  { id:'blast',   name:'BLAST',     targetType:'ray',
    desc:'+33% explosion radius.',
    avail(s){ return s.id==='fireball'; },
    apply(G,s){ s.aoe=Math.round(s.aoe*1.33); } },
  { id:'dot',     name:'IGNITE',    targetType:'ray',
    desc:'Strengthen burning DOT (+66% dmg/s).',
    avail(s){ return s.id==='fireball'||s.id==='laserbeam'; },
    apply(G,s){ s.dot=s.dot?Math.round(s.dot*1.66):2; s.dotDur=s.dotDur||5; } },
  // ── walls ──
  { id:'wall_hp', name:'REINFORCE', targetType:'wall',
    desc:'+50% wall HP.',
    avail(s){ return s.baseHp!==Infinity; },
    apply(G,s){ s.baseHp=Math.round(s.baseHp*1.5); } },
  { id:'fw_dot',  name:'INFERNO',   targetType:'wall',
    desc:'+50% fire damage per tick.',
    avail(s){ return s.id==='fire_wall'; },
    apply(G,s){ s.dotDmg=Math.round(s.dotDmg*1.5); } },
  { id:'expand',  name:'EXPAND',    targetType:'wall',
    desc:'+33% wall width.',
    avail(s){ return s.id==='fire_wall'||s.id==='slow_wall'; },
    apply(G,s){ s.baseW=Math.round((s.baseW||CW-40)*1.33); } },
  { id:'weaken',  name:'WEAKEN',    targetType:'wall',
    desc:'Slowed enemies take 20% more damage.',
    avail(s){ return s.id==='slow_wall'; },
    apply(G,s){ s._debuff=(s._debuff||0)+0.2; } },
  { id:'gravity', name:'GRAVITY',   targetType:'wall',
    desc:'Pull blocked enemies toward center (+10 px/s).',
    avail(s){ return s.id==='force_field'; },
    apply(G,s){ s._gravity=(s._gravity||0)+10; } },
];

// ── ENEMY TYPES ──────────────────────────────────────────────────────────────
const ENEMY_TYPES = [
  { id:'imp',   name:'IMP',   col:'#ff4455', r:11, hp:30,  spd:60, range:40, dmg:8,  rate:1.5, xp:1,  gold:0,  wave:0  },
  { id:'orc',   name:'ORC',   col:'#77cc44', r:15, hp:80,  spd:40, range:45, dmg:18, rate:1.0, xp:2,  gold:0,  wave:3  },
  { id:'troll', name:'TROLL', col:'#559933', r:20, hp:200, spd:28, range:50, dmg:30, rate:0.7, xp:5,  gold:0,  wave:6  },
  { id:'ghost', name:'GHOST', col:'#aabbff', r:13, hp:50,  spd:75,  range:45, dmg:12, rate:2.0, xp:3,  gold:0,  wave:4  },
  { id:'ninja', name:'NINJA', col:'#cc44ff', r:7,  hp:50,  spd:225, range:22, dmg:6,  rate:2.0, xp:4,  gold:0,  wave:8  },
  { id:'golem', name:'GOLEM', col:'#cc8833', r:28, hp:600, spd:22,  range:55, dmg:50, rate:0.5, xp:20, gold:15, wave:10, boss:true },
];

// ── GAME STATE ───────────────────────────────────────────────────────────────
let G;

function startGame() {
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('lu-overlay').classList.remove('show');
  hidePauseOverlay();
  closeSpellPicker();
  closeDebug();

  const mm = cloneDef(RAY_DEFS.magic_missile, { _split:1 });
  G = {
    running:true, _pd:0, paused:false,
    manualPaused:false, levelingUp:false, pickerOpen:false,

    wave:1, spawnTimer:1.5, spawnInterval:2.2,
    waveKilled:0, waveTarget:6,

    baseHp:BASE_MAX_HP,
    level:1, xp:0, xpNext:xpNeeded(1),
    gold:0, totalKills:0,

    raySpells:{ magic_missile:mm },
    wallSpells:{},
    ray:mm, wall:null,
    upgTaken:{},
    enemySeen:{},
    enemySeenOrder:[],

    enemies:[], projectiles:[], walls:[],
    particles:[], floats:[],

    holdStart:null, holdX:0, holdY:0,
    lastTs:null,
  };
  requestAnimationFrame(loop);
  updateHUD(); updateSpellBar();
}

function cloneDef(def, extra) { return Object.assign({}, def, extra||{}); }

// ── PAUSE ────────────────────────────────────────────────────────────────────
function pushPause() { G._pd++; G.paused=true; }
function popPause()  { G._pd=Math.max(0,G._pd-1); if(!G._pd) G.paused=false; }

function togglePause() {
  if (!G||!G.running||G.levelingUp||G.pickerOpen) return;
  if (G.manualPaused) {
    G.manualPaused=false; popPause(); hidePauseOverlay();
  } else {
    G.manualPaused=true; pushPause(); showPauseOverlay();
  }
}

function showPauseOverlay() {
  document.getElementById('pause-overlay').classList.add('show');
  document.getElementById('pause-btn').textContent='▶';
}

function buildPauseDebug() {
  if (!G) return;
  buildSpellDebug();
  buildEnemyDebug();
}

function buildSpellDebug() {
  const el=document.getElementById('debug-spells');
  let html='<div class="debug-header">SPELLS &amp; UPGRADES</div>';
  const allSpells=[...Object.values(G.raySpells),...Object.values(G.wallSpells)];
  if (!allSpells.length) { html+='<div class="debug-upg">No spells.</div>'; el.innerHTML=html; return; }
  for (const s of allSpells) {
    const def=RAY_DEFS[s.id]||WALL_DEFS[s.id];
    if (!def) continue;
    const isRay=!!RAY_DEFS[s.id];
    html+=`<div class="debug-spell"><div class="debug-spell-name">${s.name}</div>`;
    const lines=[];
    if (isRay) {
      lines.push(`DMG: ${def.dmg} &rarr; ${s.dmg}`);
      if (s.id==='magic_missile'||s.id==='laserbeam') lines.push(`RAYS: 1 &rarr; ${s._split||1}`);
      if (def.aoe>0) lines.push(`AOE RADIUS: ${def.aoe} &rarr; ${s.aoe}`);
      const baseDot=def.dot||0;
      if (baseDot>0||s.dot>0) lines.push(`DOT: ${baseDot}/s &rarr; ${s.dot||0}/s`);
      if (s._bounce>0) lines.push(`BOUNCE: ${s._bounce}`);
    } else {
      if (def.baseHp!==Infinity) lines.push(`WALL HP: ${def.baseHp} &rarr; ${s.baseHp}`);
      if (def.dotDmg>0||s.dotDmg>0) lines.push(`FIRE DMG: ${def.dotDmg} &rarr; ${s.dotDmg}/tick`);
      if (def.baseW) lines.push(`WIDTH: ${def.baseW} &rarr; ${Math.min(s.baseW||def.baseW,CW)}px`);
      if (s._debuff>0) lines.push(`WEAKEN: +${Math.round(s._debuff*100)}% dmg`);
      if (s._gravity>0) lines.push(`GRAVITY: ${s._gravity} px/s`);
    }
    const upgLines=[];
    for (const u of UPGRADE_DEFS) {
      if (u.targetType!==(isRay?'ray':'wall')) continue;
      const key=u.id+'_'+s.id;
      const taken=G.upgTaken[key]||0;
      if (taken>0) upgLines.push(`${u.name}&times;${taken}`);
    }
    lines.push(upgLines.length?('UPG: '+upgLines.join(', ')):'No upgrades.');
    html+=`<div class="debug-upg">${lines.join('<br>')}</div></div>`;
  }
  el.innerHTML=html;
}

function buildEnemyDebug() {
  const el=document.getElementById('debug-enemies');
  let html='<div class="debug-header">ENEMIES ENCOUNTERED</div>';
  const seenIds=G.enemySeenOrder||[];
  if (!seenIds.length) { html+='<div class="debug-upg">None yet.</div>'; el.innerHTML=html; return; }
  const sc=diffScale(G.wave);
  for (const id of seenIds) {
    const def=ENEMY_TYPES.find(e=>e.id===id);
    if (!def) continue;
    const info=G.enemySeen[id];
    const curHp=Math.round(def.hp*sc);
    const curDmg=Math.round(def.dmg*sc);
    html+=`<div class="debug-enemy-row"><div class="debug-enemy-name">${def.name}</div>`;
    html+=`<span>lv:${info.firstWave}</span><span>seen:${info.count}</span>`;
    html+=`<span>HP:${curHp}</span><span>DMG:${curDmg}</span>`;
    html+=`<span>RNG:${def.range}</span><span>SPD:${def.spd}</span></div>`;
  }
  el.innerHTML=html;
}

let _dbgOpen=false;

function toggleDebug() {
  if (!G||!G.running) return;
  _dbgOpen?closeDebug():openDebug();
}

function openDebug() {
  if (_dbgOpen) return;
  _dbgOpen=true; pushPause();
  buildPauseDebug();
  document.getElementById('dbg-overlay').classList.add('show');
}

function closeDebug() {
  if (!_dbgOpen) return;
  _dbgOpen=false; popPause();
  document.getElementById('dbg-overlay').classList.remove('show');
}

function hidePauseOverlay() {
  document.getElementById('pause-overlay').classList.remove('show');
  const b=document.getElementById('pause-btn');
  if(b) b.innerHTML='&#9646;&#9646;';
}

document.getElementById('pause-overlay').addEventListener('click', function(e) {
  if (!G||!G.running||!G.manualPaused) return;
  G.manualPaused=false; popPause(); hidePauseOverlay();
});
document.getElementById('resume-btn').addEventListener('click', function(e) {
  e.stopPropagation();
  if (!G||!G.running||!G.manualPaused) return;
  G.manualPaused=false; popPause(); hidePauseOverlay();
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden&&G&&G.running&&!G.manualPaused&&!G.levelingUp) {
    G.manualPaused=true; pushPause(); showPauseOverlay();
  }
});
window.addEventListener('blur', () => {
  if (G&&G.running&&!G.manualPaused&&!G.levelingUp) {
    G.manualPaused=true; pushPause(); showPauseOverlay();
  }
});

// ── SPELL PICKER ─────────────────────────────────────────────────────────────
let _pickerType=null;

function openSpellPicker(slotType) {
  if (!G||!G.running||G.levelingUp) return;
  if (G.pickerOpen) { closeSpellPicker(); return; }
  _pickerType=slotType; G.pickerOpen=true; pushPause();

  const isRay=slotType==='ray';
  const defs=isRay?RAY_DEFS:WALL_DEFS;
  const known=isRay?G.raySpells:G.wallSpells;
  const equipped=isRay?G.ray:G.wall;

  document.getElementById('sp-title').textContent=isRay?'SELECT RAY SPELL':'SELECT WALL SPELL';
  const list=document.getElementById('sp-list');
  list.innerHTML='';

  const ids=Object.keys(known);
  if (!ids.length) {
    list.innerHTML='<div class="sp-empty">No spells unlocked yet.<br>Level up to discover new spells.</div>';
  } else {
    for (const id of ids) {
      const def=defs[id];
      const isEq=equipped&&equipped.id===id;
      const item=document.createElement('div');
      item.className='sp-item'+(isEq?' equipped':'');
      item.innerHTML=`<div class="sp-name">${def.name}</div><div class="sp-desc">${def.desc}</div>`;
      item.addEventListener('click', ()=>{
        if (isRay) G.ray=G.raySpells[id]; else G.wall=G.wallSpells[id];
        updateSpellBar(); closeSpellPicker();
      });
      list.appendChild(item);
    }
  }
  document.getElementById('sp-overlay').classList.add('show');
}

function closeSpellPicker() {
  if (!G||!G.pickerOpen) return;
  G.pickerOpen=false; popPause();
  document.getElementById('sp-overlay').classList.remove('show');
  _pickerType=null;
}

document.getElementById('sp-backdrop').addEventListener('click', closeSpellPicker);
document.getElementById('sp-backdrop').addEventListener('touchend', e=>{e.preventDefault();closeSpellPicker();});

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!G.running) return;
  const dt=G.lastTs?Math.min((ts-G.lastTs)/1000,0.1):0.016;
  G.lastTs=ts;
  if (!G.paused) tick(dt);
  draw();
  requestAnimationFrame(loop);
}

function tick(dt) {
  spawnTick(dt);
  tickProjectiles(dt);
  tickEnemies(dt);
  tickWalls(dt);
  tickParticles(dt);
  tickFloats(dt);
  if (G.baseHp<=0) { G.baseHp=0; gameOver(); }
  updateHUD();
}

// ── SPAWNING ──────────────────────────────────────────────────────────────────
function spawnTick(dt) {
  G.spawnTimer-=dt;
  if (G.spawnTimer<=0&&G.waveKilled<G.waveTarget) {
    spawnEnemy(); G.waveKilled++;
    G.spawnTimer=G.spawnInterval*(0.7+Math.random()*0.6);
  }
  if (G.waveKilled>=G.waveTarget&&G.enemies.length===0) {
    G.wave++; G.waveKilled=0;
    G.waveTarget=Math.floor(6+G.wave*1.6);
    G.spawnInterval=Math.max(0.75,2.2-G.wave*0.07);
    G.spawnTimer=2.0;
  }
}

function spawnEnemy() {
  const sc=diffScale(G.wave);
  let pool=ENEMY_TYPES.filter(e=>e.wave<=G.wave);
  if (G.wave>=10&&Math.random()<0.05) pool=[ENEMY_TYPES[4]];
  const def=pool[Math.floor(Math.random()*pool.length)];
  if (!G.enemySeen[def.id]) {
    G.enemySeen[def.id]={count:0,firstWave:G.wave};
    G.enemySeenOrder.unshift(def.id);
  }
  G.enemySeen[def.id].count++;
  const x=def.r+Math.random()*(CW-def.r*2);
  G.enemies.push({
    id:Math.random(), col:def.col, r:def.r, name:def.name,
    x, y:-def.r-4,
    hp:Math.round(def.hp*sc), maxHp:Math.round(def.hp*sc),
    spd:def.spd, range:def.range,
    dmg:Math.round(def.dmg*sc), rate:def.rate,
    atkTimer:0, xp:def.xp+Math.floor(G.wave*0.25),
    gold:def.gold, boss:!!def.boss, fx:{}, dead:false,
  });
}

// ── PROJECTILES ──────────────────────────────────────────────────────────────
function fireRay(tx, ty) {
  if (!G.ray) return;
  const s=G.ray, ox=CW/2, oy=BASE_Y, splits=s._split||1;
  for (let i=0;i<splits;i++) {
    let fx=tx, fy=ty;
    if (splits>1) {
      const sp=(i-(splits-1)/2)*20;
      const dx=tx-ox, dy=ty-oy, len=Math.hypot(dx,dy)||1;
      fx=tx+(-dy/len)*sp; fy=ty+(dx/len)*sp;
    }
    if (s.instant) fireLaser(s,ox,oy,fx,fy);
    else {
      const dx=fx-ox, dy=fy-oy, len=Math.hypot(dx,dy)||1;
      G.projectiles.push({
        col:s.color, glow:s.glow, x:ox, y:oy,
        vx:(dx/len)*s.speed, vy:(dy/len)*s.speed, speed:s.speed,
        dmg:s.dmg, aoe:s.aoe||0, dot:s.dot||0, dotDur:s.dotDur||0,
        bounces:s._bounce||0, hitIds:new Set(),
        r:s.id==='fireball'?9:5, trail:[], alive:true,
      });
    }
  }
}

function fireLaser(s, ox, oy, tx, ty) {
  const dx=tx-ox, dy=ty-oy, len=Math.hypot(dx,dy)||1;
  const ex=ox+(dx/len)*2000, ey=oy+(dy/len)*2000;
  G.particles.push({type:'laser',x1:ox,y1:oy,x2:ex,y2:ey,col:s.color,a:1,life:0.18,max:0.18});
  for (const e of G.enemies) {
    if (!e.dead&&ptSegDist(e.x,e.y,ox,oy,ex,ey)<e.r+4) hitEnemy(e,s.dmg,s.dot,s.dotDur);
  }
}

function ptSegDist(px,py,ax,ay,bx,by) {
  const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
  if (!l2) return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

function tickProjectiles(dt) {
  for (const p of G.projectiles) {
    if (!p.alive) continue;
    p.trail.push({x:p.x,y:p.y});
    if (p.trail.length>9) p.trail.shift();
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if (p.x<-60||p.x>CW+60||p.y<-120||p.y>CH+60) { p.alive=false; continue; }
    for (const e of G.enemies) {
      if (e.dead) continue;
      if (Math.hypot(p.x-e.x,p.y-e.y)<e.r+p.r) {
        if (p.aoe>0) {
          explode(p.x,p.y,p.aoe,p.dmg,p.dot,p.dotDur,p.col);
        } else {
          hitEnemy(e,p.dmg,p.dot,p.dotDur);
          if (p.bounces>0) {
            p.hitIds.add(e.id);
            let best=null, bestD=Infinity;
            for (const c of G.enemies) {
              if (c.dead||p.hitIds.has(c.id)) continue;
              const d=Math.hypot(c.x-p.x,c.y-p.y);
              if (d<bestD) { bestD=d; best=c; }
            }
            if (best) {
              const bx=best.x-p.x, by=best.y-p.y, bl=Math.hypot(bx,by)||1;
              const spd=p.speed||900;
              G.projectiles.push({
                col:p.col, glow:p.glow, x:p.x, y:p.y,
                vx:(bx/bl)*spd, vy:(by/bl)*spd, speed:spd,
                dmg:p.dmg, aoe:0, dot:p.dot, dotDur:p.dotDur,
                bounces:p.bounces-1, hitIds:new Set(p.hitIds),
                r:p.r, trail:[], alive:true,
              });
            }
          }
        }
        p.alive=false; break;
      }
    }
  }
  G.projectiles=G.projectiles.filter(p=>p.alive);
}

function explode(cx,cy,rad,dmg,dot,dotDur,col) {
  G.particles.push({type:'boom',x:cx,y:cy,rad,col,a:1,life:0.4,max:0.4});
  for (const e of G.enemies) {
    if (!e.dead&&Math.hypot(e.x-cx,e.y-cy)<rad+e.r) hitEnemy(e,dmg,dot,dotDur);
  }
}

// ── ENEMIES ──────────────────────────────────────────────────────────────────
function tickEnemies(dt) {
  const blockers=G.walls.filter(w=>w.spellId==='force_field'&&w.hp>0);
  for (const e of G.enemies) {
    if (e.dead) continue;
    tickFx(e,dt); if (e.dead) continue;
    const ms=e.spd*(e.fx.slowed?1-e.fx.slowed.fac:1);
    let blocked=null;
    for (const w of blockers) {
      if (e.y<w.y&&Math.abs(e.y-w.y)<e.r+12) { blocked=w; break; }
    }
    if (blocked) {
      if (blocked.gravity>0) {
        const pull=blocked.gravity, dx=CW/2-e.x;
        if (Math.abs(dx)>0.5) e.x+=Math.sign(dx)*Math.min(Math.abs(dx),pull*dt);
      }
      e.atkTimer-=dt;
      if (e.atkTimer<=0) {
        e.atkTimer=1/e.rate; blocked.hp-=e.dmg;
        spark(e.x,e.y,'#ffffff'); floatText(`-${e.dmg}`,e.x,e.y-e.r,'#ffaaaa');
      }
    } else if (BASE_Y-e.y<=e.range) {
      e.atkTimer-=dt;
      if (e.atkTimer<=0) {
        e.atkTimer=1/e.rate;
        G.baseHp=Math.max(0,G.baseHp-e.dmg);
        spark(e.x,BASE_Y,'#ff4455'); floatText(`-${e.dmg}`,e.x,BASE_Y-18,'#ff2244');
      }
    } else { e.y+=ms*dt; }
  }
  G.enemies=G.enemies.filter(e=>!e.dead);
}

function tickFx(e, dt) {
  if (e.fx.burning) {
    const b=e.fx.burning; b.dur-=dt; b.tick-=dt;
    if (b.tick<=0) {
      b.tick=1; e.hp-=b.dps; spark(e.x,e.y,'#ff8800');
      if (e.hp<=0) { killEnemy(e); return; }
    }
    if (b.dur<=0) delete e.fx.burning;
  }
  if (e.fx.slowed) { e.fx.slowed.dur-=dt; if(e.fx.slowed.dur<=0) delete e.fx.slowed; }
}

function hitEnemy(e, dmg, dot, dotDur) {
  if (e.dead) return;
  if (e.fx.slowed?.debuff>0) dmg=Math.round(dmg*(1+e.fx.slowed.debuff));
  e.hp-=dmg; spark(e.x,e.y,'#ffffff'); floatText(`-${dmg}`,e.x,e.y-e.r,'#ffddaa');
  if (dot>0) e.fx.burning={dps:dot,dur:dotDur,tick:e.fx.burning?.tick||1};
  if (e.hp<=0) killEnemy(e);
}

function killEnemy(e) {
  if (e.dead) return;
  e.dead=true; e.hp=0; G.totalKills++;
  G.xp+=e.xp; floatText(`+${e.xp} XP`,e.x,e.y-e.r-10,'#b44fff');
  if (e.gold>0) { G.gold+=e.gold; floatText(`+${e.gold} \u{1F4B0}`,e.x,e.y-e.r-22,'#ffc300'); }
  for (let i=0;i<8;i++) G.particles.push({
    type:'spark',x:e.x,y:e.y,
    vx:(Math.random()-.5)*130, vy:(Math.random()-.5)*130-40,
    col:e.col, a:1, life:0.5+Math.random()*0.4, max:0.9, r:2+Math.random()*3,
  });
  checkLevelUp();
}

function checkLevelUp() {
  if (G.xp>=G.xpNext) {
    G.xp-=G.xpNext; G.level++; G.xpNext=xpNeeded(G.level);
    G.levelingUp=true; pushPause(); showLevelUp();
  }
}

// ── WALLS ─────────────────────────────────────────────────────────────────────
function castWall(tapX, tapY) {
  if (!G.wall) return;
  const def=G.wall;
  if (def.duration!==Infinity) G.walls=G.walls.filter(w=>w.spellId!==def.id);
  const wy=Math.min(Math.max(tapY,80),BASE_Y-80);
  const wallW=Math.min(def.baseW||CW-40, CW);
  G.walls.push({
    spellId:def.id, col:def.color, glow:def.glow,
    x:CW/2, y:wy, w:wallW, h:12,
    hp:def.baseHp, maxHp:def.baseHp,
    duration:def.duration, timer:def.duration,
    slow:def.slow, dotDmg:def.dotDmg, blocks:def.blocks,
    debuff:def._debuff||0, gravity:def._gravity||0,
    dotTick:{}, dead:false,
  });
}

function tickWalls(dt) {
  const wx1=w=>w.x-w.w/2, wx2=w=>w.x+w.w/2;
  const wy1=w=>w.y-w.h/2, wy2=w=>w.y+w.h/2;
  for (const w of G.walls) {
    if (w.timer!==Infinity) { w.timer-=dt; if(w.timer<=0){w.dead=true;continue;} }
    if (w.hp!==Infinity&&w.hp<=0) { w.dead=true; continue; }
    for (const e of G.enemies) {
      if (e.dead) continue;
      if (e.x>=wx1(w)&&e.x<=wx2(w)&&e.y>=wy1(w)&&e.y<=wy2(w)) {
        if (w.slow>0) e.fx.slowed={fac:w.slow,dur:1.5,debuff:w.debuff||0};
        if (w.dotDmg>0) {
          // Timer starts at 0 so the first hit lands immediately on contact
          if (w.dotTick[e.id]===undefined) w.dotTick[e.id]=0;
          w.dotTick[e.id]-=dt;
          if (w.dotTick[e.id]<=0) {
            w.dotTick[e.id]=0.333;
            e.hp-=w.dotDmg;
            spark(e.x,e.y,w.col);
            // Apply/refresh 5s burning DOT (no stack — overwrite)
            e.fx.burning={dps:w.dotDmg, dur:5, tick:e.fx.burning?.tick??1};
            if (e.hp<=0) killEnemy(e);
          }
        }
      }
    }
  }
  G.walls=G.walls.filter(w=>!w.dead);
}

// ── PARTICLES ────────────────────────────────────────────────────────────────
function spark(x,y,col) {
  G.particles.push({type:'hit',x,y,vx:(Math.random()-.5)*55,vy:-28-Math.random()*28,col,a:0.9,life:0.25,max:0.25,r:3});
}
function floatText(txt,x,y,col) { G.floats.push({txt,x,y,col,a:1,life:1.2,vy:-28}); }
function tickParticles(dt) {
  for (const p of G.particles) {
    p.life-=dt; p.a=Math.max(0,p.life/p.max);
    if (p.vx!==undefined) { p.x+=p.vx*dt; p.y+=p.vy*dt; }
  }
  G.particles=G.particles.filter(p=>p.life>0);
}
function tickFloats(dt) {
  for (const f of G.floats) { f.life-=dt; f.a=Math.max(0,f.life/1.2); f.y+=f.vy*dt; }
  G.floats=G.floats.filter(f=>f.life>0);
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#06060e'; ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='#0d0d1e'; ctx.lineWidth=1;
  for (let x=0;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for (let y=0;y<CH;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  drawWalls(); drawLaserPtcl(); drawEnemies(); drawProjectiles();
  drawBoomPtcl(); drawSparkPtcl(); drawFloats(); drawBase(); drawHoldRing();
}

function drawBase() {
  const frac=G.baseHp/BASE_MAX_HP;
  const col=baseColor(frac);
  ctx.shadowColor=col; ctx.shadowBlur=20;
  ctx.fillStyle=col; ctx.fillRect(0,BASE_Y,CW,BASE_H);
  // HP overlay (brighter strip showing remaining HP)
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(0,BASE_Y,CW*frac,BASE_H);
  // Label
  ctx.font='bold 11px "Share Tech Mono"';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.textAlign='center';
  ctx.fillText('BASE',CW/2,BASE_Y+10);
}

function drawWalls() {
  for (const w of G.walls) {
    const x1=w.x-w.w/2, y1=w.y-w.h/2;
    let alpha=1;
    if (w.timer!==Infinity) alpha=Math.min(1,w.timer/4)*0.85+0.15;
    ctx.globalAlpha=alpha; ctx.shadowColor=w.glow; ctx.shadowBlur=20;
    ctx.fillStyle=w.col; ctx.fillRect(x1,y1,w.w,w.h);
    if (w.hp!==Infinity) {
      const frac=Math.max(0,w.hp/w.maxHp);
      ctx.shadowBlur=0;
      ctx.fillStyle='#111120'; ctx.fillRect(x1,y1-7,w.w,4);
      ctx.fillStyle=w.col; ctx.fillRect(x1,y1-7,w.w*frac,4);
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

function drawEnemies() {
  for (const e of G.enemies) {
    if (e.dead) continue;
    ctx.shadowColor=e.col; ctx.shadowBlur=e.boss?28:14;
    ctx.fillStyle=e.col;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    if (e.fx.burning) {
      ctx.strokeStyle='#ff8800'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+3,0,Math.PI*2); ctx.stroke();
    }
    if (e.fx.slowed) {
      ctx.strokeStyle='#aabbff'; ctx.lineWidth=2; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+3,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
    const bw=e.r*2.6, bx=e.x-bw/2, by=e.y-e.r-10;
    ctx.fillStyle='#111120'; ctx.fillRect(bx,by,bw,4);
    const f=Math.max(0,e.hp/e.maxHp);
    ctx.fillStyle=f>.5?'#33cc44':f>.25?'#ffaa00':'#ff2244';
    ctx.fillRect(bx,by,bw*f,4);
    if (e.boss) {
      ctx.font='bold 10px "Share Tech Mono"'; ctx.fillStyle='#ffc300'; ctx.textAlign='center';
      ctx.fillText(e.name,e.x,e.y-e.r-14);
    }
  }
}

function drawProjectiles() {
  for (const p of G.projectiles) {
    for (let i=0;i<p.trail.length;i++) {
      const t=p.trail[i];
      ctx.globalAlpha=(i/p.trail.length)*0.45; ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(t.x,t.y,p.r*0.65,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowColor=p.glow; ctx.shadowBlur=22;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

function drawLaserPtcl() {
  for (const p of G.particles) {
    if (p.type!=='laser') continue;
    ctx.globalAlpha=p.a; ctx.shadowColor=p.col; ctx.shadowBlur=18;
    ctx.strokeStyle=p.col; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(p.x1,p.y1); ctx.lineTo(p.x2,p.y2); ctx.stroke();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

function drawBoomPtcl() {
  for (const p of G.particles) {
    if (p.type!=='boom') continue;
    const prog=1-p.life/p.max;
    ctx.globalAlpha=p.a*0.65; ctx.shadowColor=p.col; ctx.shadowBlur=30;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.rad*prog*1.2+8,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

function drawSparkPtcl() {
  for (const p of G.particles) {
    if (p.type!=='spark'&&p.type!=='hit') continue;
    ctx.globalAlpha=p.a; ctx.shadowColor=p.col; ctx.shadowBlur=10;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r||3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

function drawFloats() {
  ctx.font='11px "Share Tech Mono"'; ctx.textAlign='center';
  for (const f of G.floats) { ctx.globalAlpha=f.a; ctx.fillStyle=f.col; ctx.fillText(f.txt,f.x,f.y); }
  ctx.globalAlpha=1;
}

function drawHoldRing() {
  if (G.holdStart===null) return;
  const prog=Math.min((performance.now()-G.holdStart)/1000,1);
  ctx.strokeStyle='#00ccff'; ctx.lineWidth=3;
  ctx.shadowColor='#00ccff'; ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.arc(G.holdX,G.holdY,22,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);
  ctx.stroke(); ctx.shadowBlur=0;
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  const hf=G.baseHp/BASE_MAX_HP;
  document.getElementById('hp-bar').style.width=(hf*100)+'%';
  document.getElementById('hp-val').textContent=`${Math.ceil(G.baseHp)} / ${BASE_MAX_HP}`;
  const xf=G.xp/G.xpNext;
  document.getElementById('xp-bar').style.width=(xf*100)+'%';
  document.getElementById('xp-val').textContent=`${G.xp} / ${G.xpNext}`;
  document.getElementById('lv-txt').textContent=`LVL ${G.level}`;
  document.getElementById('gold-txt').textContent=`\u{1F4B0} ${G.gold}`;
  document.getElementById('wave-txt').textContent=`WAVE ${G.wave}`;
}

function updateSpellBar() {
  document.getElementById('ray-name').textContent=G.ray?G.ray.name:'— EMPTY —';
  document.getElementById('wall-name').textContent=G.wall?G.wall.name:'— EMPTY —';
}

// ── LEVEL UP ─────────────────────────────────────────────────────────────────
function showLevelUp() {
  const opts=buildOptions();
  const container=document.getElementById('lu-cards');
  container.innerHTML='';

  for (const opt of opts) {
    const card=document.createElement('div');
    card.className='lu-card';
    card.innerHTML=`<div class="c-type">${opt.cat}</div><div class="c-name">${opt.name}</div><div class="c-desc">${opt.desc}</div>`;
    card.addEventListener('click', ()=>{
      if (document.getElementById('lu-overlay').classList.contains('blocked')) return;
      opt.apply();
      document.getElementById('lu-overlay').classList.remove('show');
      G.levelingUp=false; popPause(); updateSpellBar();
      if (G.xp>=G.xpNext) checkLevelUp();
    });
    container.appendChild(card);
  }

  const overlay=document.getElementById('lu-overlay');
  const sub=document.getElementById('lu-sub');
  overlay.classList.add('show','blocked');
  sub.textContent='— WAIT… —';
  setTimeout(()=>{ overlay.classList.remove('blocked'); sub.textContent='— CHOOSE ONE —'; }, 1000);
}

function buildOptions() {
  const out=[];
  const newSpell=pickNewSpell();
  if (newSpell) out.push(newSpell);
  const equip=pickEquippedUpgrade(out);
  if (equip) out.push(equip);
  while (out.length<3) { const r=pickAnyUpgrade(out); if(!r) break; out.push(r); }
  for (let i=out.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [out[i],out[j]]=[out[j],out[i]]; }
  return out.slice(0,3);
}

function pickNewSpell() {
  const cands=[];
  for (const id of Object.keys(RAY_DEFS)) {
    if (!G.raySpells[id]) {
      const d=RAY_DEFS[id];
      cands.push({cat:'NEW RAY SPELL',name:d.name,desc:d.desc,
        apply(){ const s=cloneDef(d,{_split:1}); G.raySpells[id]=s; G.ray=s; }});
    }
  }
  for (const id of Object.keys(WALL_DEFS)) {
    if (!G.wallSpells[id]) {
      const d=WALL_DEFS[id];
      cands.push({cat:'NEW WALL SPELL',name:d.name,desc:d.desc,
        apply(){ const s=cloneDef(d); G.wallSpells[id]=s; G.wall=s; }});
    }
  }
  if (!cands.length) return null;
  return cands[Math.floor(Math.random()*cands.length)];
}

function pickEquippedUpgrade(existing) {
  const cands=[];
  if (G.ray) collectUpgrades(G.ray,'ray','RAY UPGRADE',cands);
  if (G.wall) collectUpgrades(G.wall,'wall','WALL UPGRADE',cands);
  const valid=cands.filter(c=>!existing.some(e=>e._key===c._key));
  if (!valid.length) return null;
  return valid[Math.floor(Math.random()*valid.length)];
}

function pickAnyUpgrade(existing) {
  const cands=[];
  if (G.ray) collectUpgrades(G.ray,'ray','RAY UPGRADE',cands);
  if (G.wall) collectUpgrades(G.wall,'wall','WALL UPGRADE',cands);
  const valid=cands.filter(c=>!existing.some(e=>e._key===c._key));
  if (!valid.length) return null;
  return valid[Math.floor(Math.random()*valid.length)];
}

function collectUpgrades(spellObj, type, cat, out) {
  for (const u of UPGRADE_DEFS) {
    if (u.targetType!==type) continue;
    if (u.avail&&!u.avail(spellObj)) continue;
    const key=u.id+'_'+spellObj.id;
    out.push({
      _key:key, cat, name:u.name,
      desc:`[${spellObj.name}] ${u.desc}`,
      apply(){ G.upgTaken[key]=(G.upgTaken[key]||0)+1; u.apply(G,spellObj); },
    });
  }
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function gameOver() {
  G.running=false;
  document.getElementById('go-stats').innerHTML=
    `WAVE ${G.wave} &nbsp;|&nbsp; KILLS: ${G.totalKills} &nbsp;|&nbsp; LVL: ${G.level} &nbsp;|&nbsp; \u{1F4B0} ${G.gold}`;
  document.getElementById('gameover').classList.add('show');
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
(function setupInput() {
  const wrap=document.getElementById('canvas-wrap');
  let holdTimer=null;

  function pos(cx,cy) {
    const r=wrap.getBoundingClientRect();
    return {x:(cx-r.left)*(CW/r.width), y:(cy-r.top)*(CH/r.height)};
  }

  function onDown(cx,cy) {
    if (!G||!G.running||G.paused) return;
    const p=pos(cx,cy);
    G.holdX=p.x; G.holdY=p.y; G.holdStart=performance.now();
    clearTimeout(holdTimer);
    holdTimer=setTimeout(()=>{
      if (G.holdStart!==null&&!G.paused&&G.running) {
        castWall(G.holdX,G.holdY); G.holdStart=null;
      }
    },1000);
  }

  function onUp(cx,cy) {
    clearTimeout(holdTimer);
    if (!G||!G.running) return;
    if (G.holdStart!==null) {
      const elapsed=performance.now()-G.holdStart;
      G.holdStart=null;
      if (elapsed<1000&&!G.paused) { const p=pos(cx,cy); fireRay(p.x,p.y); }
    }
  }

  wrap.addEventListener('mousedown',  e=>{e.preventDefault();onDown(e.clientX,e.clientY);});
  wrap.addEventListener('mouseup',    e=>{e.preventDefault();onUp(e.clientX,e.clientY);});
  wrap.addEventListener('touchstart', e=>{e.preventDefault();onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  wrap.addEventListener('touchend',   e=>{e.preventDefault();onUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  wrap.addEventListener('contextmenu',e=>e.preventDefault());
})();

// ── CANVAS RESIZE SAFETY NET ─────────────────────────────────────────────────
// Keeps canvas CSS size matching its container when orientation changes.
// The game's logical pixel dimensions (CW × CH) stay fixed; only the CSS
// display size changes, and pos() already handles coordinate mapping.
new ResizeObserver(() => {
  const wrap = document.getElementById('canvas-wrap');
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
}).observe(document.getElementById('canvas-wrap'));

// ── START ─────────────────────────────────────────────────────────────────────
startGame();
</script>
