<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Final Fantasy Legend — Emulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }

    /* ── LANDSCAPE BLOCKER ──────────────────────────────────────────────────── */
    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #06060e;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 9999;
      text-align: center;
    }
    @media (orientation: landscape) {
      #rotate-msg    { display: flex; }
      #gameboy-shell { display: none; }
    }

    /* ── SHELL ──────────────────────────────────────────────────────────────── */
    #gameboy-shell {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #gameboy-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    #controls-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      /* height set via JS after image loads */
    }

    /* ── EMULATOR CONTAINER ─────────────────────────────────────────────────── */
    #emulator-container {
      position: absolute;
      top:  7.5%;
      left: 5%;
      width: 90%;
      height: 43%;
      overflow: hidden;
      background: #000;
    }

    /* Force EmulatorJS canvas to fill container */
    #emulator-container canvas {
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Hide any EmulatorJS UI chrome */
    #emulator-container #game, #emulator-container .ejs_menu_bar,
    #emulator-container .ejs_controls, #emulator-container .ejs_volume_bar {
      display: none !important;
    }

    /* ── NO ROM NOTICE ──────────────────────────────────────────────────────── */
    #no-rom-notice {
      position: absolute;
      top: 7.5%; left: 5%; width: 90%;
      height: 43%;
      background: #06060e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }
    #no-rom-notice .title {
      font-family: 'Black Ops One', sans-serif;
      color: #39ff14;
      font-size: clamp(0.45rem, 1.8vw, 0.75rem);
      text-shadow: 0 0 10px #39ff14;
      text-align: center;
      letter-spacing: 0.05em;
    }
    #no-rom-notice .sub {
      font-family: 'Share Tech Mono', monospace;
      color: #888;
      font-size: clamp(0.35rem, 1.3vw, 0.6rem);
      text-align: center;
      padding: 0 12%;
      line-height: 1.5;
    }

    /* ── TOUCH ZONES ────────────────────────────────────────────────────────── */
    .touch-zone {
      position: absolute;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      border-radius: 4px;
      transition: background 0.06s ease, box-shadow 0.06s ease;
    }

    /* D-pad arms */
    #dpad-up    { top: 67.9%; left: 16.5%;  width: 8.65%; height: 5.52%; }
    #dpad-down  { top: 76.8%; left: 16.5%;  width: 8.65%; height: 5.52%; }
    #dpad-left  { top: 73.1%; left:  5.25%; width: 12%;   height: 4%;    }
    #dpad-right { top: 73.1%; left: 24.25%; width: 12%;   height: 4%;    }

    /* A button */
    #btn-a {
      top: 69.3%; left: 79%; width: 14%;
      aspect-ratio: 1; border-radius: 50%;
    }
    /* B button */
    #btn-b {
      top: 72.8%; left: 63%; width: 14%;
      aspect-ratio: 1; border-radius: 50%;
    }
    /* SELECT */
    #btn-select {
      top: 84.2%; left: 30%; width: 13%; height: 4%;
      border-radius: 20px;
    }
    /* START */
    #btn-start {
      top: 84.2%; left: 47%; width: 13%; height: 4%;
      border-radius: 20px;
    }

    /* ── PRESSED COLORS ─────────────────────────────────────────────────────── */
    #dpad-up.pressed    { background: rgba(  0, 150,   0, 0.55); box-shadow: 0 0 12px rgba(  0,255,  0,0.6); }
    #dpad-down.pressed  { background: rgba(  0,  75,   0, 0.65); box-shadow: 0 0 12px rgba(  0,150,  0,0.6); }
    #dpad-left.pressed  { background: rgba(  0, 255,   0, 0.55); box-shadow: 0 0 12px rgba(  0,255,  0,0.8); }
    #dpad-right.pressed { background: rgba(  0, 100,   0, 0.60); box-shadow: 0 0 12px rgba(  0,200,  0,0.6); }

    #btn-a.pressed      { background: rgba(  0, 107, 153, 0.60); box-shadow: 0 0 14px rgba(  0,162,232,0.7); }
    #btn-b.pressed      { background: rgba(  0, 162, 232, 0.55); box-shadow: 0 0 14px rgba(  0,162,232,0.8); }
    #btn-select.pressed { background: rgba(255, 127,  39, 0.65); box-shadow: 0 0 10px rgba(255,127, 39,0.7); }
    #btn-start.pressed  { background: rgba(130,  65,  20, 0.65); box-shadow: 0 0 10px rgba(200,100, 40,0.7); }

    /* ── DEBUG MODE ──────────────────────────────────────────────────────────
     * Lower specificity (0,0,2,0) than #id.pressed (0,1,1,0) — pressing shows through.
     */
    .debug-mode .touch-zone {
      background: rgba(255, 255, 255, 0.10);
      outline: 1px solid rgba(255, 255, 255, 0.25);
    }
    .debug-mode #emulator-container { outline: 2px solid rgba(255, 0, 0, 0.6); }

    /* ── DBG TOGGLE BUTTON ─────────────────────────────────────────────────── */
    #dbg-btn {
      position: absolute;
      top: 56%; left: 88%;
      transform: translateX(-50%);
      background: rgba(6, 6, 14, 0.65);
      color: rgba(57, 255, 20, 0.6);
      border: 1px solid rgba(57, 255, 20, 0.25);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.3rem, 1.1vw, 0.5rem);
      letter-spacing: 0.08em;
      padding: 3px 7px;
      border-radius: 3px;
      cursor: pointer;
      z-index: 20;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .debug-mode #dbg-btn {
      background: rgba(57, 255, 20, 0.15);
      color: #39ff14;
      border-color: rgba(57, 255, 20, 0.6);
    }

    /* ── OFF / RESET BUTTONS ───────────────────────────────────────────────── */
    #off-btn, #rst-btn {
      position: absolute;
      top: 1.5%;
      background: rgba(6, 6, 14, 0.65);
      color: rgba(57, 255, 20, 0.6);
      border: 1px solid rgba(57, 255, 20, 0.25);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.3rem, 1.1vw, 0.5rem);
      letter-spacing: 0.08em;
      padding: 3px 7px;
      border-radius: 3px;
      cursor: pointer;
      z-index: 20;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #off-btn { left: 2%; }
    #rst-btn { right: 2%; }

    /* ── POWER OFF OVERLAY ─────────────────────────────────────────────────── */
    #poweroff-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 50;
    }
    #poweroff-overlay.active { display: block; }
    #poweroff-popup {
      position: absolute;
      top: 1%;
      left: 1.5%;
      background: rgba(6, 6, 14, 0.97);
      border: 1px solid rgba(57, 255, 20, 0.45);
      border-radius: 4px;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    #poweroff-popup .popup-label {
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      font-size: clamp(0.35rem, 1.3vw, 0.6rem);
      letter-spacing: 0.1em;
      text-shadow: 0 0 8px rgba(57,255,20,0.5);
    }
    #poweroff-yes {
      font-family: 'Share Tech Mono', monospace;
      color: #ff5555;
      border: 1px solid rgba(255, 85, 85, 0.5);
      background: rgba(255, 85, 85, 0.1);
      font-size: clamp(0.3rem, 1.1vw, 0.5rem);
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
  </style>
</head>
<body>

  <!-- Landscape rotation notice -->
  <div id="rotate-msg">
    <div style="font-size:2.5rem;">⟳</div>
    <div>Rotate to portrait mode to play</div>
  </div>

  <!-- Game Boy shell -->
  <div id="gameboy-shell">

    <img id="gameboy-bg" src="img/gameboy.png" alt="" draggable="false">

    <div id="controls-layer">

      <!-- EmulatorJS mounts here -->
      <div id="emulator-container"></div>

      <!-- Debug toggle -->
      <button id="dbg-btn" aria-label="Toggle debug mode">DBG</button>
      <button id="off-btn" aria-label="Power off">⏻</button>
      <button id="rst-btn" aria-label="Reset">↺</button>

      <!-- Touch zones -->
      <div class="touch-zone" id="dpad-up"    data-key="ArrowUp"    aria-label="Up"></div>
      <div class="touch-zone" id="dpad-down"  data-key="ArrowDown"  aria-label="Down"></div>
      <div class="touch-zone" id="dpad-left"  data-key="ArrowLeft"  aria-label="Left"></div>
      <div class="touch-zone" id="dpad-right" data-key="ArrowRight" aria-label="Right"></div>

      <div class="touch-zone" id="btn-a"      data-key="KeyZ"       aria-label="A"></div>
      <div class="touch-zone" id="btn-b"      data-key="KeyX"       aria-label="B"></div>
      <!-- EmulatorJS gambatte: Select = ShiftLeft, Start = Enter -->
      <div class="touch-zone" id="btn-select" data-key="ShiftLeft"  aria-label="Select"></div>
      <div class="touch-zone" id="btn-start"  data-key="Enter"      aria-label="Start"></div>

    </div><!-- end #controls-layer -->

    <div id="poweroff-overlay">
      <div id="poweroff-popup">
        <div class="popup-label">POWER OFF?</div>
        <button id="poweroff-yes">POWER OFF</button>
      </div>
    </div>
  </div><!-- end #gameboy-shell -->

  <script>
    // ── DEBUG MODE ────────────────────────────────────────────────────────────
    if (new URLSearchParams(location.search).has('debug')) {
      document.body.classList.add('debug-mode');
    }

    const dbgBtn = document.getElementById('dbg-btn');
    dbgBtn.addEventListener('touchstart',  e => { e.stopPropagation(); e.preventDefault(); }, { passive: false });
    dbgBtn.addEventListener('touchend',    e => { e.stopPropagation(); e.preventDefault(); document.body.classList.toggle('debug-mode'); }, { passive: false });
    dbgBtn.addEventListener('click',       ()  => document.body.classList.toggle('debug-mode'));

    // ── IMAGE → CONTROLS LAYER SIZING ─────────────────────────────────────────
    const img   = document.getElementById('gameboy-bg');
    const layer = document.getElementById('controls-layer');

    function syncLayerHeight() {
      const h = img.getBoundingClientRect().height;
      if (h > 0) layer.style.height = h + 'px';
    }
    img.addEventListener('load', syncLayerHeight);
    if (img.complete && img.naturalHeight > 0) syncLayerHeight();
    window.addEventListener('resize', syncLayerHeight, { passive: true });

    // ── TOUCH INPUT ───────────────────────────────────────────────────────────
    const heldKeys = new Set();

    function keyDown(code) {
      if (heldKeys.has(code)) return;
      heldKeys.add(code);
      window.dispatchEvent(new KeyboardEvent('keydown', { code, key: codeToKey(code), bubbles: true }));
      if (['KeyZ', 'KeyX', 'ShiftLeft', 'Enter'].every(k => heldKeys.has(k))) resetGame();
    }

    function keyUp(code) {
      if (!heldKeys.has(code)) return;
      heldKeys.delete(code);
      window.dispatchEvent(new KeyboardEvent('keyup', { code, key: codeToKey(code), bubbles: true }));
    }

    // EmulatorJS may listen on e.key rather than e.code for some bindings
    function codeToKey(code) {
      const map = {
        ArrowUp: 'ArrowUp', ArrowDown: 'ArrowDown',
        ArrowLeft: 'ArrowLeft', ArrowRight: 'ArrowRight',
        KeyZ: 'z', KeyX: 'x',
        Enter: 'Enter', ShiftLeft: 'Shift',
      };
      return map[code] || code;
    }

    const touchZones = Array.from(document.querySelectorAll('.touch-zone[data-key]'));
    const touchState = new Map(); // touchId → Set<element> pressed by that finger

    function zonesAt(x, y) {
      return touchZones.filter(el => {
        const r = el.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      });
    }

    function pressedByOther(zone, excludeId) {
      for (const [id, set] of touchState) {
        if (id !== excludeId && set.has(zone)) return true;
      }
      return false;
    }

    function applyTouch(id, x, y) {
      const next = new Set(zonesAt(x, y));
      const prev = touchState.get(id) ?? new Set();
      for (const zone of next) {
        if (!prev.has(zone)) { zone.classList.add('pressed'); keyDown(zone.dataset.key); }
      }
      for (const zone of prev) {
        if (!next.has(zone) && !pressedByOther(zone, id)) {
          zone.classList.remove('pressed'); keyUp(zone.dataset.key);
        }
      }
      touchState.set(id, next);
    }

    function releaseTouch(id) {
      const zones = touchState.get(id) ?? new Set();
      touchState.delete(id);
      for (const zone of zones) {
        if (!pressedByOther(zone, id)) {
          zone.classList.remove('pressed'); keyUp(zone.dataset.key);
        }
      }
    }

    document.addEventListener('touchstart',  e => { e.preventDefault(); for (const t of e.changedTouches) applyTouch(t.identifier, t.clientX, t.clientY); }, { passive: false });
    document.addEventListener('touchmove',   e => { e.preventDefault(); for (const t of e.changedTouches) applyTouch(t.identifier, t.clientX, t.clientY); }, { passive: false });
    document.addEventListener('touchend',    e => { e.preventDefault(); for (const t of e.changedTouches) releaseTouch(t.identifier); }, { passive: false });
    document.addEventListener('touchcancel', e => {                      for (const t of e.changedTouches) releaseTouch(t.identifier); }, { passive: false });

    // ── RESET ─────────────────────────────────────────────────────────────────
    function resetGame() {
      const COMBO = ['KeyZ', 'KeyX', 'ShiftLeft', 'Enter'];
      COMBO.forEach(code => window.dispatchEvent(new KeyboardEvent('keydown', { code, key: codeToKey(code), bubbles: true })));
      setTimeout(() => COMBO.forEach(code => window.dispatchEvent(new KeyboardEvent('keyup', { code, key: codeToKey(code), bubbles: true }))), 100);
    }

    // ── OFF / RESET BUTTONS ───────────────────────────────────────────────────
    function bindBtn(el, fn) {
      el.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); }, { passive: false });
      el.addEventListener('touchend',   e => { e.stopPropagation(); e.preventDefault(); fn(); }, { passive: false });
      el.addEventListener('click', fn);
    }

    const offBtn  = document.getElementById('off-btn');
    const rstBtn  = document.getElementById('rst-btn');
    const poOvl   = document.getElementById('poweroff-overlay');
    const poPopup = document.getElementById('poweroff-popup');
    const poYes   = document.getElementById('poweroff-yes');

    bindBtn(offBtn, () => poOvl.classList.add('active'));
    bindBtn(rstBtn, resetGame);
    bindBtn(poYes,  () => { window.location.href = 'index.html'; });

    poOvl.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); }, { passive: false });
    poOvl.addEventListener('touchend',   e => { e.stopPropagation(); e.preventDefault(); if (e.target === poOvl) poOvl.classList.remove('active'); }, { passive: false });
    poOvl.addEventListener('click',      e => { if (e.target === poOvl) poOvl.classList.remove('active'); });
    poPopup.addEventListener('touchstart', e => e.stopPropagation(), { passive: false });
    poPopup.addEventListener('touchend',   e => e.stopPropagation(), { passive: false });
    poPopup.addEventListener('click',      e => e.stopPropagation());

    // ── ROM CHECK + EMULATORJS BOOTSTRAP ─────────────────────────────────────
    // EmulatorJS config must be set before loader.js is appended.
    // ROM must be served from same origin or CORS-enabled location.
    const ROM_PATH = 'rom/ffl1.gb';

    fetch(ROM_PATH, { method: 'HEAD' })
      .then(r => {
        if (!r.ok) throw new Error('ROM not found');
        startEmulator();
      })
      .catch(() => showNoRom());

    function startEmulator() {
      window.EJS_player        = '#emulator-container';
      window.EJS_gameUrl       = ROM_PATH;
      window.EJS_core          = 'gambatte';
      window.EJS_pathtodata    = 'https://cdn.emulatorjs.org/stable/data/';
      window.EJS_VirtualGamepad = false;
      window.EJS_startOnLoaded = true;
      window.EJS_fullscreenOnLoaded = false;
      window.EJS_Buttons = {
        playPause: false, restart: false, mute: false,
        settings: false, fullscreen: false, saveState: false,
        loadState: false, screenRecord: false, gamepad: false,
        cheat: false, volume: false,
      };

      const s = document.createElement('script');
      s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
      document.body.appendChild(s);
    }

    function showNoRom() {
      const notice = document.createElement('div');
      notice.id = 'no-rom-notice';
      notice.innerHTML = `
        <div class="title">EMULATOR</div>
        <div class="sub">ROM file not found.<br>Place the ROM at FFL1/rom/ffl1.gb to enable emulation.</div>
      `;
      layer.appendChild(notice);
    }
  </script>
</body>
</html>
