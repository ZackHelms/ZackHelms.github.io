<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Final Fantasy Legend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }

    /* ── LANDSCAPE BLOCKER ──────────────────────────────────────────────────── */
    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #06060e;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 9999;
      text-align: center;
    }
    @media (orientation: landscape) {
      #rotate-msg    { display: flex; }
      #gameboy-shell { display: none; }
    }

    /* ── SHELL: fixed viewport box, clips anything below ────────────────────── */
    #gameboy-shell {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /*
     * ── GAME BOY BACKGROUND IMAGE ─────────────────────────────────────────────
     * Top-left of image = top-left of page, 0px margin.
     * Width = 100% of shell (= viewport width).
     * Height = auto → image maintains its own aspect ratio.
     * Bottom of image may extend below viewport (clipped by shell overflow:hidden).
     */
    #gameboy-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /*
     * ── CONTROLS LAYER ───────────────────────────────────────────────────────
     * Same top-left origin and width as the image.
     * Height is set by JS to match the image's rendered height so that
     * percentage positions of children correspond to % of image dimensions.
     */
    #controls-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      /* height set via JS after image loads */
    }

    /*
     * ── GAME CANVAS ──────────────────────────────────────────────────────────
     * Positioned over the screen area in the Game Boy image.
     * Percentages are relative to #controls-layer (= image dimensions).
     * aspect-ratio: 160/144 matches the original Game Boy screen.
     * Width 85% × image_width fills the screen area; height is auto-calculated
     * from the aspect ratio, so it matches the 10:9 screen in the image.
     */
    #gameCanvas {
      position: absolute;
      top:  8.5%;
      left: 7.5%;
      width: 85%;
      aspect-ratio: 160 / 144;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* ── LOADING OVERLAY (inside screen area) ─────────────────────────────── */
    #load-overlay {
      position: absolute;
      top: 8.5%; left: 7.5%; width: 85%;
      aspect-ratio: 160 / 144;
      background: #06060e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }
    #load-title {
      font-family: 'Black Ops One', sans-serif;
      color: #39ff14;
      font-size: clamp(0.55rem, 2.2vw, 0.9rem);
      text-shadow: 0 0 10px #39ff14;
      text-align: center;
      letter-spacing: 0.05em;
    }
    #load-bar-wrap {
      width: 65%; height: 3px;
      background: #1a1a30; border-radius: 2px; overflow: hidden;
    }
    #load-bar-inner {
      height: 100%; width: 0%;
      background: #39ff14;
      box-shadow: 0 0 6px #39ff14;
      transition: width 0.3s ease;
    }

    /* ── TOUCH ZONES ─────────────────────────────────────────────────────────
     * All positions are % of #controls-layer (= % of image dimensions).
     * Invisible by default; pressed state shows a pronounced color flash.
     *
     * Add URL param ?debug to see outlines:  tythos.com/FFL1/game.html?debug
     *
     * D-PAD LAYOUT (4 separate rectangular arms):
     *
     *         [ UP  ]
     *  [LEFT] [     ] [RIGHT]
     *         [DOWN ]
     *
     * Positions below match the green squares in the annotated image.
     */
    .touch-zone {
      position: absolute;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      border-radius: 4px;
      transition: background 0.06s ease, box-shadow 0.06s ease;
    }

    /* D-pad arms */
    #dpad-up    { top: 68%;   left: 15%;  width: 12%; height: 4%;  }
    #dpad-down  { top: 78%;   left: 16%;  width: 12%; height: 4%;  }
    #dpad-left  { top: 72.5%; left:  6%;  width: 12%; height: 4%;  }
    #dpad-right { top: 72.5%; left: 26%;  width: 12%; height: 4%;  }

    /* A button (right, dark blue in annotation) */
    #btn-a {
      top: 69.5%; left: 80%; width: 14%;
      aspect-ratio: 1; border-radius: 50%;
    }
    /* B button (left, light blue in annotation) */
    #btn-b {
      top: 73%; left: 64%; width: 14%;
      aspect-ratio: 1; border-radius: 50%;
    }
    /* SELECT (orange in annotation) */
    #btn-select {
      top: 83.5%; left: 30%; width: 13%; height: 4%;
      border-radius: 20px;
    }
    /* START (dark brown in annotation) */
    #btn-start {
      top: 83.5%; left: 47%; width: 13%; height: 4%;
      border-radius: 20px;
    }

    /* ── PRESSED STATE COLORS ─────────────────────────────────────────────────
     * Colors match the annotation colors from the user's reference image.
     * Opacity is pronounced (0.55) so the tap is clearly visible.
     */
    #dpad-up.pressed    { background: rgba(  0, 150,   0, 0.55); box-shadow: 0 0 12px rgba(  0,255,  0,0.6); }
    #dpad-down.pressed  { background: rgba(  0,  75,   0, 0.65); box-shadow: 0 0 12px rgba(  0,150,  0,0.6); }
    #dpad-left.pressed  { background: rgba(  0, 255,   0, 0.55); box-shadow: 0 0 12px rgba(  0,255,  0,0.8); }
    #dpad-right.pressed { background: rgba(  0, 100,   0, 0.60); box-shadow: 0 0 12px rgba(  0,200,  0,0.6); }

    #btn-a.pressed      { background: rgba(  0, 107, 153, 0.60); box-shadow: 0 0 14px rgba(  0,162,232,0.7); }
    #btn-b.pressed      { background: rgba(  0, 162, 232, 0.55); box-shadow: 0 0 14px rgba(  0,162,232,0.8); }
    #btn-select.pressed { background: rgba(255, 127,  39, 0.65); box-shadow: 0 0 10px rgba(255,127, 39,0.7); }
    #btn-start.pressed  { background: rgba(130,  65,  20, 0.65); box-shadow: 0 0 10px rgba(200,100, 40,0.7); }

    /* ── DEBUG MODE (add ?debug to URL) ─────────────────────────────────────── */
    body.debug-mode #dpad-up    { outline: 2px solid rgba(  0,150,  0,0.8); background: rgba(  0,150,  0,0.15); }
    body.debug-mode #dpad-down  { outline: 2px solid rgba(  0, 75,  0,0.8); background: rgba(  0, 75,  0,0.15); }
    body.debug-mode #dpad-left  { outline: 2px solid rgba(  0,255,  0,0.8); background: rgba(  0,255,  0,0.15); }
    body.debug-mode #dpad-right { outline: 2px solid rgba(  0,100,  0,0.8); background: rgba(  0,100,  0,0.15); }
    body.debug-mode #btn-a      { outline: 2px solid rgba(  0,107,153,0.8); background: rgba(  0,107,153,0.15); }
    body.debug-mode #btn-b      { outline: 2px solid rgba(  0,162,232,0.8); background: rgba(  0,162,232,0.15); }
    body.debug-mode #btn-select { outline: 2px solid rgba(255,127, 39,0.8); background: rgba(255,127, 39,0.15); }
    body.debug-mode #btn-start  { outline: 2px solid rgba(130, 65, 20,0.8); background: rgba(130, 65, 20,0.15); }
    body.debug-mode #gameCanvas { outline: 2px solid rgba(255,  0,  0,0.6); }
  </style>
</head>
<body>

  <!-- Landscape rotation notice -->
  <div id="rotate-msg">
    <div style="font-size:2.5rem;">⟳</div>
    <div>Rotate to portrait mode to play</div>
  </div>

  <!-- Game Boy shell -->
  <div id="gameboy-shell">

    <!--
      Place your Game Boy PNG at:  FFL1/img/gameboy.png
      The image top-left aligns to the page top-left (0px margin).
      It fills the full viewport width and its natural aspect ratio determines
      the height — the bottom may extend off-screen, which is intentional.
    -->
    <img id="gameboy-bg" src="img/gameboy.png" alt="" draggable="false">

    <!--
      Controls layer: same coordinate space as the image.
      All child % positions map directly to % of image dimensions.
      Height is set by JS after the image loads.
    -->
    <div id="controls-layer">

      <!-- Game canvas — positioned over the screen area -->
      <canvas id="gameCanvas" width="640" height="480"></canvas>

      <!-- Loading overlay (covers screen area during engine boot) -->
      <div id="load-overlay">
        <div id="load-title">FINAL FANTASY LEGEND</div>
        <div id="load-bar-wrap"><div id="load-bar-inner"></div></div>
      </div>

      <!--
        Touch control zones.
        D-pad: 4 SEPARATE arms — up / down / left / right.
        Buttons: A (confirm/KeyZ), B (cancel/KeyX), Select (Escape), Start (Enter).

        Keyboard equivalents (desktop):
          W/A/S/D = directions   K = A   J = B   H = Start   F = Select
          Arrow keys also work.
      -->

      <!-- D-pad arms (4 individual tap zones) -->
      <div class="touch-zone" id="dpad-up"    data-key="ArrowUp"    aria-label="Up"></div>
      <div class="touch-zone" id="dpad-down"  data-key="ArrowDown"  aria-label="Down"></div>
      <div class="touch-zone" id="dpad-left"  data-key="ArrowLeft"  aria-label="Left"></div>
      <div class="touch-zone" id="dpad-right" data-key="ArrowRight" aria-label="Right"></div>

      <!-- Action buttons -->
      <div class="touch-zone" id="btn-a"      data-key="KeyZ"   aria-label="A"></div>
      <div class="touch-zone" id="btn-b"      data-key="KeyX"   aria-label="B"></div>
      <div class="touch-zone" id="btn-select" data-key="Escape" aria-label="Select"></div>
      <div class="touch-zone" id="btn-start"  data-key="Enter"  aria-label="Start"></div>

    </div><!-- end #controls-layer -->
  </div><!-- end #gameboy-shell -->

  <script type="module">
    import { Engine } from './js/engine.js';

    // ── DEBUG MODE ────────────────────────────────────────────────────────────
    if (new URLSearchParams(location.search).has('debug')) {
      document.body.classList.add('debug-mode');
    }

    // ── IMAGE → CONTROLS LAYER SIZING ─────────────────────────────────────────
    // After the image loads (or if already cached), set controls-layer height
    // to match the image's rendered height so that % positions inside it
    // correspond exactly to % of image dimensions.
    const img = document.getElementById('gameboy-bg');
    const layer = document.getElementById('controls-layer');

    function syncLayerHeight() {
      const h = img.getBoundingClientRect().height;
      if (h > 0) layer.style.height = h + 'px';
    }

    img.addEventListener('load', syncLayerHeight);
    // Image might already be cached
    if (img.complete && img.naturalHeight > 0) syncLayerHeight();
    // Re-sync if window somehow resizes (e.g. soft keyboard)
    window.addEventListener('resize', syncLayerHeight, { passive: true });

    // ── TOUCH INPUT ───────────────────────────────────────────────────────────
    // Synthesise keyboard events using the e.code values the engine already polls.
    // Each touch zone has data-key set to the target code.
    const heldKeys = new Set();

    function keyDown(code) {
      if (heldKeys.has(code)) return;
      heldKeys.add(code);
      window.dispatchEvent(new KeyboardEvent('keydown', { code, bubbles: true }));
    }

    function keyUp(code) {
      if (!heldKeys.has(code)) return;
      heldKeys.delete(code);
      window.dispatchEvent(new KeyboardEvent('keyup', { code, bubbles: true }));
    }

    // Wire up all touch zones (including all 4 d-pad arms — they each have data-key)
    document.querySelectorAll('.touch-zone[data-key]').forEach(el => {
      const code = el.dataset.key;

      el.addEventListener('touchstart', e => {
        e.preventDefault();
        el.classList.add('pressed');
        keyDown(code);
      }, { passive: false });

      const release = e => {
        e.preventDefault();
        el.classList.remove('pressed');
        keyUp(code);
      };
      el.addEventListener('touchend',    release, { passive: false });
      el.addEventListener('touchcancel', release, { passive: false });

      // If a touch slides off the element, release it
      el.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = el.getBoundingClientRect();
        const inside = t.clientX >= rect.left && t.clientX <= rect.right &&
                       t.clientY >= rect.top  && t.clientY <= rect.bottom;
        if (!inside) {
          el.classList.remove('pressed');
          keyUp(code);
        }
      }, { passive: false });
    });

    // Block scroll / multi-touch zoom
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    // ── ENGINE STARTUP ────────────────────────────────────────────────────────
    const canvas    = document.getElementById('gameCanvas');
    const overlay   = document.getElementById('load-overlay');
    const loadBar   = document.getElementById('load-bar-inner');
    const loadTitle = document.getElementById('load-title');

    let prog = 0;
    const ticker = setInterval(() => {
      prog = Math.min(prog + (85 - prog) * 0.07, 84);
      loadBar.style.width = prog + '%';
    }, 80);

    try {
      const engine = new Engine(canvas);
      await engine.start();

      clearInterval(ticker);
      loadBar.style.width = '100%';
      await new Promise(r => setTimeout(r, 200));
      overlay.style.transition = 'opacity 0.35s';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 380);

    } catch (err) {
      clearInterval(ticker);
      loadBar.style.background = '#ff4455';
      loadBar.style.width = '100%';
      loadTitle.textContent = err.message;
      console.error(err);
    }
  </script>
</body>
</html>
