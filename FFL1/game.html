<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Final Fantasy Legend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── LANDSCAPE BLOCKER ── */
    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #06060e;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 9999;
      text-align: center;
    }
    @media (orientation: landscape) {
      #rotate-msg    { display: flex; }
      #gameboy-shell { display: none; }
    }

    /* ── GAME BOY SHELL ── */
    #gameboy-shell {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Background image stretches to exact viewport (preserving user's stretched proportions) */
    #gameboy-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /*
     * ── GAME CANVAS ──
     * Positioned over the screen area in the Game Boy image.
     * Percentages are relative to the viewport (= image) dimensions.
     * The screen aspect ratio matches the original GB screen (160:144 ≈ 10:9).
     * Adjust top/left/width if your image crops differently.
     */
    #gameCanvas {
      position: absolute;
      top:  8.5%;   /* distance from top of image to top of screen bezel */
      left: 7.5%;   /* distance from left edge to screen */
      width: 85%;   /* screen width as % of image width */
      aspect-ratio: 160 / 144;   /* original GB screen ratio — height auto-calculated */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* ── LOADING OVERLAY (inside screen area) ── */
    #load-overlay {
      position: absolute;
      top: 8.5%; left: 7.5%; width: 85%;
      aspect-ratio: 160 / 144;
      background: #06060e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }
    #load-title {
      font-family: 'Black Ops One', sans-serif;
      color: #39ff14;
      font-size: clamp(0.6rem, 2.5vw, 1rem);
      text-shadow: 0 0 10px #39ff14;
      text-align: center;
      letter-spacing: 0.05em;
    }
    #load-bar-wrap {
      width: 65%;
      height: 3px;
      background: #1a1a30;
      border-radius: 2px;
      overflow: hidden;
    }
    #load-bar-inner {
      height: 100%;
      width: 0%;
      background: #39ff14;
      box-shadow: 0 0 6px #39ff14;
      transition: width 0.3s ease;
    }

    /*
     * ── TOUCH CONTROLS ──
     * Transparent hitboxes positioned over the physical buttons in the image.
     * All positions are percentages of the viewport (= image) dimensions.
     *
     * To debug / tune positions, add class "debug" to any .touch-zone in the HTML.
     */
    .touch-zone {
      position: absolute;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .touch-zone.pressed {
      background: rgba(57, 255, 20, 0.12);
    }
    /* show outlines during layout tuning */
    .touch-zone.debug {
      outline: 2px solid rgba(255, 0, 0, 0.6);
      background: rgba(255, 0, 0, 0.1);
    }

    /*
     * D-pad — black cross on the lower-left of the Game Boy body.
     * The single zone handles all four directions; direction is computed
     * from touch angle relative to the zone's center.
     */
    #dpad {
      top:  61.5%;
      left: 7%;
      width: 27%;
      aspect-ratio: 1;
      border-radius: 6px;
    }

    /* A button — red circle, right side, slightly higher than B */
    #btn-a {
      top:  59%;
      left: 68%;
      width: 14%;
      aspect-ratio: 1;
      border-radius: 50%;
    }

    /* B button — pink/maroon circle, left of A, slightly lower */
    #btn-b {
      top:  64%;
      left: 53%;
      width: 14%;
      aspect-ratio: 1;
      border-radius: 50%;
    }

    /* SELECT — small rectangular button, left of center bottom */
    #btn-select {
      top:  75%;
      left: 31%;
      width: 14%;
      height: 3.5%;
      border-radius: 20px;
    }

    /* START — small rectangular button, right of SELECT */
    #btn-start {
      top:  75%;
      left: 49%;
      width: 14%;
      height: 3.5%;
      border-radius: 20px;
    }

    /* ── DESKTOP FALLBACK NAV ──
       Shown only when not on a mobile viewport (landscape on a real screen).
       The rotate-msg handles true landscape mobile devices.
    */
    #desktop-nav {
      display: none;
    }
    @media (min-width: 600px) and (orientation: portrait) {
      /* wide portrait (tablet) — keep shell but show nav strip at top */
    }
  </style>
</head>
<body>

  <!-- Landscape orientation blocker -->
  <div id="rotate-msg">
    <div style="font-size:2.5rem;">⟳</div>
    <div>Rotate to portrait mode to play</div>
  </div>

  <!-- Game Boy shell -->
  <div id="gameboy-shell">

    <!--
      Game Boy background image.
      Save your image to:  FFL1/img/gameboy.png
      It should be the portrait-stretched Game Boy PNG you provided.
    -->
    <img id="gameboy-bg" src="img/gameboy.png" alt="" draggable="false">

    <!-- Game canvas — rendered in the screen area -->
    <canvas id="gameCanvas" width="640" height="480"></canvas>

    <!-- Loading overlay (covers screen area while engine boots) -->
    <div id="load-overlay">
      <div id="load-title">FINAL FANTASY LEGEND</div>
      <div id="load-bar-wrap"><div id="load-bar-inner"></div></div>
    </div>

    <!--
      Touch control zones.
      Remove class="debug" once positions look right on your device.
      data-key values correspond to e.code strings the engine already understands:
        ArrowUp/Down/Left/Right — movement (d-pad handled specially)
        KeyZ   — A button (confirm/action)
        KeyX   — B button (cancel/back)
        Enter  — Start
        Escape — Select
    -->
    <div id="dpad"       class="touch-zone" aria-label="D-pad"></div>
    <div id="btn-a"      class="touch-zone" data-key="KeyZ"   aria-label="A"></div>
    <div id="btn-b"      class="touch-zone" data-key="KeyX"   aria-label="B"></div>
    <div id="btn-select" class="touch-zone" data-key="Escape" aria-label="Select"></div>
    <div id="btn-start"  class="touch-zone" data-key="Enter"  aria-label="Start"></div>

  </div><!-- end #gameboy-shell -->

  <script type="module">
    import { Engine } from './js/engine.js';

    // ── TOUCH INPUT SYSTEM ────────────────────────────────────────────────────
    //
    // We fire synthetic KeyboardEvents using the same e.code strings the engine
    // polls via _pressed(). Touch events preventDefault() to block scroll/zoom.

    const heldKeys = new Set();

    function keyDown(code) {
      if (heldKeys.has(code)) return;
      heldKeys.add(code);
      window.dispatchEvent(new KeyboardEvent('keydown', { code, bubbles: true }));
    }

    function keyUp(code) {
      if (!heldKeys.has(code)) return;
      heldKeys.delete(code);
      window.dispatchEvent(new KeyboardEvent('keyup', { code, bubbles: true }));
    }

    // ── D-PAD ────────────────────────────────────────────────────────────────
    // Single zone; direction computed from angle to zone center.
    // Diagonal touches snap to the axis with greater magnitude.

    let dpadDir = null;

    function dirFromTouch(touch, rect) {
      const dx = touch.clientX - (rect.left + rect.width  / 2);
      const dy = touch.clientY - (rect.top  + rect.height / 2);
      const dead = Math.min(rect.width, rect.height) * 0.12;
      if (Math.hypot(dx, dy) < dead) return null;
      return Math.abs(dx) >= Math.abs(dy)
        ? (dx > 0 ? 'ArrowRight' : 'ArrowLeft')
        : (dy > 0 ? 'ArrowDown'  : 'ArrowUp');
    }

    const dpadEl = document.getElementById('dpad');

    function onDpadTouch(e) {
      e.preventDefault();
      const rect = dpadEl.getBoundingClientRect();
      const dir  = dirFromTouch(e.touches[0], rect);
      if (dir !== dpadDir) {
        if (dpadDir) keyUp(dpadDir);
        dpadDir = dir;
        if (dir)  keyDown(dir);
      }
      dpadEl.classList.toggle('pressed', dir !== null);
    }

    function onDpadEnd(e) {
      e.preventDefault();
      if (dpadDir) { keyUp(dpadDir); dpadDir = null; }
      dpadEl.classList.remove('pressed');
    }

    dpadEl.addEventListener('touchstart',  onDpadTouch,  { passive: false });
    dpadEl.addEventListener('touchmove',   onDpadTouch,  { passive: false });
    dpadEl.addEventListener('touchend',    onDpadEnd,    { passive: false });
    dpadEl.addEventListener('touchcancel', onDpadEnd,    { passive: false });

    // ── BUTTONS (A, B, SELECT, START) ─────────────────────────────────────────
    document.querySelectorAll('.touch-zone[data-key]').forEach(el => {
      const code = el.dataset.key;

      el.addEventListener('touchstart', e => {
        e.preventDefault();
        el.classList.add('pressed');
        keyDown(code);
      }, { passive: false });

      const release = e => {
        e.preventDefault();
        el.classList.remove('pressed');
        keyUp(code);
      };
      el.addEventListener('touchend',    release, { passive: false });
      el.addEventListener('touchcancel', release, { passive: false });
    });

    // Block scroll / pinch zoom on the whole page
    document.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });
    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault(); // block pinch
    }, { passive: false });

    // ── ENGINE STARTUP ─────────────────────────────────────────────────────────
    const canvas   = document.getElementById('gameCanvas');
    const overlay  = document.getElementById('load-overlay');
    const loadBar  = document.getElementById('load-bar-inner');
    const loadTitle= document.getElementById('load-title');

    // Animate the load bar
    let prog = 0;
    const ticker = setInterval(() => {
      prog = Math.min(prog + (85 - prog) * 0.07, 84);
      loadBar.style.width = prog + '%';
    }, 80);

    try {
      const engine = new Engine(canvas);
      await engine.start();

      clearInterval(ticker);
      loadBar.style.width = '100%';
      await new Promise(r => setTimeout(r, 200));
      overlay.style.transition = 'opacity 0.35s';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 380);

    } catch (err) {
      clearInterval(ticker);
      loadBar.style.background = '#ff4455';
      loadBar.style.width = '100%';
      loadTitle.textContent = err.message;
      console.error(err);
    }
  </script>
</body>
</html>
