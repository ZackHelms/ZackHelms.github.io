<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LowRes Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-family: monospace;
      touch-action: none;
    }

    /* ── Layout shells ── */
    #app {
      display: flex;
      width: 100%; height: 100%;
    }

    /* Portrait: column layout — screen on top, controls below */
    @media (orientation: portrait) {
      #app { flex-direction: column; align-items: center; }
      #screen-wrap {
        flex: 1 1 auto;
        display: flex;
        align-items: flex-start;
        padding-top: var(--portrait-margin-top, 8px);
        justify-content: center;
        width: 100%;
      }
      #controls { flex: 0 0 auto; width: 100%; }
      #controls-portrait { display: flex; flex-direction: column; width: 100%; }
      #controls-landscape { display: none; }
    }

    /* Landscape: screen centered, side panels fixed over it */
    @media (orientation: landscape) {
      #app { flex-direction: row; align-items: center; justify-content: center; }
      #screen-wrap { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; }
      #controls { display: none; }
      #controls-portrait { display: none; }
      #controls-landscape { display: flex; }
    }

    /* ── Canvas + frame ── */
    #screen-frame {
      background: #2a2a2a;
      padding: var(--game-screen-margin, 4px);
      display: inline-block;
      line-height: 0;
    }
    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* ── Portrait control rows ── */
    .ctrl-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      width: 100%;
    }

    .debug-separator {
      display: none;
      height: 1px;
      background: #444;
      width: 100%;
      margin: var(--portrait-btn-divider-offset, 4px) 0;
    }

    /* Lower controls group: Select/Start + Reset/Reload/Debug */
    #controls-lower {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding-bottom: var(--controls-lower-bottom-pad, 0px);
    }

    .ctrl-row-meta {
      display: flex;
      justify-content: center;
      padding: 6px 16px 2px;
      width: 100%;
    }

    .ctrl-row-util {
      display: flex;
      justify-content: center;
      padding: 4px 16px 8px;
      width: 100%;
    }

    /* ── D-pad (10% bigger: 40→44px cells) ── */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 2px;
    }
    .dpad-btn {
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #eee;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .dpad-center { background: #222; border-color: #222; }

    /* ── Action / meta buttons ── */
    .action-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .meta-group {
      display: flex;
      gap: 8px;
    }
    .util-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    /* Round buttons (A, B): 20% bigger — 40→48px */
    .btn-round {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px solid #555;
      background: #333;
      color: #eee;
      font-size: 11px;
      font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn-a { background: #5a1a1a; border-color: #c03030; }
    .btn-b { background: #1a3a1a; border-color: #30a030; margin-top: 24px; }

    /* Select / Start pill buttons: 44×22 → 62×26px */
    .btn-meta {
      width: 62px; height: 26px;
      border-radius: 13px;
      font-size: 8px;
      white-space: nowrap;
    }

    /* B + A horizontal: gap = half of A diameter (48/2 = 24px) */
    .btn-ab-group {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
    }

    /* Utility buttons (Reset / Reload / Debug): 44×20 → 62×24px */
    .btn-util {
      width: 62px; height: 24px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #666;
      font-size: 8px;
      font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      white-space: nowrap;
    }

    /* Debug button "on" state */
    .debug-btn-active {
      border-color: orange !important;
      color: orange !important;
      background: #1a1500 !important;
    }

    /* ── Button active state (pointer held) ── */
    .btn-active {
      background: #555 !important;
      outline: 2px solid red;
      outline-offset: 2px;
    }

    /* ── Debug mode: highlight all tap targets ── */
    body.debug-mode .tap-target {
      outline: 1px solid orange;
      background-color: rgba(255, 165, 0, 0.2) !important;
    }
    body.debug-mode .tap-target.btn-active {
      outline: 2px solid red;
      outline-offset: 2px;
    }
    body.debug-mode .debug-separator {
      display: block;
    }

    /* ── Landscape side panels ── */
    #controls-landscape {
      height: 100%;
      flex-direction: row;
      align-items: stretch;
      width: 100%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      justify-content: space-between;
    }
    #controls-landscape > * { pointer-events: auto; }

    .side-left {
      width: 140px;
      display: flex; align-items: center; justify-content: center;
    }
    .side-right {
      width: 150px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 20px 10px;
    }
    .side-spacer { flex: 1; pointer-events: none; }

    /* ── Start menu (overlay + dialog) ── */
    #menu-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(20, 20, 24, 0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 12px;
    }
    #menu-overlay[hidden] { display: none; }
    #menu-dialog {
      background: #1a1a1a;
      border: 2px solid #555;
      border-radius: 8px;
      width: min(90vw, 320px);
      max-height: 86vh;
      overflow-y: auto;
      color: #eee;
      box-shadow: 0 6px 28px rgba(0, 0, 0, 0.6);
    }
    #menu-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #333;
    }
    #menu-title { font-weight: bold; font-size: 14px; }
    #menu-close {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; color: #aaa; cursor: pointer; font-size: 16px;
    }
    #menu-close:hover { background: #333; color: #fff; }
    #menu-body { padding: 12px; }
    .menu-view[hidden] { display: none; }
    .menu-opt, .menu-actions button {
      display: block; width: 100%; margin: 6px 0; padding: 10px;
      background: #333; border: 1px solid #555; border-radius: 6px;
      color: #eee; font-family: monospace; font-size: 13px; cursor: pointer;
    }
    .menu-opt:hover, .menu-actions button:hover { background: #444; }
    #menu-status { min-height: 16px; margin-top: 8px; font-size: 11px; color: #8bac0f; text-align: center; }
    .settings-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .settings-row label { font-size: 11px; color: #aaa; }
    .settings-row input, .settings-row select {
      background: #0e0e0e; border: 1px solid #555; border-radius: 4px;
      color: #eee; font-family: monospace; font-size: 12px; padding: 6px;
    }
    .menu-actions { display: flex; gap: 8px; margin-top: 6px; }
    .menu-actions button { margin: 0; }
  </style>
</head>
<body>
<div id="app">

  <div id="screen-wrap">
    <div id="screen-frame">
      <canvas id="game-canvas"></canvas>
    </div>
  </div>

  <!-- ── Portrait controls (below screen) ── -->
  <div id="controls">
    <div id="controls-portrait">

      <!-- Row 1: D-pad left, A/B right -->
      <div class="ctrl-row-top">
        <div class="dpad" id="dpad-portrait">
          <div></div>
          <div class="dpad-btn tap-target" id="btn-up">▲</div>
          <div></div>
          <div class="dpad-btn tap-target" id="btn-left-p">◀</div>
          <div class="dpad-center"></div>
          <div class="dpad-btn tap-target" id="btn-right-p">▶</div>
          <div></div>
          <div class="dpad-btn tap-target" id="btn-down-p">▼</div>
          <div></div>
        </div>
        <div class="btn-ab-group">
          <div class="btn-round btn-b tap-target" id="btn-b">B</div>
          <div class="btn-round btn-a tap-target" id="btn-a">A</div>
        </div>
      </div>

      <!-- Debug separator (only visible in debug mode) -->
      <div class="debug-separator"></div>

      <!-- Lower group: Select/Start + Reset/Reload/Debug -->
      <div id="controls-lower">

        <!-- Row 2: Select + Start -->
        <div class="ctrl-row-meta">
          <div class="meta-group">
            <div class="btn-round btn-meta tap-target" id="btn-select">Select</div>
            <div class="btn-round btn-meta tap-target" id="btn-start">Start</div>
          </div>
        </div>

        <!-- Row 3: Reload + Debug -->
        <div class="ctrl-row-util">
          <div class="util-group">
            <div class="btn-util tap-target" id="btn-reload">Reload</div>
            <div class="btn-util tap-target" id="btn-debug">Debug</div>
          </div>
        </div>

      </div>

    </div>
  </div>

</div>

<!-- ── Landscape controls (overlaid on sides) ── -->
<div id="controls-landscape">
  <div class="side-left">
    <div class="dpad" id="dpad-landscape">
      <div></div>
      <div class="dpad-btn tap-target" id="btn-up-l">▲</div>
      <div></div>
      <div class="dpad-btn tap-target" id="btn-left">◀</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn tap-target" id="btn-right">▶</div>
      <div></div>
      <div class="dpad-btn tap-target" id="btn-down">▼</div>
      <div></div>
    </div>
  </div>

  <div class="side-spacer"></div>

  <div class="side-right">
    <div class="action-group">
      <div class="meta-group">
        <div class="btn-round btn-meta tap-target" id="btn-select-l">Select</div>
        <div class="btn-round btn-meta tap-target" id="btn-start-l">Start</div>
      </div>
      <div class="util-group">
        <div class="btn-util tap-target" id="btn-reload-l">Reload</div>
        <div class="btn-util tap-target" id="btn-debug-l">Debug</div>
      </div>
    </div>
    <div class="btn-ab-group">
      <div class="btn-round btn-b tap-target" id="btn-b-l">B</div>
      <div class="btn-round btn-a tap-target" id="btn-a-l">A</div>
    </div>
  </div>
</div>

<!-- ── Start menu ── -->
<div id="menu-overlay" hidden>
  <div id="menu-dialog">
    <div id="menu-header">
      <span id="menu-title">Menu</span>
      <div id="menu-close" title="Close">✕</div>
    </div>
    <div id="menu-body">

      <!-- Main view: Save / Load / Settings -->
      <div id="menu-main" class="menu-view">
        <button class="menu-opt" data-action="save">Save</button>
        <button class="menu-opt" data-action="load">Load</button>
        <button class="menu-opt" data-view="settings">Settings</button>
      </div>

      <!-- Settings view: built dynamically from settings + manifest -->
      <div id="menu-settings" class="menu-view" hidden>
        <form id="settings-form" autocomplete="off"></form>
        <div class="menu-actions">
          <button id="settings-apply" type="button">Apply &amp; Reload</button>
          <button data-view="main" type="button">Back</button>
        </div>
      </div>

      <div id="menu-status"></div>
    </div>
  </div>
</div>

<script src="engine.js"></script>
<script src="game.js"></script>
<script src="menu.js"></script>
</body>
</html>
