<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Town Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1208; overflow: hidden; }
        #root { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
// Town Game v2.1.0
const { useState, useCallback, useEffect, useRef } = React;

const MAP_W = 20, MAP_H = 20, TILE_W = 64, TILE_H = 32;
const MOVE_SPEED = 6;
const SEASONS = ["Spring","Summer","Autumn","Winter"];
const SEASON_COLORS = {
  Spring:{ sky:"#b8e4c9", ground:"#6db87a", accent:"#4a9e5c", border:"#58a065" },
  Summer:{ sky:"#aedff7", ground:"#5ca84a", accent:"#3d8a30", border:"#4a9038" },
  Autumn:{ sky:"#f5d8a8", ground:"#c8883a", accent:"#a06428", border:"#a87030" },
  Winter:{ sky:"#d8eaf5", ground:"#dde8f0", accent:"#a8c4d8", border:"#b8ccd8" },
};
const WATER_BORDER = "#1e5480";
const DIRT_BORDER  = "#8a6830";

const RESOURCE_TYPES = {
  TREE: { emoji:"🌲", label:"Tree",       yields:{ wood:3 },         hp:3 },
  ROCK: { emoji:"🪨", label:"Rock",       yields:{ stone:2 },        hp:2 },
  BERRY:{ emoji:"🫐", label:"Berry Bush", yields:{ food:2 },         hp:1 },
  DEER: { emoji:"🦌", label:"Deer",       yields:{ food:4, hide:1 }, hp:2 },
};
const BUILDINGS = {
  HUT:       { label:"Hut",        cost:{ wood:8,  stone:2 }, icon:"🏚", repReq:0,  desc:"Houses 1 villager" },
  FARM:      { label:"Farm",       cost:{ wood:5,  stone:1 }, icon:"🌾", repReq:10, desc:"Produces food each season" },
  WORKSHOP:  { label:"Workshop",   cost:{ wood:10, stone:5 }, icon:"🪚", repReq:20, desc:"Unlocks advanced tools" },
  STOREHOUSE:{ label:"Storehouse", cost:{ wood:12, stone:4 }, icon:"🏛", repReq:15, desc:"+50 carry capacity" },
};
const SKILLS = {
  Gathering: { desc:"Better resource yield",  levels:[0,50,150,300] },
  Building:  { desc:"Cheaper construction",   levels:[0,60,180,400] },
  Hunting:   { desc:"Better animal yields",   levels:[0,40,120,280] },
  Leadership:{ desc:"Recruit more villagers", levels:[0,80,200,500] },
};
const QUESTS = [
  { id:"q1", title:"First Shelter", desc:"Build a Hut",            check:(s)=>s.buildings.some(b=>b.type==="HUT"),  reward:{ rep:15, wood:5 } },
  { id:"q2", title:"Feed Yourself", desc:"Gather 10 food",         check:(s)=>(s.totalGathered?.food||0)>=10,       reward:{ rep:10, food:5 } },
  { id:"q3", title:"Stone Mason",   desc:"Gather 15 stone",        check:(s)=>(s.totalGathered?.stone||0)>=15,      reward:{ rep:10, wood:8 } },
  { id:"q4", title:"Woodcutter",    desc:"Gather 20 wood",         check:(s)=>(s.totalGathered?.wood||0)>=20,       reward:{ rep:12, stone:6 } },
  { id:"q5", title:"Community",     desc:"Recruit first villager", check:(s)=>s.villagers.length>=1,                reward:{ rep:25, food:10 } },
  { id:"q6", title:"Farmer",        desc:"Build a Farm",           check:(s)=>s.buildings.some(b=>b.type==="FARM"), reward:{ rep:20, food:8 } },
];
const TABS = ["inventory","build","skills","quests","villagers","log"];
const TAB_ICONS = { inventory:"📦", build:"🏗", skills:"📈", quests:"📜", villagers:"👥", log:"📋" };

function generateMap() {
  const tiles = [];
  for (let y=0;y<MAP_H;y++) for (let x=0;x<MAP_W;x++) {
    const r=Math.random();
    tiles.push({ x, y, type:r<0.12?"water":r<0.14?"dirt":"grass", resource:null, building:null });
  }
  const rks=Object.keys(RESOURCE_TYPES);
  for (let i=0;i<60;i++) {
    const x=Math.floor(Math.random()*MAP_W), y=Math.floor(Math.random()*MAP_H), idx=y*MAP_W+x;
    if (tiles[idx].type==="grass"&&!tiles[idx].resource) {
      const rk=rks[Math.floor(Math.random()*rks.length)];
      tiles[idx].resource={ type:rk, hp:RESOURCE_TYPES[rk].hp };
    }
  }
  return tiles;
}

function toIso(x,y) { return { sx:(x-y)*(TILE_W/2), sy:(x+y)*(TILE_H/2) }; }

function darken(hex, pct=0.18) {
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,Math.round((n>>16)*(1-pct)));
  const g=Math.max(0,Math.round(((n>>8)&0xff)*(1-pct)));
  const b=Math.max(0,Math.round((n&0xff)*(1-pct)));
  return `#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;
}

function IsoTile({ tile, season, building, isTarget }) {
  const { sx, sy } = toIso(tile.x, tile.y);
  const sc = SEASON_COLORS[season];
  const isWater = tile.type==="water";
  const isDirt  = tile.type==="dirt";

  const gc     = isWater?"#4a90c4":isDirt?"#c8a26a":sc.ground;
  const side   = isWater?"#2c6494":isDirt?"#a07840":sc.accent;
  const border = isTarget?"#ffe066": isWater?WATER_BORDER:isDirt?DIRT_BORDER:sc.border;
  const bw     = isTarget?2:1;

  return (
    <div
      style={{
        position:"absolute", left:sx, top:sy,
        width:TILE_W, height:TILE_H+12,
        zIndex:tile.x+tile.y+1,
        userSelect:"none", WebkitUserSelect:"none", touchAction:"none",
        pointerEvents:"none",
      }}
    >
      <svg width={TILE_W} height={TILE_H+12} style={{position:"absolute",top:0,left:0}} overflow="visible">
        <polygon
          points={`0,${TILE_H/2} ${TILE_W/2},${TILE_H} ${TILE_W/2},${TILE_H+10} 0,${TILE_H/2+10}`}
          fill={side} opacity="0.9"
        />
        <polygon
          points={`${TILE_W/2},${TILE_H} ${TILE_W},${TILE_H/2} ${TILE_W},${TILE_H/2+10} ${TILE_W/2},${TILE_H+10}`}
          fill={side} opacity="0.75"
        />
        <polygon
          points={`${TILE_W/2},0 ${TILE_W},${TILE_H/2} ${TILE_W/2},${TILE_H} 0,${TILE_H/2}`}
          fill={gc}
          stroke={border}
          strokeWidth={bw}
          strokeLinejoin="round"
        />
        {isWater&&<polygon points={`${TILE_W/2},4 ${TILE_W-4},${TILE_H/2} ${TILE_W/2},${TILE_H-4} 4,${TILE_H/2}`} fill="#7ab8e8" opacity="0.4"/>}
      </svg>
      <div style={{
        position:"absolute", left:TILE_W/2, top:TILE_H/2-18,
        transform:"translateX(-50%)", fontSize:"18px",
        lineHeight:1, pointerEvents:"none", zIndex:2,
      }}>
        {building ? BUILDINGS[building.type].icon : tile.resource ? RESOURCE_TYPES[tile.resource.type].emoji : ""}
      </div>
    </div>
  );
}

function TownGame() {
  const [tiles,setTiles]                    = useState(()=>generateMap());
  const [player,setPlayer]                  = useState({x:10,y:10});
  const [renderPos,setRenderPos]            = useState({x:10,y:10});
  const [target,setTarget]                  = useState(null);
  const [inventory,setInventory]            = useState({wood:0,stone:0,food:0,hide:0});
  const [totalGathered,setTotalGathered]    = useState({wood:0,stone:0,food:0,hide:0});
  const [buildings,setBuildings]            = useState([]);
  const [villagers,setVillagers]            = useState([]);
  const [tapDebug,setTapDebug]              = useState(null);
  const [skillXP,setSkillXP]               = useState({Gathering:0,Building:0,Hunting:0,Leadership:0});
  const [season,setSeason]                  = useState(0);
  const [day,setDay]                        = useState(1);
  const [reputation,setReputation]          = useState(0);
  const [completedQuests,setCompletedQuests]= useState([]);
  const [log,setLog]                        = useState(["Welcome! Tap tiles to move and gather."]);
  const [tab,setTab]                        = useState(null);
  const [buildMode,setBuildMode]            = useState(null);
  const [happiness,setHappiness]            = useState(100);
  const [hunger,setHunger]                  = useState(100);

  const renderPosRef     = useRef({x:10,y:10});
  const targetRef        = useRef(null);
  const rafRef           = useRef(null);
  const lastTimeRef      = useRef(null);
  const pendingActionRef = useRef(null);

  const tilesRef      = useRef(tiles);
  const inventoryRef  = useRef(inventory);
  const reputationRef = useRef(reputation);
  const skillXPRef    = useRef(skillXP);
  const buildModeRef  = useRef(buildMode);
  useEffect(()=>{ tilesRef.current=tiles; },[tiles]);
  useEffect(()=>{ inventoryRef.current=inventory; },[inventory]);
  useEffect(()=>{ reputationRef.current=reputation; },[reputation]);
  useEffect(()=>{ skillXPRef.current=skillXP; },[skillXP]);
  useEffect(()=>{ buildModeRef.current=buildMode; },[buildMode]);

  const panRef        = useRef({x:0,y:0});
  const scaleRef      = useRef(1);
  const [viewTransform, setViewTransform] = useState({px:0,py:0,scale:1});

  const touchStateRef      = useRef(null);
  const TAP_THRESHOLD      = 8;
  const mapRef             = useRef(null);
  const handleTileClickRef = useRef(null);
  const baseOffRef         = useRef({x:0,y:0,headerH:44});
  const setTapDebugRef     = useRef(null);

  const addLog = useCallback((msg)=>{ setLog(p=>[msg,...p].slice(0,60)); },[]);

  const skillLevel = useCallback((sk)=>{
    const xp=skillXPRef.current[sk], lvls=SKILLS[sk].levels;
    for(let i=lvls.length-1;i>=0;i--) if(xp>=lvls[i]) return i;
    return 0;
  },[]);

  useEffect(()=>{
    const step=(now)=>{
      if(!lastTimeRef.current) lastTimeRef.current=now;
      const dt=Math.min((now-lastTimeRef.current)/1000,0.05);
      lastTimeRef.current=now;
      const tgt=targetRef.current;
      if(tgt){
        const cur=renderPosRef.current;
        const dx=tgt.x-cur.x, dy=tgt.y-cur.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const spd=MOVE_SPEED*dt;
        if(dist<=spd){
          renderPosRef.current={x:tgt.x,y:tgt.y};
          setRenderPos({x:tgt.x,y:tgt.y});
          targetRef.current=null;
          setTarget(null);
          setPlayer({x:tgt.x,y:tgt.y});
          if(pendingActionRef.current){ pendingActionRef.current(tgt); pendingActionRef.current=null; }
        } else {
          const nx=cur.x+dx/dist*spd, ny=cur.y+dy/dist*spd;
          renderPosRef.current={x:nx,y:ny};
          setRenderPos({x:nx,y:ny});
        }
      }
      rafRef.current=requestAnimationFrame(step);
    };
    rafRef.current=requestAnimationFrame(step);
    return ()=>{ if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  },[]);

  useEffect(()=>{
    const el=mapRef.current;
    if(!el) return;

    const dist2=(t1,t2)=>{
      const dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY;
      return Math.sqrt(dx*dx+dy*dy);
    };
    const midpoint=(t1,t2)=>({ x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2 });

    const screenToTile=(ex,ey,snapshot)=>{
      const { rsx, rsy, scale, pan, elW, elH } = snapshot;
      const HEADER_H_VAL = 44;
      const VIEW_CX = elW / 2;
      const VIEW_CY = (elH - HEADER_H_VAL) / 2;
      const playerLocalX = rsx + TILE_W / 2;
      const playerLocalY = rsy + TILE_H / 2;
      const playerScreenX = VIEW_CX + pan.x;
      const playerScreenY = VIEW_CY + HEADER_H_VAL + pan.y;
      const localX = playerLocalX + (ex - playerScreenX) / scale;
      const localY = playerLocalY + (ey - playerScreenY) / scale;
      const a = localX / (TILE_W / 2);
      const b = localY / (TILE_H / 2);
      const gx = Math.round((a + b) / 2);
      const gy = Math.round((b - a) / 2);
      return { tx:gx, ty:gy };
    };

    const onStart=(e)=>{
      if(e.touches.length===1){
        touchStateRef.current={
          type:"drag", wasPinch:false,
          startPan:{x:panRef.current.x,y:panRef.current.y},
          clientStartX:e.touches[0].clientX,
          clientStartY:e.touches[0].clientY,
          moved:false,
        };
      } else if(e.touches.length>=2){
        touchStateRef.current={
          type:"pinch", wasPinch:true,
          startPan:{x:panRef.current.x,y:panRef.current.y},
          startScale:scaleRef.current,
          startDist:dist2(e.touches[0],e.touches[1]),
          startMid:midpoint(e.touches[0],e.touches[1]),
          moved:true,
        };
      }
    };

    const onMove=(e)=>{
      e.preventDefault();
      const ts=touchStateRef.current;
      if(!ts) return;
      if(ts.type==="drag"&&e.touches.length===1){
        const dx=e.touches[0].clientX-ts.clientStartX;
        const dy=e.touches[0].clientY-ts.clientStartY;
        if(Math.abs(dx)>TAP_THRESHOLD||Math.abs(dy)>TAP_THRESHOLD) ts.moved=true;
        if(ts.moved){
          panRef.current={x:ts.startPan.x+dx, y:ts.startPan.y+dy};
          setViewTransform({px:panRef.current.x,py:panRef.current.y,scale:scaleRef.current});
        }
      } else if(ts.type==="pinch"&&e.touches.length>=2){
        ts.moved=true;
        const newDist=dist2(e.touches[0],e.touches[1]);
        let newScale=ts.startScale*(newDist/ts.startDist);
        newScale=Math.max(0.4,Math.min(5.0,newScale));
        const newMid=midpoint(e.touches[0],e.touches[1]);
        panRef.current={x:ts.startPan.x+(newMid.x-ts.startMid.x), y:ts.startPan.y+(newMid.y-ts.startMid.y)};
        scaleRef.current=newScale;
        setViewTransform({px:panRef.current.x,py:panRef.current.y,scale:newScale});
      }
    };

    const onEnd=(e)=>{
      const ts=touchStateRef.current;
      if(!ts) return;

      if(e.touches.length===0){
        const wasTap = ts.type==="drag" && !ts.moved && !ts.wasPinch;
        if(wasTap){
          const rp = renderPosRef.current;
          const isoP = toIso(rp.x, rp.y);
          const snapshot = {
            rsx: isoP.sx, rsy: isoP.sy,
            scale: scaleRef.current,
            pan: { ...panRef.current },
            elW: el.clientWidth,
            elH: el.clientHeight,
          };
          const rect = el.getBoundingClientRect();
          const ex = ts.clientStartX - rect.left;
          const ey = ts.clientStartY - rect.top;
          const { tx:rawTx, ty:rawTy } = screenToTile(ex, ey, snapshot);
          const tx = rawTx - 1;
          const ty = rawTy;
          if(setTapDebugRef.current) setTapDebugRef.current({
            ex, ey, tx, ty,
            ctx: snapshot.rsx, cty: snapshot.rsy,
            scale: snapshot.scale,
            panX: snapshot.pan.x, panY: snapshot.pan.y,
            elW: snapshot.elW, elH: snapshot.elH,
          });
          if(tx>=0&&tx<MAP_W&&ty>=0&&ty<MAP_H){
            const tls = tilesRef.current;
            const tile = tls[ty*MAP_W+tx];
            if(tile && tile.type!=="water"){
              const capturedHandler = handleTileClickRef.current;
              setTimeout(()=>{
                if(capturedHandler) capturedHandler(tile);
                if(setTapDebugRef.current) setTapDebugRef.current(null);
              }, 1000);
            }
          }
        }
        touchStateRef.current=null;
      } else if(e.touches.length===1&&ts.type==="pinch"){
        touchStateRef.current={
          type:"drag", wasPinch:true,
          startPan:{x:panRef.current.x,y:panRef.current.y},
          clientStartX:e.touches[0].clientX,
          clientStartY:e.touches[0].clientY,
          moved:false,
        };
      }
    };

    el.addEventListener("touchstart",onStart,{passive:true});
    el.addEventListener("touchmove",onMove,{passive:false});
    el.addEventListener("touchend",onEnd,{passive:true});
    return ()=>{
      el.removeEventListener("touchstart",onStart);
      el.removeEventListener("touchmove",onMove);
      el.removeEventListener("touchend",onEnd);
    };
  },[]);

  const fireTileAction = useCallback((tile)=>{
    const idx=tile.y*MAP_W+tile.x;
    const tls=tilesRef.current;
    if(tls[idx].resource){
      const rd=RESOURCE_TYPES[tls[idx].resource.type];
      const isH=tls[idx].resource.type==="DEER";
      const xk=isH?"Hunting":"Gathering";
      const bonus=skillLevel(xk);
      const yields={};
      for(const [r,b] of Object.entries(rd.yields)) yields[r]=b+bonus;
      setInventory(inv=>{ const ni={...inv}; for(const [r,a] of Object.entries(yields)) ni[r]=(ni[r]||0)+a; return ni; });
      setTotalGathered(tg=>{ const n={...tg}; for(const [r,a] of Object.entries(yields)) n[r]=(n[r]||0)+a; return n; });
      setSkillXP(xp=>({...xp,[xk]:xp[xk]+10}));
      const newHp=tls[idx].resource.hp-1;
      const ys=Object.entries(yields).map(([k,v])=>`+${v} ${k}`).join(", ");
      if(newHp<=0){ setTiles(p=>{ const n=[...p]; n[idx]={...n[idx],resource:null}; return n; }); addLog(`Harvested ${rd.label}. Got: ${ys}.`); }
      else { setTiles(p=>{ const n=[...p]; n[idx]={...n[idx],resource:{...n[idx].resource,hp:newHp}}; return n; }); addLog(`Hit ${rd.label} (${newHp} hp left). Got: ${ys}.`); }
    } else if(tls[idx].building){
      const bd=BUILDINGS[tls[idx].building.type]; addLog(`${bd.icon} ${bd.label}: ${bd.desc}.`);
    } else {
      addLog(`Arrived at (${tile.x},${tile.y}). Tap a resource to gather.`);
    }
  },[addLog,skillLevel]);

  const handleTileClick = useCallback((tile)=>{
    const idx=tile.y*MAP_W+tile.x;
    const bm=buildModeRef.current;
    if(bm){
      const tls=tilesRef.current;
      if(tls[idx].type!=="grass"){ addLog("Can only build on grass. Pick a green tile."); return; }
      if(tls[idx].resource||tls[idx].building){ addLog("Tile occupied. Choose an empty grass tile."); return; }
      const bd=BUILDINGS[bm];
      const rep=reputationRef.current;
      if(rep<bd.repReq){ addLog(`${bd.label} needs ${bd.repReq} rep. You have ${rep}.`); return; }
      const disc=skillLevel("Building")*0.1;
      const inv=inventoryRef.current;
      for(const [r,a] of Object.entries(bd.cost)){
        const n=Math.ceil(a*(1-disc));
        if((inv[r]||0)<n){ addLog(`Need ${n} ${r} for ${bd.label}. Have ${inv[r]||0}.`); return; }
      }
      setInventory(inv2=>{ const ni={...inv2}; for(const [r,a] of Object.entries(bd.cost)) ni[r]-=Math.ceil(a*(1-disc)); return ni; });
      const nb={ type:bm, x:tile.x, y:tile.y, id:Date.now() };
      setBuildings(p=>[...p,nb]);
      setTiles(p=>{ const n=[...p]; n[idx]={...n[idx],building:nb}; return n; });
      setSkillXP(xp=>({...xp,Building:xp.Building+20}));
      setReputation(r=>r+5);
      addLog(`Built ${bd.label} at (${tile.x},${tile.y}). +5 rep.`);
      setBuildMode(null);
      return;
    }
    targetRef.current={x:tile.x,y:tile.y};
    setTarget({x:tile.x,y:tile.y});
    pendingActionRef.current=(arrivedTile)=>fireTileAction(arrivedTile);
  },[addLog,skillLevel,fireTileAction]);

  const eatFood = useCallback(()=>{
    const inv=inventoryRef.current;
    if(inv.food<=0){ addLog("No food! Gather from Berry Bushes, Trees, or Deer."); return; }
    setHunger(h=>{
      if(h>=100){ addLog("Already full. Save your food."); return h; }
      setInventory(i=>({...i,food:i.food-1}));
      const nh=Math.min(100,h+25);
      addLog(`Ate 1 food. Hunger: ${nh}%. ${inv.food-1} food left.`);
      return nh;
    });
  },[addLog]);

  const recruitVillager = useCallback(()=>{
    const maxV=2+skillLevel("Leadership")*2;
    const huts=buildings.filter(b=>b.type==="HUT").length;
    const rep=reputationRef.current;
    const repN=30+villagers.length*20;
    if(huts===0){ addLog("No Huts! Go to Build tab and place a Hut first."); return; }
    if(huts<=villagers.length){ addLog(`All ${huts} Hut(s) occupied. Build another Hut.`); return; }
    if(rep<repN){ addLog(`Need ${repN} rep to recruit. Have ${rep}. Complete quests.`); return; }
    if(villagers.length>=maxV){ addLog(`At cap (${maxV} villagers). Level up Leadership.`); return; }
    const names=["Aldric","Marta","Bran","Elspeth","Godric","Hilde","Osbert","Wulfric"];
    const name=names[Math.floor(Math.random()*names.length)];
    setVillagers(v=>[...v,{name,role:"Farmer",id:Date.now()}]);
    setSkillXP(xp=>({...xp,Leadership:xp.Leadership+30}));
    addLog(`${name} joined! Eats 1 food/day. Leadership XP +30.`);
  },[buildings,villagers,skillLevel,addLog]);

  const handleBuildSelect = useCallback((key)=>{
    const bd=BUILDINGS[key];
    const rep=reputationRef.current;
    const inv=inventoryRef.current;
    if(rep<bd.repReq){ addLog(`${bd.label} needs ${bd.repReq} rep. You have ${rep}.`); return; }
    const canAfford=Object.entries(bd.cost).every(([r,a])=>(inv[r]||0)>=a);
    if(!canAfford){
      const miss=Object.entries(bd.cost).filter(([r,a])=>(inv[r]||0)<a).map(([r,a])=>`${a-(inv[r]||0)} more ${r}`).join(", ");
      addLog(`Can't afford ${bd.label}. Need: ${miss}.`); return;
    }
    if(buildModeRef.current===key){ setBuildMode(null); addLog("Build mode off."); return; }
    setBuildMode(key);
    addLog(`Build mode: ${bd.label}. Tap an empty grass tile on the map.`);
    setTab(null);
  },[addLog]);

  const advanceDay = useCallback(()=>{
    setDay(d=>{
      const nd=d+1;
      if(nd%10===0) setSeason(s=>{ const ns=(s+1)%4; addLog(`-- Season: ${SEASONS[ns]} --`); return ns; });
      setVillagers(vils=>{
        if(vils.length>0) setInventory(inv=>{
          const c=Math.min(inv.food,vils.length);
          if(c<vils.length){ setHappiness(h=>Math.max(0,h-5)); addLog("Villagers hungry! Happiness -5."); }
          else addLog(`${vils.length} villager(s) fed. -${c} food.`);
          return {...inv,food:inv.food-c};
        });
        return vils;
      });
      setBuildings(blds=>{
        const farms=blds.filter(b=>b.type==="FARM").length;
        if(farms>0&&nd%5===0){ const p=farms*3; setInventory(inv=>({...inv,food:inv.food+p})); addLog(`${farms} farm(s) produced ${p} food.`); }
        return blds;
      });
      setHunger(h=>{ const nh=Math.max(0,h-5); if(nh<20) addLog("Starving! Open Inventory and eat."); return nh; });
      addLog(`Day ${nd} begins.`);
      return nd;
    });
  },[addLog]);

  const handleTabTap = useCallback((t)=>{ setTab(prev=>prev===t?null:t); },[]);
  const cancelBuild  = useCallback(()=>{ setBuildMode(null); addLog("Build mode cancelled."); },[addLog]);

  const gameState={buildings,villagers,totalGathered,inventory,reputation};
  useEffect(()=>{
    QUESTS.forEach(q=>{
      if(!completedQuests.includes(q.id)&&q.check(gameState)){
        setCompletedQuests(p=>[...p,q.id]);
        setReputation(r=>r+q.reward.rep);
        setInventory(inv=>{ const ni={...inv}; Object.entries(q.reward).forEach(([k,v])=>{ if(k!=="rep") ni[k]=(ni[k]||0)+v; }); return ni; });
        const rs=Object.entries(q.reward).map(([k,v])=>k==="rep"?`+${v} rep`:`+${v} ${k}`).join(", ");
        addLog(`QUEST: "${q.title}" complete! ${rs}`);
      }
    });
  },[buildings,villagers,totalGathered]);

  const HEADER_H    = 44;
  const TAB_BAR_H   = 56;
  const LOG_STRIP_H = 28;
  const PANEL_H     = 320;
  const panelOpen   = tab!==null;

  const [mapSize, setMapSize] = useState({w:390, h:700});
  useEffect(()=>{
    if(!mapRef.current) return;
    const ro = new ResizeObserver(entries=>{
      for(const e of entries){
        setMapSize({w:e.contentRect.width, h:e.contentRect.height});
      }
    });
    ro.observe(mapRef.current);
    return ()=>ro.disconnect();
  },[]);
  const VIEW_CX = mapSize.w / 2;
  const VIEW_CY = (mapSize.h - HEADER_H) / 2;
  const { sx:rsx, sy:rsy } = toIso(renderPos.x, renderPos.y);

  const { px, py, scale } = viewTransform;
  const tx = VIEW_CX - (rsx + TILE_W/2)*scale + px;
  const ty = VIEW_CY + HEADER_H - (rsy + TILE_H/2)*scale + py;
  const tileTransform       = `translate(${tx}px,${ty}px) scale(${scale})`;
  const tileTransformOrigin = `0 0`;

  handleTileClickRef.current = handleTileClick;
  setTapDebugRef.current     = setTapDebug;
  baseOffRef.current = { tx, ty, scale };

  const avatarIsoX = rsx + TILE_W/2;
  const avatarIsoY = rsy - 2;

  const sc = SEASON_COLORS[SEASONS[season]];
  const latestLog = log[0]||"";

  const viewR = 10;
  const visibleTiles = tiles.filter(t=>
    Math.abs(t.x-renderPos.x)<=viewR+1 && Math.abs(t.y-renderPos.y)<=viewR+1
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"#1a1208", fontFamily:"'Courier New',monospace", color:"#e8d5a3", overflow:"hidden" }}>

      <div
        ref={mapRef}
        style={{
          position:"absolute", inset:0, zIndex:1,
          background:`linear-gradient(160deg,${sc.sky} 0%,${sc.ground}88 100%)`,
          overflow:"hidden", touchAction:"none",
        }}
      >
        <div style={{
          position:"absolute",
          left:0, top:0,
          transform:tileTransform,
          transformOrigin:tileTransformOrigin,
          willChange:"transform",
        }}>
          {visibleTiles.sort((a,b)=>(a.x+a.y)-(b.x+b.y)).map(tile=>{
            const bld=buildings.find(b=>b.x===tile.x&&b.y===tile.y)||null;
            const isStanding =
              Math.round(renderPos.x)===tile.x && Math.round(renderPos.y)===tile.y;
            return <IsoTile key={`${tile.x}-${tile.y}`} tile={tile} season={SEASONS[season]} building={bld} isTarget={isStanding}/>;
          })}

          <div style={{
            position:"absolute",
            left: avatarIsoX,
            top:  avatarIsoY,
            transform:"translateX(-50%)",
            fontSize:"20px", lineHeight:1,
            filter:"drop-shadow(0 0 4px #ffe066)",
            zIndex:9999, pointerEvents:"none",
          }}>🧑‍🌾</div>
        </div>

        {tapDebug && (
          <div style={{
            position:"absolute", left:tapDebug.ex, top:tapDebug.ey,
            transform:"translate(-50%,-50%)",
            width:20, height:20, background:"#ff0000", borderRadius:"50%",
            border:"2px solid #ffffff", zIndex:99999, pointerEvents:"none",
            boxShadow:"0 0 8px #ff0000",
          }}/>
        )}

        {tapDebug && tapDebug.tx>=0 && tapDebug.tx<MAP_W && tapDebug.ty>=0 && tapDebug.ty<MAP_H && (()=>{
          const {sx: tsx, sy: tsy} = toIso(tapDebug.tx, tapDebug.ty);
          const tileCX = tsx + TILE_W/2, tileCY = tsy + TILE_H/2;
          const playerCX = tapDebug.ctx + TILE_W/2, playerCY = tapDebug.cty + TILE_H/2;
          const dbgVCX = (tapDebug.elW||390)/2;
          const dbgVCY = ((tapDebug.elH||700) - 44)/2;
          const playerScreenX = dbgVCX + tapDebug.panX;
          const playerScreenY = dbgVCY + 44 + tapDebug.panY;
          const screenX = playerScreenX + (tileCX - playerCX) * tapDebug.scale;
          const screenY = playerScreenY + (tileCY - playerCY) * tapDebug.scale;
          return <div style={{
            position:"absolute", left:screenX, top:screenY,
            transform:"translate(-50%,-50%)",
            width:18, height:18, background:"#ffff00", borderRadius:"50%",
            border:"2px solid #ff8800", zIndex:99999, pointerEvents:"none",
            boxShadow:"0 0 6px #ff8800",
          }}/>;
        })()}

        {tapDebug && (
          <div style={{
            position:"absolute", top:HEADER_H+8, left:8, zIndex:99999,
            background:"#000000dd", color:"#ffffff",
            padding:"5px 8px", borderRadius:"4px", fontSize:"10px",
            fontFamily:"monospace", pointerEvents:"none", lineHeight:1.7,
          }}>
            <div>raw:  ({Math.round(tapDebug.ex)}, {Math.round(tapDebug.ey)})</div>
            <div>tile: ({tapDebug.tx}, {tapDebug.ty})</div>
            <div>scale: {(tapDebug.scale||1).toFixed(2)}</div>
            <div>elW/H: {tapDebug.elW}x{tapDebug.elH}</div>
            <div>vcx/y: {Math.round((tapDebug.elW||390)/2)},{Math.round(((tapDebug.elH||700)-44)/2)}</div>
          </div>
        )}
      </div>

      {buildMode&&(
        <div style={{ position:"absolute", top:HEADER_H+8, left:0, right:0, zIndex:50, display:"flex", justifyContent:"center", pointerEvents:"none" }}>
          <div style={{ background:"#1a1008ee", border:"1px solid #f0a030", padding:"7px 14px", borderRadius:"6px", fontSize:"12px", color:"#f0c060", display:"flex", alignItems:"center", gap:"10px", pointerEvents:"auto" }}>
            <span>🏗 Place {BUILDINGS[buildMode].label} — tap empty grass</span>
            <button onTouchEnd={(e)=>{e.stopPropagation();cancelBuild();}} style={{background:"#6a1808",border:"none",color:"#f08060",fontFamily:"inherit",fontSize:"12px",padding:"4px 10px",borderRadius:"4px",cursor:"pointer"}}>✕ Cancel</button>
          </div>
        </div>
      )}

      <div style={{ position:"absolute", top:0, left:0, right:0, height:HEADER_H, zIndex:50, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 10px", background:"linear-gradient(90deg,#2a1a08,#3a2510)", borderBottom:"2px solid #6a4a20" }}>
        <div style={{fontWeight:"bold",fontSize:"13px",color:"#f0c060",letterSpacing:"1px"}}>⚔ TOWN GAME</div>
        <div style={{display:"flex",gap:"7px",fontSize:"11px",flexWrap:"nowrap"}}>
          <span>📅{day}</span>
          <span style={{color:{Spring:"#80e080",Summer:"#f0e040",Autumn:"#e08040",Winter:"#80c0e0"}[SEASONS[season]]}}>{SEASONS[season]}</span>
          <span>⭐{reputation}</span>
          <span style={{color:hunger<30?"#e05050":"#c0a060"}}>🍖{hunger}%</span>
          <span>😊{happiness}%</span>
        </div>
        <button onTouchEnd={(e)=>{e.stopPropagation();advanceDay();}} style={{background:"linear-gradient(180deg,#6a4a20,#4a2e10)",border:"1px solid #8a6a30",color:"#f0d080",padding:"0 12px",height:"34px",cursor:"pointer",fontFamily:"inherit",fontSize:"11px",borderRadius:"3px",minWidth:"60px"}}>▶ Day</button>
      </div>

      <div style={{ position:"absolute", left:0, right:0, zIndex:40, bottom:TAB_BAR_H+LOG_STRIP_H, height:panelOpen?PANEL_H:0, background:"#1a1008f4", borderTop:panelOpen?"2px solid #6a4a20":"none", transition:"height 0.22s ease", overflow:"hidden", display:"flex", flexDirection:"column" }}>
        <div style={{flex:1,overflowY:"auto",padding:"12px",WebkitOverflowScrolling:"touch"}}>

          {tab==="inventory"&&(
            <div>
              <div style={{color:"#f0c060",marginBottom:"10px",fontSize:"13px",fontWeight:"bold"}}>INVENTORY</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"12px"}}>
                {Object.entries(inventory).map(([r,a])=>(
                  <div key={r} style={{background:"#251808",border:"1px solid #3a2510",borderRadius:"6px",padding:"8px 12px",display:"flex",justifyContent:"space-between"}}>
                    <span style={{color:"#c0a060",fontSize:"13px"}}>{r==="wood"?"🪵":r==="stone"?"🪨":r==="food"?"🍖":"🦊"} {r}</span>
                    <span style={{color:"#f0d080",fontWeight:"bold",fontSize:"14px"}}>{a}</span>
                  </div>
                ))}
              </div>
              <button onTouchEnd={(e)=>{e.stopPropagation();eatFood();}} style={{width:"100%",padding:"12px",background:"linear-gradient(180deg,#3a5020,#2a3a14)",border:"1px solid #5a8030",color:"#a0e060",cursor:"pointer",fontFamily:"inherit",fontSize:"14px",borderRadius:"6px",minHeight:"44px"}}>🍖 Eat Food (costs 1)</button>
              <div style={{marginTop:"12px",fontSize:"12px",color:"#806040",display:"flex",gap:"14px",flexWrap:"wrap"}}>
                <span>🏘 {villagers.length} villagers</span>
                <span>🏠 {buildings.filter(b=>b.type==="HUT").length} huts</span>
                <span>🌾 {buildings.filter(b=>b.type==="FARM").length} farms</span>
              </div>
            </div>
          )}

          {tab==="build"&&(
            <div>
              <div style={{color:"#f0c060",marginBottom:"10px",fontSize:"13px",fontWeight:"bold"}}>BUILD MENU</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {Object.entries(BUILDINGS).map(([key,bd])=>{
                  const canAfford=Object.entries(bd.cost).every(([r,a])=>(inventory[r]||0)>=a);
                  const hasRep=reputation>=bd.repReq;
                  const active=buildMode===key;
                  return (
                    <div key={key} onTouchEnd={(e)=>{e.stopPropagation();handleBuildSelect(key);}} style={{padding:"10px",background:active?"#3a2a10":"#251808",border:`1px solid ${active?"#f0a030":(!canAfford||!hasRep)?"#2a1808":"#3a2510"}`,borderRadius:"6px",cursor:"pointer",opacity:(!canAfford||!hasRep)?0.55:1}}>
                      <div style={{fontSize:"22px",marginBottom:"4px"}}>{bd.icon}</div>
                      <div style={{fontSize:"12px",color:active?"#f0c060":"#d0a050",fontWeight:"bold"}}>{bd.label}</div>
                      <div style={{fontSize:"10px",color:"#706040",marginTop:"2px"}}>{Object.entries(bd.cost).map(([r,a])=>`${a}${r[0]}`).join(" ")}{bd.repReq>0?` ⭐${bd.repReq}`:""}</div>
                      <div style={{fontSize:"10px",color:"#504030",marginTop:"2px"}}>{bd.desc}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {tab==="skills"&&(
            <div>
              <div style={{color:"#f0c060",marginBottom:"10px",fontSize:"13px",fontWeight:"bold"}}>SKILLS</div>
              {Object.entries(SKILLS).map(([sk,def])=>{
                const xp=skillXP[sk], lv=skillLevel(sk);
                const nextXp=def.levels[lv+1]||def.levels[lv];
                const pct=lv>=def.levels.length-1?100:Math.min(100,((xp-def.levels[lv])/(nextXp-def.levels[lv]))*100);
                return (
                  <div key={sk} style={{marginBottom:"14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}><span style={{fontSize:"13px",color:"#d0a050"}}>{sk}</span><span style={{fontSize:"12px",color:"#f0c060"}}>Lv {lv}</span></div>
                    <div style={{fontSize:"11px",color:"#706040",marginBottom:"5px"}}>{def.desc}</div>
                    <div style={{height:"8px",background:"#2a1808",borderRadius:"4px",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#a06020,#f0a030)",transition:"width 0.4s"}}/></div>
                    <div style={{fontSize:"10px",color:"#504020",marginTop:"3px"}}>XP {xp} / {nextXp}</div>
                  </div>
                );
              })}
            </div>
          )}

          {tab==="quests"&&(
            <div>
              <div style={{color:"#f0c060",marginBottom:"10px",fontSize:"13px",fontWeight:"bold"}}>QUESTS</div>
              {QUESTS.map(q=>{
                const done=completedQuests.includes(q.id);
                return (
                  <div key={q.id} style={{marginBottom:"8px",padding:"10px",background:done?"#1a2a10":"#251808",border:`1px solid ${done?"#3a6020":"#3a2510"}`,borderRadius:"6px",opacity:done?0.75:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:"13px",color:done?"#70c040":"#d0a050"}}>{done?"✓ ":"○ "}{q.title}</span>
                      <span style={{fontSize:"11px",color:"#a08040"}}>{Object.entries(q.reward).map(([k,v])=>k==="rep"?`+${v}⭐`:`+${v}${k[0]}`).join(" ")}</span>
                    </div>
                    <div style={{fontSize:"11px",color:"#706040",marginTop:"3px"}}>{q.desc}</div>
                  </div>
                );
              })}
            </div>
          )}

          {tab==="villagers"&&(
            <div>
              <div style={{color:"#f0c060",marginBottom:"10px",fontSize:"13px",fontWeight:"bold"}}>VILLAGERS ({villagers.length})</div>
              <button onTouchEnd={(e)=>{e.stopPropagation();recruitVillager();}} style={{width:"100%",padding:"12px",marginBottom:"8px",background:"linear-gradient(180deg,#3a2a10,#251808)",border:"1px solid #6a4a20",color:"#f0c060",cursor:"pointer",fontFamily:"inherit",fontSize:"14px",borderRadius:"6px",minHeight:"44px"}}>+ Recruit Villager</button>
              <div style={{fontSize:"11px",color:"#706040",marginBottom:"10px"}}>Need: {30+villagers.length*20}⭐ rep + empty Hut</div>
              {villagers.length===0
                ?<div style={{fontSize:"12px",color:"#504030",textAlign:"center",padding:"16px"}}>No villagers yet. Build a Hut first.</div>
                :villagers.map(v=>(
                  <div key={v.id} style={{marginBottom:"8px",padding:"10px",background:"#251808",border:"1px solid #3a2510",borderRadius:"6px",display:"flex",alignItems:"center",gap:"10px"}}>
                    <span style={{fontSize:"20px"}}>👤</span>
                    <div><div style={{fontSize:"13px"}}>{v.name}</div><div style={{fontSize:"10px",color:"#706040"}}>{v.role} — eats 1 food/day</div></div>
                  </div>
                ))
              }
            </div>
          )}

          {tab==="log"&&(
            <div>
              <div style={{color:"#f0c060",marginBottom:"10px",fontSize:"13px",fontWeight:"bold"}}>EVENT LOG</div>
              {log.map((l,i)=>(
                <div key={i} style={{fontSize:"12px",color:i===0?"#e0b050":"#705030",marginBottom:"8px",paddingBottom:"8px",borderBottom:"1px solid #251808"}}>
                  <span style={{color:"#403020",marginRight:"6px"}}>{log.length-i}.</span>{l}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div
        onTouchEnd={(e)=>{e.stopPropagation();setTab(prev=>prev==="log"?null:"log");}}
        style={{ position:"absolute", left:0, right:0, zIndex:50, bottom:TAB_BAR_H, height:LOG_STRIP_H, background:"#0d0904f8", borderTop:"1px solid #3a2810", display:"flex", alignItems:"center", padding:"0 10px", gap:"8px", cursor:"pointer" }}
      >
        <span style={{fontSize:"11px",color:"#604020",flexShrink:0}}>{tab==="log"?"▼":"▲"}</span>
        <span style={{fontSize:"11px",color:"#b08030",flex:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{latestLog}</span>
      </div>

      <div style={{ position:"absolute", bottom:0, left:0, right:0, height:TAB_BAR_H, zIndex:50, background:"linear-gradient(0deg,#1a1008,#251408)", borderTop:"2px solid #4a3010", display:"flex" }}>
        {TABS.map(t=>(
          <button key={t} onTouchEnd={(e)=>{e.stopPropagation();handleTabTap(t);}} style={{ flex:1, border:"none", borderTop:tab===t?"2px solid #f0a030":"2px solid transparent", background:tab===t?"#2a1808":"transparent", color:tab===t?"#f0c060":"#806040", cursor:"pointer", fontFamily:"inherit", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"2px", minHeight:"44px", padding:"2px 0" }}>
            <span style={{fontSize:t==="log"?"16px":"18px"}}>{TAB_ICONS[t]}</span>
            <span style={{fontSize:"8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>{t}</span>
          </button>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TownGame />);
    </script>
</body>
</html>
